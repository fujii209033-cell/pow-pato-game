<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>パウ・パトロール ゲーム</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <style>
        margin: 0;
        padding: 0;
        background-color: #f0f0f0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
        overflow: hidden;
        user-select: none;
        -webkit-user-select: none;
        body {
        }

        /* ゲーム全体のコンテナ（アスペクト比 2:1 で固定） */
        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 800px;
            height: auto;
            aspect-ratio: 2 / 1;
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.2);
            background: #fff;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* --- UIレイヤー共通設定 --- */
        .ui-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            padding: 2%;
            z-index: 10;
        }

        .hidden {
            display: none !important;
        }

        /* --- タイトル画面 --- */
        #titleScreen {
            background: linear-gradient(to bottom, #4facfe 0%, #00f2fe 100%);
        }

        .game-title {
            font-size: 5vw;
            color: #ff4757;
            text-shadow: 3px 3px 0 #fff, -3px -3px 0 #fff, 3px -3px 0 #fff, -3px 3px 0 #fff, 0 4px 6px rgba(0,0,0,0.3);
            margin-bottom: 2%;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .start-msg {
            font-size: 2.2vw;
            color: #fff;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.6);
            margin-bottom: 4%;
            font-weight: bold;
        }

        .title-buttons {
            display: flex;
            gap: 20px;
            width: 90%;
            justify-content: center;
        }

        /* ボタン文字はみ出し対策（③・④共通） */
        .btn {
            padding: 1.5% 3%;
            font-size: 2vw;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 0 #d0d0d0;
            transition: transform 0.1s, box-shadow 0.1s;
            max-width: 45%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        .btn-orange { background-color: #ff9f43; color: white; box-shadow: 0 4px 0 #e67e22; }
        .btn-purple { background-color: #a55eea; color: white; box-shadow: 0 4px 0 #8854d0; }

        /* --- キャラクター選択画面 --- */
        #charScreen {
            background-color: #e3fafc;
        }

        .screen-title {
            font-size: 3vw;
            color: #0c2461;
            margin-bottom: 3%;
            font-weight: bold;
        }

        .char-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 85%;
            max-width: 650px;
        }

        .char-card {
            background: white;
            border: 3px solid #ced4da;
            border-radius: 12px;
            padding: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
        }

        .char-card:hover {
            transform: scale(1.03);
        }

        .char-img {
            width: 25%;
            height: auto;
            object-fit: contain;
        }

        .char-name {
            font-size: 2.2vw;
            font-weight: bold;
        }

        /* キャラボーターカラー */
        .card-chase { border-color: #1e3799; color: #1e3799; }
        .card-marshall { border-color: #b33939; color: #b33939; }
        .card-rubble { border-color: #f1c40f; color: #f1c40f; }
        .card-skye { border-color: #e84393; color: #e84393; }
        .card-rocky { border-color: #2ed573; color: #2ed573; }
        .card-zuma { border-color: #d35400; color: #d35400; }

        /* --- モーダル（能力説明：②のはみ出し修正） --- */
        .modal-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex; justify-content: center; align-items: center;
            z-index: 20;
        }

        .modal-content {
            background: white;
            border-radius: 16px;
            padding: 3% 4%;
            width: 70%;
            max-width: 500px;
            box-sizing: border-box;
            position: relative;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .modal-close {
            position: absolute;
            top: 10px; right: 10px;
            background: #ff4d4d; color: white;
            border: none; border-radius: 50%;
            width: 30px; height: 30px;
            font-weight: bold; cursor: pointer;
            display: flex; justify-content: center; align-items: center;
        }

        .modal-body {
            display: flex; align-items: center; gap: 20px; margin: 3% 0; text-align: left;
        }

        .modal-char-img { width: 30%; height: auto; object-fit: contain; }
        .modal-info { width: 70%; }
        
        .modal-char-name { font-size: 3vw; font-weight: bold; margin-bottom: 5px; }
        .modal-skill-title { font-size: 2.2vw; font-weight: bold; color: #ff7675; margin-bottom: 5px; }
        
        /* 説明文テキストのはみ出し徹底ガード */
        .modal-desc { 
            font-size: 1.8vw; 
            color: #636e72; 
            line-height: 1.4;
            word-break: break-all;
            white-space: normal;
        }

        .btn-select-confirm {
            padding: 2% 6%;
            font-size: 2.2vw;
            color: white;
            border: none; border-radius: 8px; cursor: pointer;
            font-weight: bold; margin-top: 10px;
        }

        /* --- モード選択画面 --- */
        #modeScreen { background-color: #f1f2f6; }
        .mode-container { display: flex; gap: 40px; width: 80%; justify-content: center; }
        .mode-box {
            flex: 1; max-width: 260px; padding: 4%; background: white;
            border-radius: 16px; box-shadow: 0 6px 12px rgba(0,0,0,0.1);
            text-align: center; cursor: pointer; transition: transform 0.2s;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .mode-box:hover { transform: translateY(-5px); }
        .mode-icon { font-size: 4vw; margin-bottom: 10px; }
        .mode-name { font-size: 2.4vw; font-weight: bold; margin-bottom: 8px; }
        .mode-desc { font-size: 1.6vw; color: #57606f; }
        .mode-easy { border: 4px solid #2ed573; color: #2ed573; }
        .mode-hard { border: 4px solid #ff4757; color: #ff4757; }

        /* --- ステージ選択画面（④のはみ出し修正） --- */
        #stageScreen { background-color: #e8f4f8; }
        .stage-container { display: flex; gap: 20px; width: 90%; justify-content: center; }
        .stage-box {
            flex: 1;
            max-width: 220px;
            padding: 3% 2%;
            border-radius: 14px;
            text-align: center;
            cursor: pointer;
            color: white;
            font-weight: bold;
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }
        .stage-box:hover { transform: translateY(-5px); }
        
        /* ステージ内文字のラップ制限解除とはみ出し防止 */
        .stage-name { 
            font-size: 2vw; 
            white-space: normal;
            word-break: break-all;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            width: 100%;
        }
        .stage-city { background: linear-gradient(135deg, #54a0ff, #00d2d3); }
        .stage-beach { background: linear-gradient(135deg, #ff9f43, #ff6b6b); }
        .stage-mountain { background: linear-gradient(135deg, #8395a7, #576574); }

        /* --- リザルト（パウフェクト）画面 --- */
        #resultScreen {
            background-color: rgba(26, 26, 26, 0.95);
            color: white;
        }
        .result-title {
            font-size: 5vw; color: #f1c40f; margin-bottom: 2%;
            text-shadow: 0 0 10px rgba(241,196,15,0.5);
        }
        .result-score { font-size: 3vw; margin-bottom: 3%; }
        .ranking-box {
            background: rgba(255,255,255,0.1); padding: 3% 6%; border-radius: 12px;
            width: 50%; max-width: 300px; text-align: left; margin-bottom: 4%;
        }
        .ranking-title { font-size: 2vw; color: #00d2d3; margin-bottom: 5px; text-align: center; font-weight: bold;}
        .ranking-item { font-size: 1.8vw; margin: 4px 0; display: flex; justify-content: space-between;}
    </style>
</head>
<body>

<div id="gameContainer">
    <canvas id="gameCanvas"></canvas>

    <div id="titleScreen" class="ui-screen">
        <h1 class="game-title">パウ・パトロール ゲーム</h1>
        <div class="start-msg">👇 タップして スタート！ 👇</div>
        <div class="title-buttons">
            <button class="btn btn-orange" onclick="changeScreen('charScreen')">🏆 かこのきろく</button>
            <button class="btn btn-purple" onclick="changeScreen('charScreen')">🏅 パウ・バッジ</button>
        </div>
    </div>

    <div id="charScreen" class="ui-screen hidden">
        <h2 class="screen-title">だれで あそぶ？</h2>
        <div class="char-grid">
            <div class="char-card card-chase" onclick="openModal('chase')">
                <img src="https://via.placeholder.com/80/1e3799/ffffff?text=C" class="char-img" alt="チェイス">
                <span class="char-name">チェイス</span>
            </div>
            <div class="char-card card-marshall" onclick="openModal('marshall')">
                <img src="https://via.placeholder.com/80/b33939/ffffff?text=M" class="char-img" alt="マーシャル">
                <span class="char-name">マーシャル</span>
            </div>
            <div class="char-card card-rubble" onclick="openModal('rubble')">
                <img src="https://via.placeholder.com/80/f1c40f/ffffff?text=R" class="char-img" alt="ラブル">
                <span class="char-name">ラブル</span>
            </div>
            <div class="char-card card-skye" onclick="openModal('skye')">
                <img src="https://via.placeholder.com/80/e84393/ffffff?text=S" class="char-img" alt="スカイ">
                <span class="char-name">スカイ</span>
            </div>
            <div class="char-card card-rocky" onclick="openModal('rocky')">
                <img src="https://via.placeholder.com/80/2ed573/ffffff?text=Ro" class="char-img" alt="ロッキー">
                <span class="char-name">ロッキー</span>
            </div>
            <div class="char-card card-zuma" onclick="openModal('zuma')">
                <img src="https://via.placeholder.com/80/d35400/ffffff?text=Z" class="char-img" alt="ズーマ">
                <span class="char-name">ズーマ</span>
            </div>
        </div>
    </div>

    <div id="charModal" class="modal-overlay hidden">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">×</button>
            <div class="modal-body">
                <img id="modalImg" src="" class="modal-char-img" alt="キャラ">
                <div class="modal-info">
                    <div id="modalName" class="modal-char-name"></div>
                    <div id="modalSkill" class="modal-skill-title"></div>
                    <div id="modalDesc" class="modal-desc"></div>
                </div>
            </div>
            <button id="confirmSelectBtn" class="btn-select-confirm" onclick="selectCharacter()">これで あそぶ！</button>
        </div>
    </div>

    <div id="modeScreen" class="ui-screen hidden">
        <h2 class="screen-title">どちらの モードにする？</h2>
        <div class="mode-container">
            <div class="mode-box mode-easy" onclick="selectMode('easy')">
                <div class="mode-icon">💚</div>
                <div class="mode-name">ライフなし</div>
                <div class="mode-desc">(ぶつかっても ずっと走れるよ)</div>
            </div>
            <div class="mode-box mode-hard" onclick="selectMode('hard')">
                <div class="mode-icon">💔</div>
                <div class="mode-name">ライフあり (5つ)</div>
                <div class="mode-desc">(5回ぶつかると ゲームオーバー)</div>
            </div>
        </div>
    </div>

    <div id="stageScreen" class="ui-screen hidden">
        <h2 class="screen-title">どこに ぼうけんに行く？ 🗺️</h2>
        <div class="stage-container">
            <div class="stage-box stage-city" onclick="startGame('city')">
                <span class="stage-name">いつもの街 🌆</span>
            </div>
            <div class="stage-box stage-beach" onclick="startGame('beach')">
                <span class="stage-name">うみのビーチ 🏖️</span>
            </div>
            <div class="stage-box stage-mountain" onclick="startGame('mountain')">
                <span class="stage-name">ゆきやま ❄️</span>
            </div>
        </div>
    </div>

    <div id="resultScreen" class="ui-screen hidden">
        <h1 class="result-title">パウフェクト！</h1>
        <div id="resultScore" class="result-score">あつめたクッキー: 0 こ</div>
        <div class="ranking-box">
            <div class="ranking-title">きろく ランキング</div>
            <div class="ranking-item"><span>1い:</span> <span id="rank1">144 こ</span></div>
            <div class="ranking-item"><span>2い:</span> <span id="rank2">129 こ</span></div>
            <div class="ranking-item"><span>3い:</span> <span id="rank3">128 こ</span></div>
        </div>
        <button class="btn btn-orange" onclick="changeScreen('titleScreen')">もういちど あそぶ</button>
    </div>
</div>

<script>
    // --- グローバル変数・オーディオ定義 ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    let currentCharacter = '';
    let gameMode = '';
    let gameStage = '';
    let gameInterval = null;

    // ダミーのBGMオブジェクト (環境に応じて実際のパスに変更してください)
    let bgm = null;

    function initAudio() {
        if (!bgm) {
            bgm = new Audio();
            bgm.src = 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3'; // テスト用フリー音源
            bgm.loop = true;
        }
    }

    // 🔊 ①ブラウザ終了・タブ変更時のBGM完全停止ロジック
    function handleVisibilityChange() {
        if (document.hidden) {
            if (bgm && !bgm.paused) {
                bgm.pause();
            }
        } else {
            // ゲーム中の画面であれば復帰時に再開（必要に応じて）
            if (bgm && bgm.src && document.getElementById('titleScreen').classList.contains('hidden') === false) {
                // タイトル画面やプレイ中なら再開させたい場合
            }
        }
    }
    document.addEventListener('visibilitychange', handleVisibilityChange, false);
    window.addEventListener('pagehide', () => {
        if (bgm) {
            bgm.pause();
            bgm = null; 
        }
    }, false);

    // --- キャラクターデータ ---
    const charData = {
        chase: {
            name: 'チェイス',
            skill: '⚡ スピード・ダッシュ',
            desc: 'あしが はやいよ！ジャンプのあとに すばやく はしることができるぞ！',
            color: '#1e3799',
            img: 'https://via.placeholder.com/120/1e3799/ffffff?text=Chase'
        },
        marshall: {
            name: 'マーシャル',
            skill: '🔥 ファイヤー・ジャンプ',
            desc: 'しょうがいぶつや ジャンプだいをおすと ウルトラ大ジャンプができるぞ！',
            color: '#b33939',
            img: 'https://via.placeholder.com/120/b33939/ffffff?text=Marshall'
        },
        rubble: {
            name: 'ラブル',
            skill: '🏗️ パワー・リカバリー',
            desc: 'あなに おちても 3回まで ド根性でふっかつするぞ！',
            color: '#f1c40f',
            img: 'https://via.placeholder.com/120/f1c40f/ffffff?text=Rubble'
        },
        skye: {
            name: 'スカイ',
            skill: '🚀 フライング・ホバー',
            desc: 'ジャンプちゅうに もういちどおすと おおぞらを飛べるぞ！',
            color: '#e84393',
            img: 'https://via.placeholder.com/120/e84393/ffffff?text=Skye'
        },
        rocky: {
            name: 'ロッキー',
            skill: '🔧 リサイクル・バリア',
            desc: 'バリアで まもらえれるぞ！ステージでも アイテムをひろうことができる！',
            color: '#2ed573',
            img: 'https://via.placeholder.com/120/2ed573/ffffff?text=Rocky'
        },
        zuma: {
            name: 'ズーマ',
            skill: '🏄 ホバーダッシュ',
            desc: 'みずたまりに はいると チャージされて ずっとダッシュ！',
            color: '#d35400',
            img: 'https://via.placeholder.com/120/d35400/ffffff?text=Zuma'
        }
    };

    // --- 画面切り替えロジック ---
    function changeScreen(screenId) {
        initAudio();
        // すべてのUI画面を隠す
        document.querySelectorAll('.ui-screen').forEach(screen => {
            screen.classList.add('hidden');
        });
        // ターゲット画面を表示
        document.getElementById(screenId).classList.remove('hidden');

        // タイトル画面がクリックされた時などにBGM再生を開始するトリガー
        if (screenId === 'titleScreen') {
            stopGameLoop();
        } else {
            // ユーザー操作を起点にBGMをスタート
            if (bgm && bgm.paused) {
                bgm.play().catch(e => console.log("Audio play blocked:", e));
            }
        }
    }

    // --- モーダル制御 ---
    function openModal(charKey) {
        const data = charData[charKey];
        if (!data) return;

        currentCharacter = charKey;
        document.getElementById('modalImg').src = data.img;
        document.getElementById('modalName').textContent = data.name;
        document.getElementById('modalSkill').textContent = data.skill;
        document.getElementById('modalDesc').textContent = data.desc;
        
        const confirmBtn = document.getElementById('confirmSelectBtn');
        confirmBtn.style.backgroundColor = data.color;

        document.getElementById('charModal').classList.remove('hidden');
    }

    function closeModal() {
        document.getElementById('charModal').classList.add('hidden');
    }

    function selectCharacter() {
        closeModal();
        changeScreen('modeScreen');
    }

    // --- モード・ステージ選択 ---
    function selectMode(mode) {
        gameMode = mode;
        changeScreen('stageScreen');
    }

    function startGame(stage) {
        gameStage = stage;
        changeScreen('gameCanvas'); // UIを非表示にしてキャンバスに集中
        document.getElementById('gameCanvas').classList.remove('hidden');
        runGameLoop();
    }

    // --- 仮のゲームループ (デモ用背景描画) ---
    let posX = 0;
    function runGameLoop() {
        stopGameLoop();
        gameInterval = setInterval(() => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // ステージに応じた簡易背景塗りつぶし
            if (gameStage === 'city') ctx.fillStyle = '#bae7ff';
            else if (gameStage === 'beach') ctx.fillStyle = '#ffeaa7';
            else if (gameStage === 'mountain') ctx.fillStyle = '#dfe4ea';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // スクロールする地面の描画
            ctx.fillStyle = '#2ed573';
            ctx.fillRect(0, canvas.height * 0.7, canvas.width, canvas.height * 0.3);

            // キャラクター（仮の四角形）
            ctx.fillStyle = charData[currentCharacter]?.color || '#ff4757';
            ctx.fillRect(100, canvas.height * 0.5, 40, 40);

            // デモ用に3秒後にリザルトへ強制遷移
            posX++;
            if (posX > 180) {
                posX = 0;
                endGame(120);
            }
        }, 1000 / 60);
    }

    function stopGameLoop() {
        if (gameInterval) {
            clearInterval(gameInterval);
            gameInterval = null;
        }
    }

    function endGame(score) {
        stopGameLoop();
        document.getElementById('resultScore').textContent = `あつめたクッキー: ${score} こ`;
        changeScreen('resultScreen');
    }

    // --- キャンバス解像度自動フィッティング設定 ---
    function resizeCanvas() {
        const dpr = window.devicePixelRatio || 1;
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        ctx.scale(dpr, dpr);
    }
    window.addEventListener('resize', resizeCanvas);
    
    // 初回起動時設定
    window.onload = () => {
        resizeCanvas();
        // 画面のどこかをタップしたらオーディオを初期化できるようにする
        document.body.addEventListener('touchstart', initAudio, { once: true });
        document.body.addEventListener('click', initAudio, { once: true });
    };
</script>
</body>
</html>
