<!DOCTYPE html>

<head>

    <title>パウ・パトロール風 横スクロールゲーム</title>
    <style>
        /* 画面全体のスタイルをスマホ最適化 */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none; /* ダブルタップズームなどを完全に禁止 */
        }
        
        /* キャンバスを外枠のコンテナで包み、常にアスペクト比2:1を維持して最大化 */
        #gameContainer {
            width: 100vw;
            height: 50vw; /* 2:1 の比率 */
            max-width: 800px;
            max-height: 400px;
            position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            background-color: #87CEEB;
        }

        /* 横向きの時は画面いっぱいに広げる */
        @media (orientation: landscape) {
            #gameContainer {
                width: 100vw;
                height: 100vh;
                max-width: none;
                max-height: none;
                aspect-ratio: 2 / 1;
                margin: auto;
            }
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>

// 高解像度ディスプレイ（Retinaなど）およびスマホ画面フィットのための自動スケーリング処理
function resizeCanvasForRetina() {
    const dpr = window.devicePixelRatio || 1;
    canvas.width = 800 * dpr;
    canvas.height = 400 * dpr;
    ctx.scale(dpr, dpr);
}

window.addEventListener('load', resizeCanvasForRetina);
window.addEventListener('resize', () => {
    setTimeout(resizeCanvasForRetina, 200);
});
resizeCanvasForRetina();

    const saved = localStorage.getItem("paw_badge_system");
    if (saved) {
        try {
            badgeStorage = JSON.parse(saved);
            Object.keys(BADGES).forEach(key => {
                if (badgeStorage.unlocked.includes(key)) {
                    BADGES[key].unlocked = true;
                }
            });
        } catch(e) { console.error(e); }
    }
}
function saveBadgeData() {
    badgeStorage.unlocked = Object.keys(BADGES).filter(key => BADGES[key].unlocked);
    localStorage.setItem("paw_badge_system", JSON.stringify(badgeStorage));
}

let currentActiveBgm = null; 
let isAudioInitialized = false;

function playBgm(targetAudio) {
    audioAssets.bgmTitle.pause(); audioAssets.bgmTitle.currentTime = 0;
    audioAssets.bgmPlay.pause();  audioAssets.bgmPlay.currentTime = 0;
    audioAssets.bgmClear.pause(); audioAssets.bgmClear.currentTime = 0;
    audioAssets.bgmGameover.pause(); audioAssets.bgmGameover.currentTime = 0;
    
    currentActiveBgm = targetAudio;
    if (document.visibilityState === 'visible' && currentState !== STATES.PAUSE && isAudioInitialized) {
        targetAudio.play().catch(e => {});
    }
}

function playSe(targetSe) {
    if (!isAudioInitialized) return;
    targetSe.currentTime = 0;
    targetSe.play().catch(e => {});
}

function stopBgmOnHide() { if (currentActiveBgm) currentActiveBgm.pause(); }
function resumeBgmOnShow() {
    if (currentActiveBgm && document.visibilityState === 'visible' && currentState !== STATES.PAUSE && isAudioInitialized) {
        currentActiveBgm.play().catch(e => {});
    }
}
document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === 'hidden') stopBgmOnHide(); else resumeBgmOnShow();
});

function getGroundY(x) {
    if (x < 0 || x >= goalX - 400) return BASE_GROUND_Y;
    let index = Math.floor(x / SLOPE_INTERVAL);
    if (index >= slopePoints.length - 1) return BASE_GROUND_Y;
    let p1 = slopePoints[index];
    let p2 = slopePoints[index + 1];
    let ratio = (x % SLOPE_INTERVAL) / SLOPE_INTERVAL;
    return p1 + (p2 - p1) * ratio;
}

function addTextPopup(x, y, text, color = "#FFF") {

    const colors = ["#FF2A6D", "#05D9E8", "#01012B", "#F5A623", "#7ED321", "#B8E986", "#F8E71C"];
    for (let i = 0; i < 150; i++) {
        confettiParticles.push({
            x: Math.random() * 800, y: Math.random() * -400, size: Math.random() * 8 + 5,
            color: colors[Math.floor(Math.random() * colors.length)],
            vx: (Math.random() - 0.5) * 4, vy: Math.random() * 3 + 2,
            rotation: Math.random() * Math.PI, rotSpeed: (Math.random() - 0.5) * 0.1
        });
    }
}

// 【新機能】バッジ獲得チェック処理
function checkAndUnlockBadges() {
    let updated = false;
    // 今回の獲得数チェック
    if (currentPlaySessionCookies >= 20 && !BADGES.COOKIE_ONCE.unlocked) {
        BADGES.COOKIE_ONCE.unlocked = true;
        updated = true;
    }
    // 累計チェック
    badgeStorage.totalCookies += currentPlaySessionCookies;
    if (badgeStorage.totalCookies >= 50 && !BADGES.COOKIE_TOTAL.unlocked) {
        BADGES.COOKIE_TOTAL.unlocked = true;
        updated = true;
    }
    // ケントのお助け発動チェック
    if (isRyderCalledInSession && !BADGES.RYDER_HELP.unlocked) {
        BADGES.RYDER_HELP.unlocked = true;
        updated = true;
    }
    if (updated) {
        saveBadgeData();
    }
}

    droppedCookies = [];
    fallingObstacles = [];
    textPopups = [];
    confettiParticles = [];
    dashPanelTimer = 0;
    jumpCounter = 0;

    isHovering = false;
    hoverTimer = 0;
    hasRockyShield = (selectedCharKey === 'rocky');
    rubbleRecoveryCount = 0;
    isZumaDashing = false;

    // 【新機能】ケントお助け関連リセット
    ryderItems = [];
    pawPackTimer = 0;
    ryderVoiceText = "";
    ryderVoiceTimer = 0;
    currentPlaySessionCookies = 0;
    isRyderCalledInSession = false;

    slopePoints = [];
    let numPoints = Math.ceil(goalX / SLOPE_INTERVAL) + 5;
    let lastY = BASE_GROUND_Y;
    for (let i = 0; i < numPoints; i++) {
        if (i < 3 || i > numPoints - 6) {
            slopePoints.push(BASE_GROUND_Y);
        } else {
            let change = (Math.random() - 0.5) * 50;
            let currentY = lastY + change;
            if (currentY < 180) currentY = 180;
            if (currentY > 270) currentY = 270;
            slopePoints.push(currentY);
            lastY = currentY;
        }
    }
    player.y = getGroundY(player.x);

    // 【新機能】ステージ別の背景要素の自動生成
    bgBuildings = [];
    const colors = ["#FCA5A5", "#FECABC", "#FEF08A", "#BBF7D0", "#BFDBFE", "#E9D5FF", "#FBCFE8", "#FDE047", "#A7F3D0", "#93C5FD"];
    for (let i = 0; i < 75; i++) {
        bgBuildings.push({
            x: i * 220 + Math.random() * 60,
            width: 80 + Math.random() * 60,
            height: 100 + Math.random() * 120,
            color: colors[Math.floor(Math.random() * colors.length)],
            type: STAGES[selectedStageKey].decoType 
        });
    }

    // 障害物の生成
    obstacles = [];
    const types = ['car', 'moving_car', 'box', 'cone', 'cat', 'puddle', 'pit', 'spring'];
    if (isLifeMode) { types.push('bird'); }

    for (let i = 0; i < 42; i++) {
        let type = types[Math.floor(Math.random() * types.length)];
        let ox = 600 + i * 350 + Math.random() * 60;
        if (type === 'moving_car' && ox < goalX / 2) { type = 'car'; }

        let obsWidth = 50; let obsHeight = 50;
        let groundY = getGroundY(ox);
        let obsY = groundY;

        if (type === 'car' || type === 'moving_car') { obsWidth = 70; obsHeight = 45; obsY = groundY + 15; }
        else if (type === 'box') { obsWidth = 50; obsHeight = 50; obsY = groundY + 10; }
        else if (type === 'cone') { obsWidth = 40; obsHeight = 45; obsY = groundY + 15; }
        else if (type === 'cat') { obsWidth = 50; obsHeight = 50; obsY = groundY + 10; }
        else if (type === 'puddle') { obsWidth = 70; obsHeight = 15; obsY = groundY + 45; }
        else if (type === 'pit') { obsWidth = 140; obsHeight = 160; obsY = groundY + 60; }
        else if (type === 'spring') { obsWidth = 50; obsHeight = 40; obsY = groundY + 20; }
        else if (type === 'bird') { obsWidth = 45; obsHeight = 35; obsY = groundY - 80 - Math.random() * 40; }

        obstacles.push({ 
            x: ox, y: obsY, width: obsWidth, height: obsHeight, 
            type: type, active: true, vx: 0, isRunning: false 
        });
    }

    // ダッシュパネル
    dashPanels = [];
    for (let i = 1; i < 20; i++) {
        let px = i * 750 + Math.random() * 100;
        let nearObs = obstacles.find(obs => Math.abs(obs.x - px) < 100);
        if (!nearObs) {
            let gy = getGroundY(px);
            dashPanels.push({ x: px, y: gy + 45, width: 60, height: 15 });
        }
    }

    // クッキー・骨・バリア・【新機能】ケントのインカムアイテムの配置
    cookies = [];
    bones = []; 
    shieldItems = [];
    ryderItems = [];

    let currentX = 400;
    while (currentX < goalX - 500) {
        currentX += 80 + Math.random() * 140;
        let nearObs = obstacles.find(obs => Math.abs(obs.x - currentX) < 180);
        let numGroup = Math.floor(Math.random() * 2) + 3;
        let groupHeightType = Math.random();

        let randItem = Math.random();
        let spawnBone = isLifeMode && (randItem < 0.05);
        let spawnShield = false;
        if (!spawnBone && selectedCharKey === 'rocky' && randItem >= 0.05 && randItem < 0.08) {
            spawnShield = true;
        }
        
        // 【新機能】たまにケントのインカムアイテムを出現させる(確率4%)
        let spawnRyder = !spawnBone && !spawnShield && (randItem >= 0.08 && randItem < 0.12);

        if (spawnBone) {
            let bx = currentX; let groundY = getGroundY(bx);
            bones.push({ x: bx, y: groundY - 50, width: 35, height: 35, collected: false });
            currentX += 100; continue;
        }
        if (spawnShield) {
            let sx = currentX; let groundY = getGroundY(sx);
            shieldItems.push({ x: sx, y: groundY - 50, width: 40, height: 40, collected: false });
            currentX += 100; continue;
        }
        if (spawnRyder) {
            let rx = currentX; let groundY = getGroundY(rx);
            // 宙に浮かせる
            ryderItems.push({ x: rx, y: groundY - 90, width: 35, height: 35, collected: false });
            currentX += 100; continue;
        }

        for (let j = 0; j < numGroup; j++) {
            let cx = currentX + j * 42;
            let groundY = getGroundY(cx);
            let cy = groundY - 45;
            if (nearObs) {
                if (nearObs.type === 'puddle') cy = groundY - 95;
                else if (nearObs.type === 'pit') cy = groundY - 90;
                else if (nearObs.type === 'spring') cy = groundY - 120;
                else if (nearObs.type === 'car' || nearObs.type === 'moving_car' || nearObs.type === 'box' || nearObs.type === 'cone' || nearObs.type === 'bird') {
                    if (groupHeightType < 0.5) cy = groundY - 155; else cy = groundY - 95;  
                }
            } else {
                if (groupHeightType < 0.4) cy = groundY - 85;
            }
            if (cy < 350) cookies.push({ x: cx, y: cy, width: 30, height: 30, collected: false });
        }
        currentX += numGroup * 42;
    }
}

function triggerDamage() {
    if (player.invincibleTimer > 0) return;
    if (hasRockyShield) {
        hasRockyShield = false;
        player.invincibleTimer = 60;
        playSe(audioAssets.seHeal);
        addTextPopup(player.x + 30, player.y - 10, "バリアをうしなった！", "#EF4444");
        return;
    }

    playSe(audioAssets.seDamage);
    addTextPopup(player.x + 30, player.y - 10, "イタッ！", "#EF4444");
    
    if (isLifeMode) {
        lives--;
        if (lives <= 0) { lives = 0; triggerGameOver(); return; }
    }

    if (score > 0) {
        score--;
        droppedCookies.push({
            x: player.x + player.width / 2, y: player.y + player.height / 2,
            vx: -2 - Math.random() * 3, vy: -7 - Math.random() * 3, 
            gravity: 0.5, rotation: 0, rotSpeed: (Math.random() - 0.5) * 0.2
        });
    }
    player.invincibleTimer = 120; 
}

function triggerPitFall() {
    if (selectedCharKey === 'rubble' && rubbleRecoveryCount < 3) {
        rubbleRecoveryCount++;
        player.isFallingInPit = false;
        player.vy = -14; 
        player.isJumping = true;
        jumpCounter = 0;
        playSe(audioAssets.seJump);
        addTextPopup(player.x + 30, player.y - 10, "ド根性ふっかつ！", "#EAB308");
        return;
    }

    playSe(audioAssets.sePit);
    addTextPopup(player.x + 30, player.y - 10, "あなにおちた！", "#EF4444");

    if (isLifeMode) {
        lives--;
        if (lives <= 0) { lives = 0; triggerGameOver(); return; }
    }

    if (player.invincibleTimer === 0 && score > 0) {
        score--;
        droppedCookies.push({
            x: player.x + player.width / 2, y: player.y + player.height / 2,
            vx: -2 - Math.random() * 3, vy: -7 - Math.random() * 3, 
            gravity: 0.5, rotation: 0, rotSpeed: (Math.random() - 0.5) * 0.2
        });
    }
    player.invincibleTimer = 120;
}

function triggerGameOver() {
    currentState = STATES.GAMEOVER;
    playBgm(audioAssets.bgmGameover);
    checkAndUnlockBadges(); // バッジ状況確認
}

function triggerGoalClear() {
    currentState = STATES.RESULT;
    playBgm(audioAssets.bgmClear);
    createConfetti();

    // 【新機能】ライフありクリアのバッジ判定
    if (isLifeMode) {
        BADGES.LIFE_CLEAR.unlocked = true;
    }

    // ランキングの登録更新
    ranking.push(score);
    ranking.sort((a, b) => b - a);
    ranking = ranking.slice(0, 5);
    localStorage.setItem("paw_game_ranking", JSON.stringify(ranking));

    checkAndUnlockBadges(); // バッジ状況確認
}

function update() {
    if (currentState === STATES.PAUSE || currentState === STATES.GAMEOVER) return;
    gameFrame++;

    if (currentState === STATES.RESULT) {
        confettiParticles.forEach(p => {
            p.x += p.vx; p.y += p.vy; p.rotation += p.rotSpeed;
            if (p.y > 400) { p.y = -20; p.x = Math.random() * 800; }
        });
        return;
    }

    if (currentState !== STATES.PLAY) return;

    const charConfig = CHARACTER_CONFIG[selectedCharKey];
    if (player.invincibleTimer > 0) player.invincibleTimer--;
    
    textPopups.forEach(p => { p.y -= 0.8; p.timer--; p.alpha = p.timer / 45; });
    textPopups = textPopups.filter(p => p.timer > 0);
    
    droppedCookies.forEach(dc => { dc.vy += dc.gravity; dc.x += dc.vx; dc.y += dc.vy; dc.rotation += dc.rotSpeed; });
    droppedCookies = droppedCookies.filter(dc => dc.y < 450);

    fallingObstacles.forEach(fo => { fo.vy += fo.gravity; fo.x += fo.vx; fo.y += fo.vy; fo.rotation += fo.rotSpeed; });
    fallingObstacles = fallingObstacles.filter(fo => fo.y < 450);

    // 【新機能】ケントのメッセージ表示タイマー
    if (ryderVoiceTimer > 0) ryderVoiceTimer--;

    // 【新機能】パウ・パックモード（磁石）のタイマー更新
    if (pawPackTimer > 0) {
        pawPackTimer--;
    }

    if (player.isFallingInPit) {
        player.vy += 0.8;
        player.y += player.vy;
        if (player.y > 420) {
            player.isFallingInPit = false;
            player.x = player.pitResetX; 
            player.y = getGroundY(player.x);
            player.vy = 0; player.isJumping = false;
        }
        cameraX = player.x - 100;
        return;
    }

    player.speedModifier = 1.0; 
    if (dashPanelTimer > 0) {
        dashPanelTimer--;
        player.speedModifier = 1.8; 
    }

    // 障害物の個別移動処理
    obstacles.forEach(obs => {
        if (obs.type === 'moving_car' && obs.active) {
            if (!obs.isRunning && obs.x - player.x < 600) {
                obs.isRunning = true;
                obs.vx = -3.5; 
            }
            if (obs.isRunning) {
                obs.x += obs.vx;
                obs.y = getGroundY(obs.x) + 15;
            }
        }
        if (obs.type === 'bird' && obs.active) {
            if (!obs.isRunning && obs.x - player.x < 700) {
                obs.isRunning = true;
                obs.vx = -4.5; 
            }
            if (obs.isRunning) {
                obs.x += obs.vx;
                obs.y += Math.sin(gameFrame * 0.15) * 1; 
            }
        }
    });

    // 水たまり判定
    let onPuddle = false;
    obstacles.forEach(obs => {
        if (obs.type === 'puddle' && obs.active) {
            if (player.x + player.width > obs.x && player.x < obs.x + obs.width && 
                player.y + player.height >= obs.y - 5 && player.y + player.height <= obs.y + obs.height + 10) {
                onPuddle = true;
            }
        }
    });

    if (onPuddle) {
        if (selectedCharKey === 'zuma') { isZumaDashing = true; } 
        else { if (dashPanelTimer === 0) player.speedModifier = 0.5; }
    }
    if (selectedCharKey === 'zuma' && isZumaDashing && dashPanelTimer === 0) {
        player.speedModifier = 1.5;
    }

    // ジャンプ・ホバー処理
    if (selectedCharKey === 'skye' && isHovering) {
        player.vy = 0;
        hoverTimer--;
        if (hoverTimer <= 0 || !isInputPressing) isHovering = false;
    } else {
        if (player.isJumping && isInputPressing && jumpCounter < charConfig.maxJumpFrames) {
            player.vy -= 0.65 * (1 - (jumpCounter / charConfig.maxJumpFrames));
            jumpCounter++;
        }
    }

    let nextX = player.x + charConfig.baseSpeed * player.speedModifier;
    let targetGroundY = getGroundY(nextX);
    let currentPit = null;

    obstacles.forEach(obs => {
        if (obs.type === 'pit' && obs.active) {
            let playerCenterX = nextX + player.width / 2;
            if (playerCenterX > obs.x + 15 && playerCenterX < obs.x + obs.width - 15) currentPit = obs;
        }
    });

    player.x = nextX;
    if (!(selectedCharKey === 'skye' && isHovering)) player.vy += player.gravity;
    player.y += player.vy;

    if (currentPit) {
        if (player.y >= targetGroundY) {
            player.isFallingInPit = true; player.vy = 4;
            player.pitResetX = currentPit.x + currentPit.width + 20;
            triggerPitFall();
            if (currentState === STATES.GAMEOVER) return;
        }
    } else {
        let currentGroundY = getGroundY(player.x);
        if (player.y >= currentGroundY) {
            player.y = currentGroundY; player.vy = 0;
            if (player.isJumping) {
                player.isJumping = false;
                if (selectedCharKey === 'zuma') isZumaDashing = false;
            }
            isHovering = false;
        }
    }

    cameraX = player.x - 100;

    // 【新機能】ケントのインカムアイテムの獲得判定
    ryderItems.forEach(item => {
        if (!item.collected && player.x < item.x + item.width && player.x + player.width > item.x &&
            player.y < item.y + item.height && player.y + player.height > item.y) {
            item.collected = true;
            playSe(audioAssets.seHeal);
            
            // パウ・パックモード発動設定
            pawPackTimer = 360; // 約6秒間持続
            isRyderCalledInSession = true;
            
            // 無線テキスト演出
            const messages = [
                "「チェイス！パウ・パックをつかって クッキーをあつめよう！」",
                "「みんな、パウ・パックモードだ！いっけー！」",
                "「トラブル発生？パウ・パックに おまかせだ！」"
            ];
            ryderVoiceText = messages[Math.floor(Math.random() * messages.length)];
            ryderVoiceTimer = 150; // 表示時間
            addTextPopup(item.x, item.y, "📞パウ・パック！", "#FF8C00");
        }
    });

    // クッキー回収判定＆【新機能】パウ・パックによる自動引き寄せ
    cookies.forEach(cookie => {
        if (!cookie.collected) {
            // パウ・パックモード（磁石）がONの時、周囲250px以内のクッキーをプレイヤーに吸い寄せる
            if (pawPackTimer > 0) {
                let dx = (player.x + player.width / 2) - cookie.x;
                let dy = (player.y + player.height / 2) - cookie.y;
                let dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 250) {
                    cookie.x += (dx / dist) * 7;
                    cookie.y += (dy / dist) * 7;
                }
            }

            // 通常の当たり判定
            if (player.x < cookie.x + cookie.width && player.x + player.width > cookie.x &&
                player.y < cookie.y + cookie.height && player.y + player.height > cookie.y) {
                cookie.collected = true;
                score++;
                currentPlaySessionCookies++; // 今回のセッション加算
                playSe(audioAssets.seCookie);
                addTextPopup(cookie.x, cookie.y, "+1", "#FEF08A");
            }
        }
    });

    // 骨回収判定
    bones.forEach(bone => {
        if (!bone.collected && player.x < bone.x + bone.width && player.x + player.width > bone.x &&
            player.y < bone.y + bone.height && player.y + player.height > bone.y) {
            bone.collected = true;
            playSe(audioAssets.seHeal);
            if (lives < 5) lives++;
            addTextPopup(bone.x, bone.y, "❤️ライフ回復", "#EF4444");
        }
    });

    // バリア回収判定
    shieldItems.forEach(shield => {
        if (!shield.collected && player.x < shield.x + shield.width && player.x + player.width > shield.x &&
            player.y < shield.y + shield.height && player.y + player.height > shield.y) {
            shield.collected = true;
            playSe(audioAssets.seHeal);
            if (selectedCharKey === 'rocky') {
                hasRockyShield = true;
                addTextPopup(shield.x, shield.y, "🔧リサイクルバリア！", "#10B981");
            }
        }
    });

    // ダッシュパネル判定
    dashPanels.forEach(panel => {
        if (player.x + player.width > panel.x && player.x < panel.x + panel.width &&
            player.y + player.height >= panel.y - 10 && player.y + player.height <= panel.y + panel.height + 5) {
            if (dashPanelTimer === 0) {
                dashPanelTimer = 60;
                playSe(audioAssets.seHeal);
                addTextPopup(player.x + 20, player.y - 10, "⚡超パウダッシュ！", "#3B82F6");
            }
        }
    });

    // 障害物・バネとの衝突判定
    obstacles.forEach(obs => {
        if (!obs.active) return;
        if (player.x + player.width - 12 > obs.x && player.x + 12 < obs.x + obs.width &&
            player.y + player.height - 5 > obs.y && player.y + 5 < obs.y + obs.height) {
            
            if (obs.type === 'spring') {
                player.vy = -14.5;
                player.isJumping = true;
                jumpCounter = 0;
                playSe(audioAssets.seJump);
                addTextPopup(obs.x + 10, obs.y - 10, "大ジャンプ！", "#EF4444");
                
                if (selectedCharKey === 'marshall') {
                    player.vy = -18.5; 
                    addTextPopup(player.x, player.y - 30, "🔥ウルトラ大ジャンプ！", "#DC2626");
                }
            } else if (obs.type === 'pit' || obs.type === 'puddle') {
                // 特殊障害物はスルー
            } else {
                if (selectedCharKey === 'marshall') {
                    obs.active = false;
                    player.vy = -13.0;
                    player.isJumping = true;
                    jumpCounter = 0;
                    fallingObstacles.push({
                        x: obs.x, y: obs.y, width: obs.width, height: obs.height, type: obs.type,
                        vx: 4 + Math.random() * 3, vy: -6 - Math.random() * 3, gravity: 0.5, rotation: 0, rotSpeed: 0.15
                    });
                    playSe(audioAssets.seJump);
                    addTextPopup(obs.x, obs.y - 10, "🔥ファイヤージャンプ！", "#DC2626");
                } else {
                    triggerDamage();
                }
            }
        }
    });

    // ゴール到達判定
    if (player.x >= goalX) {
        triggerGoalClear();
    }
}

// --- 画面描画処理 ---
function draw() {
    ctx.clearRect(0, 0, 800, 400);

    if (currentState === STATES.TITLE) {
        // タイトル背景
        ctx.fillStyle = "#87CEEB"; ctx.fillRect(0, 0, 800, 400);
        ctx.fillStyle = "#1E3A8A"; ctx.font = "bold 36px sans-serif"; ctx.textAlign = "center";
        ctx.fillText("パウ・パトロール風 横スクロールゲーム", 400, 120);

        ctx.fillStyle = "#FFFFFF"; ctx.font = "20px sans-serif";
        ctx.fillText("画面をタッチして スタート！", 400, 220);

        // ランキング表示ボタン
        ctx.fillStyle = "#3B82F6"; drawRoundedRect(ctx, rankingButton.x, rankingButton.y, rankingButton.width, rankingButton.height, 10);
        ctx.fillStyle = "#FFFFFF"; ctx.font = "bold 16px sans-serif"; ctx.fillText("🏆 ランキング", rankingButton.x + 80, rankingButton.y + 28);

        // 【新機能】パウ・バッジ図鑑ボタンの描画
        ctx.fillStyle = "#EAB308"; drawRoundedRect(ctx, badgeButton.x, badgeButton.y, badgeButton.width, badgeButton.height, 10);
        ctx.fillStyle = "#FFFFFF"; ctx.font = "bold 16px sans-serif"; ctx.fillText("🎖️ パウ・バッジ", badgeButton.x + 80, badgeButton.y + 28);
        return;
    }

    if (currentState === STATES.RANKING_VIEW) {
        ctx.fillStyle = "#1E3A8A"; ctx.fillRect(0, 0, 800, 400);
        ctx.fillStyle = "#FFFFFF"; ctx.font = "bold 30px sans-serif"; ctx.textAlign = "center";
        ctx.fillText("🏆 ハイスコア ランキング 🏆", 400, 70);
        
        ctx.font = "22px sans-serif";
        for (let i = 0; i < 5; i++) {
            let scoreVal = ranking[i] !== undefined ? ranking[i] + " こ" : "---";
            ctx.fillText(`${i + 1}い : ${scoreVal}`, 400, 130 + i * 35);
        }
        ctx.fillStyle = "#EF4444"; drawRoundedRect(ctx, rankingBackButton.x, rankingBackButton.y, rankingBackButton.width, rankingBackButton.height, 10);
        ctx.fillStyle = "#FFFFFF"; ctx.font = "bold 20px sans-serif"; ctx.fillText("もどる", rankingBackButton.x + 80, rankingBackButton.y + 32);
        return;
    }

    // 【新機能】パウ・バッジ図鑑画面の描画
    if (currentState === STATES.BADGE_VIEW) {
        ctx.fillStyle = "#3A3A3A"; ctx.fillRect(0, 0, 800, 400);
        ctx.fillStyle = "#EAB308"; ctx.font = "bold 28px sans-serif"; ctx.textAlign = "center";
        ctx.fillText("🎖️ パウ・バッジずかん 🎖️", 400, 50);

        // 4つのバッジをグリッド表示
        const keys = Object.keys(BADGES);
        keys.forEach((key, idx) => {
            let badge = BADGES[key];
            let bx = 60 + (idx % 2) * 360;
            let by = 90 + Math.floor(idx / 2) * 110;

            // バッジ枠
            ctx.fillStyle = badge.unlocked ? "#FFFDF0" : "#555555";
            drawRoundedRect(ctx, bx, by, 320, 90, 12);
            ctx.lineWidth = 3;
            ctx.strokeStyle = badge.unlocked ? "#EAB308" : "#888888";
            ctx.stroke();

            // テキスト
            ctx.textAlign = "left";
            ctx.fillStyle = badge.unlocked ? "#000000" : "#AAAAAA";
            ctx.font = "bold 18px sans-serif";
            ctx.fillText(badge.title, bx + 20, by + 35);
            ctx.font = "14px sans-serif";
            ctx.fillStyle = badge.unlocked ? "#555555" : "#777777";
            ctx.fillText(badge.desc, bx + 20, by + 65);

            // ロック状態アイコン
            if (!badge.unlocked) {
                ctx.font = "bold 16px sans-serif";
                ctx.fillStyle = "#FF4444";
                ctx.textAlign = "right";
                ctx.fillText("🔒未開放", bx + 300, by + 35);
            }
        });

        // 戻るボタン
        ctx.fillStyle = "#EF4444"; drawRoundedRect(ctx, badgeBackButton.x, badgeBackButton.y, badgeBackButton.width, badgeBackButton.height, 10);
        ctx.fillStyle = "#FFFFFF"; ctx.font = "bold 18px sans-serif"; ctx.textAlign = "center";
        ctx.fillText("タイトルへもどる", badgeBackButton.x + 80, badgeBackButton.y + 28);
        return;
    }

    if (currentState === STATES.CHAR_SELECT) {
        ctx.fillStyle = "#BFDBFE"; ctx.fillRect(0, 0, 800, 400);
        ctx.fillStyle = "#1E3A8A"; ctx.font = "bold 26px sans-serif"; ctx.textAlign = "center";
        ctx.fillText("だれで はしる？ キャラクターを えらんでね！", 400, 50);

        Object.keys(charButtons).forEach(key => {
            let btn = charButtons[key];
            let config = CHARACTER_CONFIG[key];
            ctx.fillStyle = config.color; drawRoundedRect(ctx, btn.x, btn.y, btn.width, btn.height, 15);
            ctx.fillStyle = "#FFFFFF"; ctx.font = "bold 20px sans-serif"; ctx.fillText(config.name, btn.x + 105, btn.y + 45);
            ctx.font = "12px sans-serif"; ctx.fillText(config.skillTitle, btn.x + 105, btn.y + 80);
        });

        // 詳細ポップアップ表示
        if (showCharPopup) {
            let config = CHARACTER_CONFIG[popupCharKey];
            ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillRect(0, 0, 800, 400);
            ctx.fillStyle = "#FFFFFF"; drawRoundedRect(ctx, popupRect.x, popupRect.y, popupRect.width, popupRect.height, 20);
            ctx.lineWidth = 5; ctx.strokeStyle = config.color; ctx.stroke();

            ctx.fillStyle = "#FF0000"; ctx.fillRect(popupCloseBtn.x, popupCloseBtn.y, popupCloseBtn.width, popupCloseBtn.height);
            ctx.fillStyle = "#FFFFFF"; ctx.font = "bold 20px sans-serif"; ctx.fillText("X", popupCloseBtn.x + 15, popupCloseBtn.y + 22);

            ctx.fillStyle = "#000000"; ctx.font = "bold 28px sans-serif"; ctx.fillText(config.name, 400, 110);
            ctx.font = "bold 18px sans-serif"; ctx.fillStyle = config.color; ctx.fillText(config.skillTitle, 400, 155);
            ctx.font = "15px sans-serif"; ctx.fillStyle = "#374151"; ctx.fillText(config.skillDesc, 400, 200);

            ctx.fillStyle = config.color; drawRoundedRect(ctx, popupSelectBtn.x, popupSelectBtn.y, popupSelectBtn.width, popupSelectBtn.height, 10);
            ctx.fillStyle = "#FFFFFF"; ctx.font = "bold 20px sans-serif"; ctx.fillText("これできまり！", popupSelectBtn.x + 100, popupSelectBtn.y + 32);
        }
        return;
    }

    if (currentState === STATES.MODE_SELECT) {
        ctx.fillStyle = "#FEF08A"; ctx.fillRect(0, 0, 800, 400);
        ctx.fillStyle = "#1E3A8A"; ctx.font = "bold 26px sans-serif"; ctx.textAlign = "center";
        ctx.fillText("ゲームの むずかしさを えらんでね！", 400, 80);
        ctx.drawImage(btnImgNoLife, modeButtons.noLife.x, modeButtons.noLife.y);
        ctx.drawImage(btnImgWithLife, modeButtons.withLife.x, modeButtons.withLife.y);
        return;
    }

    // 【新機能】ステージ選択画面の描画
    if (currentState === STATES.STAGE_SELECT) {
        ctx.fillStyle = "#E0F2FE"; ctx.fillRect(0, 0, 800, 400);
        ctx.fillStyle = "#1E3A8A"; ctx.font = "bold 26px sans-serif"; ctx.textAlign = "center";
        ctx.fillText("どこの ステージを はしる？ 🌆🏝️❄️", 400, 70);

        Object.keys(stageButtons).forEach(key => {
            let btn = stageButtons[key];
            let st = STAGES[key];
            
            // ボタンの背景色をステージに合わせる
            ctx.fillStyle = st.skyColor; drawRoundedRect(ctx, btn.x, btn.y, btn.width, btn.height, 15);
            ctx.lineWidth = 3; ctx.strokeStyle = "#1E3A8A"; ctx.stroke();

            // 下部に地面の色
            ctx.fillStyle = st.groundColor; ctx.fillRect(btn.x + 2, btn.y + 110, btn.width - 4, 38);

            ctx.fillStyle = "#000"; ctx.font = "bold 20px sans-serif";
            ctx.fillText(st.name, btn.x + 110, btn.y + 65);
        });
        return;
    }

    // --- メインプレイ画面描画（PLAY / PAUSE / RESULT / GAMEOVER） ---
    // 【1】ステージ選択に応じた背景色の適用
    ctx.fillStyle = STAGES[selectedStageKey].skyColor;
    ctx.fillRect(0, 0, 800, 400);

    // 遠景（背景装飾）のダイナミック描画
    bgBuildings.forEach(b => {
        let screenX = (b.x - cameraX * 0.3) % 1200; 
        if (screenX < -200) screenX += 1200;
        
        ctx.fillStyle = b.color;
        if (b.type === "building") {
            // いつもの街：ビル群
            ctx.fillRect(screenX, 400 - b.height, b.width, b.height);
            ctx.fillStyle = "rgba(255,255,255,0.4)";
            for (let row = 0; row < b.height / 30; row++) {
                for (let col = 0; col < b.width / 25; col++) {
                    ctx.fillRect(screenX + 8 + col * 22, 400 - b.height + 10 + row * 28, 12, 16);
                }
            }
        } else if (b.type === "palm") {
            // うみのビーチ：ヤシの木
            let ty = 340 - b.height * 0.5;
            ctx.fillStyle = "#8B4513"; ctx.fillRect(screenX + 20, ty, 10, b.height * 0.5); // 幹
            ctx.fillStyle = "#228B22"; // 葉
            ctx.beginPath(); ctx.arc(screenX + 25, ty, 25, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(screenX, ty - 10, 20, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(screenX + 50, ty - 10, 20, 0, Math.PI * 2); ctx.fill();
        } else if (b.type === "pine") {
            // ゆきやま：雪の積もったモミの木
            let ty = 320 - b.height * 0.4;
            ctx.fillStyle = "#5C4033"; ctx.fillRect(screenX + 20, ty, 8, b.height * 0.4); // 幹
            ctx.fillStyle = "#013220"; // モミの木本体
            ctx.beginPath(); ctx.polygon = [[screenX + 24, ty - 40], [screenX - 10, ty], [screenX + 58, ty]];
            ctx.moveTo(screenX + 24, ty - 40); ctx.lineTo(screenX - 10, ty); ctx.lineTo(screenX + 58, ty); ctx.fill();
            // 積雪
            ctx.fillStyle = "#FFFFFF";
            ctx.beginPath(); ctx.moveTo(screenX + 24, ty - 40); ctx.lineTo(screenX + 10, ty - 20); ctx.lineTo(screenX + 38, ty - 20); ctx.fill();
        }
    });

    // 地面の描画
    ctx.fillStyle = STAGES[selectedStageKey].groundColor;
    ctx.beginPath();
    ctx.moveTo(0, 400);
    for (let sx = 0; sx <= 800; sx += 10) {
        let gx = sx + cameraX;
        let gy = getGroundY(gx);
        ctx.lineTo(sx, gy + 45);
    }
    ctx.lineTo(800, 400);
    ctx.fill();

    // 地面のデコレーション線
    ctx.strokeStyle = "rgba(0,0,0,0.15)"; ctx.lineWidth = 4;
    ctx.beginPath();
    for (let sx = 0; sx <= 800; sx += 10) {
        let gx = sx + cameraX; let gy = getGroundY(gx);
        if (sx === 0) ctx.moveTo(sx, gy + 45); else ctx.lineTo(sx, gy + 45);
    }
    ctx.stroke();

    // 各種ゲームオブジェクト描画
    dashPanels.forEach(panel => {
        let sx = panel.x - cameraX;
        if (sx > -100 && sx < 900) ctx.drawImage(imgAssets.items.dashPanel, sx, panel.y, panel.width, panel.height);
    });

    obstacles.forEach(obs => {
        if (!obs.active) return;
        let sx = obs.x - cameraX;
        if (sx > -150 && sx < 950) {
            if (obs.type === 'pit') {
                ctx.fillStyle = "#451A03"; ctx.fillRect(sx, obs.y - 12, obs.width, obs.height);
                ctx.fillStyle = "#1C1917"; ctx.fillRect(sx + 8, obs.y - 4, obs.width - 16, obs.height);
            } else if (obs.type === 'spring') {
                ctx.drawImage(imgAssets.items.spring, sx, obs.y, obs.width, obs.height);
            } else if (obs.type === 'bird') {
                ctx.drawImage(imgAssets.obstacles.bird, sx, obs.y, obs.width, obs.height);
            } else {
                let img = imgAssets.obstacles[obs.type];
                if (img && img.complete) ctx.drawImage(img, sx, obs.y, obs.width, obs.height);
                else { ctx.fillStyle = "#94A3B8"; ctx.fillRect(sx, obs.y, obs.width, obs.height); }
            }
        }
    });

    cookies.forEach(cookie => {
        if (cookie.collected) return;
        let sx = cookie.x - cameraX;
        if (sx > -50 && sx < 850) {
            if (imgAssets.items.cookie.complete) ctx.drawImage(imgAssets.items.cookie, sx, cookie.y, cookie.width, cookie.height);
            else { ctx.fillStyle = "#F59E0B"; ctx.beginPath(); ctx.arc(sx + 15, cookie.y + 15, 12, 0, Math.PI * 2); ctx.fill(); }
        }
    });

    bones.forEach(bone => {
        if (bone.collected) return;
        let sx = bone.x - cameraX;
        if (sx > -50 && sx < 850) ctx.drawImage(imgAssets.items.bone, sx, bone.y, bone.width, bone.height);
    });

    shieldItems.forEach(shield => {
        if (shield.collected) return;
        let sx = shield.x - cameraX;
        if (sx > -50 && sx < 850) ctx.drawImage(imgAssets.items.rockyShield, sx, shield.y, shield.width, shield.height);
    });

    // 【新機能】ケントのインカムアイテムの描画
    ryderItems.forEach(item => {
        if (item.collected) return;
        let sx = item.x - cameraX;
        if (sx > -50 && sx < 850) ctx.drawImage(imgAssets.items.ryderIncome, sx, item.y, item.width, item.height);
    });

    droppedCookies.forEach(dc => {
        ctx.save();
        ctx.translate(dc.x, dc.y); ctx.rotate(dc.rotation);
        ctx.drawImage(imgAssets.items.cookie, -15, -15, 30, 30);
        ctx.restore();
    });

    fallingObstacles.forEach(fo => {
        let img = imgAssets.obstacles[fo.type];
        if (img) {
            ctx.save(); ctx.translate(fo.x - cameraX, fo.y); ctx.rotate(fo.rotation);
            ctx.drawImage(img, -fo.width / 2, -fo.height / 2, fo.width, fo.height);
            ctx.restore();
        }
    });

    // ゴールタワー
    let goalSx = goalX - cameraX;
    if (goalSx > -300 && goalSx < 1100) {
        ctx.fillStyle = "#CBD5E1"; ctx.fillRect(goalSx, 40, 40, 320);
        ctx.fillStyle = "#EF4444"; ctx.fillRect(goalSx - 20, 40, 80, 50);
        ctx.fillStyle = "#FFFFFF"; ctx.font = "bold 20px sans-serif"; ctx.textAlign = "center";
        ctx.fillText("GOAL", goalSx + 20, 72);
    }

    // プレイヤーの描画
    if (player.invincibleTimer === 0 || Math.floor(gameFrame / 4) % 2 === 0) {
        let charImg = imgAssets.chars[selectedCharKey].run1;
        if (player.isJumping) charImg = imgAssets.chars[selectedCharKey].jump;
        else if (Math.floor(gameFrame / 6) % 2 === 0) charImg = imgAssets.chars[selectedCharKey].run2;

        if (charImg && charImg.complete) {
            ctx.drawImage(charImg, player.x - cameraX, player.y, player.width, player.height);
        } else {
            ctx.fillStyle = CHARACTER_CONFIG[selectedCharKey].color;
            ctx.fillRect(player.x - cameraX, player.y, player.width, player.height);
        }

        // ロッキーバリアエフェクト
        if (hasRockyShield) {
            ctx.strokeStyle = "rgba(16, 185, 129, 0.6)"; ctx.lineWidth = 4;
            ctx.beginPath(); ctx.arc(player.x - cameraX + player.width / 2, player.y + player.height / 2, player.width * 0.7, 0, Math.PI * 2); ctx.stroke();
        }
        
        // 【新機能】パウ・パックモードの磁力エフェクト
        if (pawPackTimer > 0) {
            ctx.strokeStyle = "rgba(255, 140, 0, 0.5)"; ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(player.x - cameraX + player.width / 2, player.y + player.height / 2, player.width * 0.8 + Math.sin(gameFrame * 0.2) * 5, 0, Math.PI * 2);
            ctx.stroke();
        }
    }

    // ポップアップテキスト
    textPopups.forEach(p => {
        ctx.save(); ctx.globalAlpha = p.alpha;
        ctx.fillStyle = p.color; ctx.font = "bold 18px sans-serif"; ctx.textAlign = "center";
        ctx.fillText(p.text, p.x - cameraX, p.y); ctx.restore();
    });

    // UIオーバーレイ表示
    ctx.fillStyle = "rgba(0, 0, 0, 0.4)"; drawRoundedRect(ctx, 15, 15, 230, 50, 10);
    ctx.fillStyle = "#FEF08A"; ctx.font = "bold 22px sans-serif"; ctx.textAlign = "left";
    ctx.fillText(`🍪 クッキー: ${score} こ`, 30, 48);

    if (isLifeMode) {
        let heartStr = ""; for (let i = 0; i < 5; i++) heartStr += (i < lives) ? "❤️" : "🖤";
        ctx.font = "18px sans-serif"; ctx.fillText(heartStr, 270, 46);
    } else {
        ctx.fillStyle = "#10B981"; ctx.font = "bold 18px sans-serif"; ctx.fillText("💚 むげんライフ", 270, 46);
    }

    // 【新機能】ケントの無線ボイステキスト表示
    if (ryderVoiceTimer > 0) {
        ctx.fillStyle = "rgba(0, 0, 0, 0.75)";
        drawRoundedRect(ctx, 100, 80, 600, 45, 8);
        ctx.fillStyle = "#FF8C00"; ctx.font = "bold 16px sans-serif"; ctx.textAlign = "center";
        ctx.fillText(ryderVoiceText, 400, 108);
    }

    // ポーズボタン
    ctx.fillStyle = "#64748B"; drawRoundedRect(ctx, pauseButton.x, pauseButton.y, pauseButton.width, pauseButton.height, 10);
    ctx.fillStyle = "#FFFFFF"; ctx.font = "bold 14px sans-serif"; ctx.textAlign = "center";
    ctx.fillText("ポーズ", pauseButton.x + 25, pauseButton.y + 30);

    // 進捗インジケータ
    let progress = player.x / goalX; if (progress > 1) progress = 1;
    ctx.fillStyle = "rgba(255,255,255,0.5)"; drawRoundedRect(ctx, 300, 15, 200, 10, 5);
    ctx.fillStyle = "#3B82F6"; drawRoundedRect(ctx, 300, 15, 200 * progress, 10, 5);

    if (currentState === STATES.PAUSE) {
        ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(0, 0, 800, 400);
        ctx.fillStyle = "#FFFFFF"; ctx.font = "bold 36px sans-serif"; ctx.textAlign = "center";
        ctx.fillText("ポーズちゅう", 400, 180);
        ctx.font = "18px sans-serif"; ctx.fillText("画面をタッチして さいかい", 400, 230);
    }

    if (currentState === STATES.GAMEOVER) {
        ctx.fillStyle = "rgba(0,0,0,0.7)"; ctx.fillRect(0, 0, 800, 400);
        ctx.fillStyle = "#EF4444"; ctx.font = "bold 42px sans-serif"; ctx.textAlign = "center";
        ctx.fillText("ゲームオーバー", 400, 150);
        ctx.fillStyle = "#FFFFFF"; ctx.font = "20px sans-serif";
        ctx.fillText(`あつめたクッキー: ${score} こ`, 400, 210);
        ctx.font = "16px sans-serif"; ctx.fillText("画面をタッチして タイトルへ", 400, 270);
    }

    if (currentState === STATES.RESULT) {
        confettiParticles.forEach(p => {
            ctx.fillStyle = p.color;
            ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rotation);
            ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size); ctx.restore();
        });

        ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillRect(0, 0, 800, 400);
        ctx.fillStyle = "#EAB308"; ctx.font = "bold 45px sans-serif"; ctx.textAlign = "center";
        ctx.fillText("🎉 ゴール！おめでとう！ 🎉", 400, 130);
        ctx.fillStyle = "#FFFFFF"; ctx.font = "bold 24px sans-serif";
        ctx.fillText(`ゲットしたクッキー: ${score} こ`, 400, 200);
        ctx.font = "16px sans-serif"; ctx.fillText("画面をタッチして タイトルへ", 400, 280);
    }
}

function drawRoundedRect(ctx, x, y, width, height, radius) {
    ctx.beginPath(); ctx.moveTo(x + radius, y); ctx.lineTo(x + width - radius, y);
    ctx.quadraticCurveTo(x + width, y, x + width, y + radius); ctx.lineTo(x + width, y + height - radius);
    ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height); ctx.lineTo(x + radius, y + height);
    ctx.quadraticCurveTo(x, y + height, x, y + height - radius); ctx.lineTo(x, y + radius);
    ctx.quadraticCurveTo(x, y, x + radius, y); ctx.closePath(); ctx.fill();
}

// --- 入力制御・ジャンプアクション処理 ---
function triggerJumpStart() {
    if (player.isFallingInPit) return;
    const charConfig = CHARACTER_CONFIG[selectedCharKey];

    if (!player.isJumping) {
        player.vy = -charConfig.jumpPower;
        player.isJumping = true;
        jumpCounter = 0;
        playSe(audioAssets.seJump);
    } else {
        // スカイの2段目ホバー飛行
        if (selectedCharKey === 'skye' && !isHovering) {
            isHovering = true;
            hoverTimer = 75; // フライングホバー持続時間
            playSe(audioAssets.seJump);
            addTextPopup(player.x, player.y, "🚀 フライング・ホバー！", "#EC4899");
        }
    }
}
function triggerJumpEnd() {
    isInputPressing = false;
    if (selectedCharKey === 'skye') isHovering = false;
}

function handleInputStart(clientX, clientY) {
    if (!isAudioInitialized) { isAudioInitialized = true; playBgm(audioAssets.bgmTitle); }

    const rect = canvas.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    // 実描画スケールに合わせた座標に変換
    const canvasScaleX = 800 / rect.width;
    const canvasScaleY = 400 / rect.height;
    const mouseX = (clientX - rect.left) * canvasScaleX;
    const mouseY = (clientY - rect.top) * canvasScaleY;

    if (currentState === STATES.TITLE) {
        // ランキング確認ボタン判定
        if (mouseX >= rankingButton.x && mouseX <= rankingButton.x + rankingButton.width &&
            mouseY >= rankingButton.y && mouseY <= rankingButton.y + rankingButton.height) {
            currentState = STATES.RANKING_VIEW; return;
        }
        // 【新機能】パウ・バッジ確認ボタン判定
        if (mouseX >= badgeButton.x && mouseX <= badgeButton.x + badgeButton.width &&
            mouseY >= badgeButton.y && mouseY <= badgeButton.y + badgeButton.height) {
            currentState = STATES.BADGE_VIEW; return;
        }
        currentState = STATES.CHAR_SELECT;
        showCharPopup = false;
        return;
    }

    if (currentState === STATES.RANKING_VIEW) {
        if (mouseX >= rankingBackButton.x && mouseX <= rankingBackButton.x + rankingBackButton.width &&
            mouseY >= rankingBackButton.y && mouseY <= rankingBackButton.y + rankingBackButton.height) {
            currentState = STATES.TITLE;
        }
        return;
    }

    // 【新機能】パウ・バッジ画面戻るボタン判定
    if (currentState === STATES.BADGE_VIEW) {
        if (mouseX >= badgeBackButton.x && mouseX <= badgeBackButton.x + badgeBackButton.width &&
            mouseY >= badgeBackButton.y && mouseY <= badgeBackButton.y + badgeBackButton.height) {
            currentState = STATES.TITLE;
        }
        return;
    }

    if (currentState === STATES.CHAR_SELECT) {
        if (showCharPopup) {
            if (mouseX >= popupCloseBtn.x && mouseX <= popupCloseBtn.x + popupCloseBtn.width &&
                mouseY >= popupCloseBtn.y && mouseY <= popupCloseBtn.y + popupCloseBtn.height) {
                showCharPopup = false; return;
            }
            if (mouseX >= popupSelectBtn.x && mouseX <= popupSelectBtn.x + popupSelectBtn.width &&
                mouseY >= popupSelectBtn.y && mouseY <= popupSelectBtn.y + popupSelectBtn.height) {
                selectedCharKey = popupCharKey;
                showCharPopup = false;
                currentState = STATES.MODE_SELECT;
                return;
            }
            return;
        }
        Object.keys(charButtons).forEach(key => {
            let btn = charButtons[key];
            if (mouseX >= btn.x && mouseX <= btn.x + btn.width && mouseY >= btn.y && mouseY <= btn.y + btn.height) {
                popupCharKey = key; showCharPopup = true;
            }
        });
        return;
    }

    if (currentState === STATES.MODE_SELECT) {
        if (mouseX >= modeButtons.noLife.x && mouseX <= modeButtons.noLife.x + modeButtons.noLife.width &&
            mouseY >= modeButtons.noLife.y && mouseY <= modeButtons.noLife.y + modeButtons.noLife.height) {
            isLifeMode = false;
            currentState = STATES.STAGE_SELECT; // 【新機能】ステージ選択へ進む
        }
        if (mouseX >= modeButtons.withLife.x && mouseX <= modeButtons.withLife.x + modeButtons.withLife.width &&
            mouseY >= modeButtons.withLife.y && mouseY <= modeButtons.withLife.y + modeButtons.withLife.height) {
            isLifeMode = true;
            currentState = STATES.STAGE_SELECT; // 【新機能】ステージ選択へ進む
        }
        return;
    }

    // 【新機能】ステージ選択ボタン判定
    if (currentState === STATES.STAGE_SELECT) {
        Object.keys(stageButtons).forEach(key => {
            let btn = stageButtons[key];
            if (mouseX >= btn.x && mouseX <= btn.x + btn.width &&
                mouseY >= btn.y && mouseY <= btn.y + btn.height) {
                selectedStageKey = key; // ステージ確定
                initGame();
                currentState = STATES.PLAY;
                playBgm(audioAssets.bgmPlay);
            }
        });
        return;
    }

    if (currentState === STATES.PLAY) {
        // 右上ポーズボタン判定
        if (mouseX >= pauseButton.x && mouseX <= pauseButton.x + pauseButton.width &&
            mouseY >= pauseButton.y && mouseY <= pauseButton.y + pauseButton.height) {
            currentState = STATES.PAUSE; currentActiveBgm.pause(); return;
        }
        isInputPressing = true;
        triggerJumpStart();
        return;
    }

    if (currentState === STATES.PAUSE) {
        currentState = STATES.PLAY;
        resumeBgmOnShow();
        return;
    }

    if (currentState === STATES.RESULT || currentState === STATES.GAMEOVER) {
        currentState = STATES.TITLE; playBgm(audioAssets.bgmTitle);
    }
}

window.addEventListener("mousedown", (e) => { handleInputStart(e.clientX, e.clientY); });
window.addEventListener("mouseup", () => { triggerJumpEnd(); });

window.addEventListener("touchstart", (e) => {
    if (currentState !== STATES.CHAR_SELECT && currentState !== STATES.MODE_SELECT && currentState !== STATES.STAGE_SELECT) e.preventDefault(); 
    if (e.touches.length > 0) handleInputStart(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: false });
window.addEventListener("touchend", () => { triggerJumpEnd(); });

window.addEventListener("keydown", (e) => {
    if (!isAudioInitialized) isAudioInitialized = true;
    if (e.code === "Space" && currentState === STATES.PLAY) { isInputPressing = true; triggerJumpStart(); }
});
window.addEventListener("keyup", (e) => {
    if (e.code === "Space" && currentState === STATES.PLAY) triggerJumpEnd();
});

let lastTime = performance.now();
let accumulatedTime = 0;
const deltaTimeTarget = 1000 / 60; 

function gameLoop(timestamp) {
    let elapsed = timestamp - lastTime;
    lastTime = timestamp;
    if (elapsed > 100) elapsed = 100; 
    accumulatedTime += elapsed;
    while (accumulatedTime >= deltaTimeTarget) {
        update();
        accumulatedTime -= deltaTimeTarget;
    }
    draw();
    requestAnimationFrame(gameLoop);
}
requestAnimationFrame(gameLoop);
</script>
