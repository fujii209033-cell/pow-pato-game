<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>パウ・パトロール風 横スクロールゲーム</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
        canvas {
            background-color: #87CEEB; /* 空の色 */
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            max-width: 100%;
            max-height: 100%;
        }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="800" height="400"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// --- ゲームの状態 ---
const STATES = {
    TITLE: 'TITLE',
    CHAR_SELECT: 'CHAR_SELECT',
    PLAY: 'PLAY',
    RESULT: 'RESULT'
};
let currentState = STATES.TITLE;

// --- オーディオアセット ---
const audioAssets = {
    bgmTitle: new Audio("sounds/bgm_title.mp3"),
    bgmPlay: new Audio("sounds/bgm_play.mp3"),
    bgmClear: new Audio("sounds/bgm_clear.mp3"),
    seJump: new Audio("sounds/se_jump.mp3"),
    seCookie: new Audio("sounds/se_cookie.mp3"),
    seDamage: new Audio("sounds/se_damage.mp3")
};

audioAssets.bgmTitle.loop = true;
audioAssets.bgmPlay.loop = true;
audioAssets.bgmClear.loop = true;

let currentActiveBgm = null; 

function playBgm(targetAudio) {
    audioAssets.bgmTitle.pause(); audioAssets.bgmTitle.currentTime = 0;
    audioAssets.bgmPlay.pause();  audioAssets.bgmPlay.currentTime = 0;
    audioAssets.bgmClear.pause(); audioAssets.bgmClear.currentTime = 0;
    
    currentActiveBgm = targetAudio;
    
    if (document.visibilityState === 'visible') {
        targetAudio.play().catch(e => {});
    }
}

function playSe(targetSe) {
    targetSe.currentTime = 0;
    targetSe.play().catch(e => {});
}

function stopBgmOnHide() {
    if (currentActiveBgm) currentActiveBgm.pause();
}
function resumeBgmOnShow() {
    if (currentActiveBgm && document.visibilityState === 'visible') {
        currentActiveBgm.play().catch(e => {});
    }
}
document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === 'hidden') stopBgmOnHide();
    else resumeBgmOnShow();
});
window.addEventListener("pagehide", stopBgmOnHide);
window.addEventListener("pageshow", resumeBgmOnShow);


// --- キャラクターの定数定義 ---
const CHARACTER_CONFIG = {
    chase: {
        name: "チェイス",
        color: "#1E3A8A",
        baseSpeed: 5.8,        // テンポを良くするため移動速度もわずかにアップ
        jumpPower: 11.0,       // ② スピーディーにするため初速を大幅に強化
        maxJumpFrames: 14,     // ② キビキビ落とすため、長押し有効フレームは短くシャープに
        images: { run1: "images/chase_run1.png", run2: "images/chase_run2.png", jump: "images/chase_jump.png" }
    },
    marshall: {
        name: "マーシャル",
        color: "#DC2626",
        baseSpeed: 5.3,
        jumpPower: 11.5,
        maxJumpFrames: 15,
        images: { run1: "images/marshall_run1.png", run2: "images/marshall_run2.png", jump: "images/marshall_jump.png" }
    }
};

let selectedCharKey = 'chase'; 

// --- 入力長押し判定用変数 ---
let isInputPressing = false;
let jumpCounter = 0; 

// --- 画像アセット ---
const imgAssets = { chars: {}, items: {}, obstacles: {} };
Object.keys(CHARACTER_CONFIG).forEach(charKey => {
    imgAssets.chars[charKey] = {};
    Object.keys(CHARACTER_CONFIG[charKey].images).forEach(imgKey => {
        imgAssets.chars[charKey][imgKey] = new Image();
        imgAssets.chars[charKey][imgKey].src = CHARACTER_CONFIG[charKey].images[imgKey];
    });
});
imgAssets.items.cookie = new Image();
imgAssets.items.cookie.src = "images/cookie.png";
imgAssets.items.pawStation = new Image();
imgAssets.items.pawStation.src = "images/paw_station.png";

const obstacleImages = { car: "images/car.png", box: "images/box.png", cone: "images/cone.png", cat: "images/cat.png", puddle: "images/puddle.png" };
Object.keys(obstacleImages).forEach(key => {
    imgAssets.obstacles[key] = new Image();
    imgAssets.obstacles[key].src = obstacleImages[key];
});

// --- ゲーム変数 ---
let gameFrame = 0; 
let score = 0;
let ranking = [15, 10, 5]; 

let player = {
    x: 100, y: 240, width: 60, height: 60, vy: 0, 
    gravity: 0.85, // ② もっさり感を無くすため重力を「0.45 → 0.85」へ大幅強化（キビキビ落下します）
    isJumping: false, invincibleTimer: 0, speedModifier: 1.0, isFallingInPit: false 
};

let slopePoints = [];
const SLOPE_INTERVAL = 200;
const BASE_GROUND_Y = 240; 

let droppedCookies = []; 
let fallingObstacles = []; 
let bgBuildings = [];
let cookies = [];
let obstacles = [];
let goalX = 15000; 
let cameraX = 0;

function getGroundY(x) {
    if (x < 0 || x >= goalX - 400) return BASE_GROUND_Y;
    let index = Math.floor(x / SLOPE_INTERVAL);
    if (index >= slopePoints.length - 1) return BASE_GROUND_Y;
    let p1 = slopePoints[index];
    let p2 = slopePoints[index + 1];
    let ratio = (x % SLOPE_INTERVAL) / SLOPE_INTERVAL;
    return p1 + (p2 - p1) * ratio;
}

function initGame() {
    score = 0;
    cameraX = 0;
    player.x = 100;
    player.vy = 0;
    player.isJumping = false;
    player.invincibleTimer = 0;
    player.speedModifier = 1.0;
    player.isFallingInPit = false;
    droppedCookies = [];
    fallingObstacles = [];
    jumpCounter = 0;

    // 坂道データ
    slopePoints = [];
    let numPoints = Math.ceil(goalX / SLOPE_INTERVAL) + 5;
    let lastY = BASE_GROUND_Y;
    for (let i = 0; i < numPoints; i++) {
        if (i < 3 || i > numPoints - 6) {
            slopePoints.push(BASE_GROUND_Y);
        } else {
            let change = (Math.random() - 0.5) * 50;
            let currentY = lastY + change;
            if (currentY < 180) currentY = 180;
            if (currentY > 270) currentY = 270;
            slopePoints.push(currentY);
            lastY = currentY;
        }
    }
    player.y = getGroundY(player.x);

    // 背景の建物
    bgBuildings = [];
    const colors = ["#FCA5A5", "#FECABC", "#FEF08A", "#BBF7D0", "#BFDBFE", "#E9D5FF", "#FBCFE8", "#FDE047", "#A7F3D0", "#93C5FD"];
    const roofTypes = ['flat', 'triangle', 'dome'];
    for (let i = 0; i < 75; i++) {
        bgBuildings.push({
            x: i * 220 + Math.random() * 60,
            width: 100 + Math.random() * 90,
            height: 120 + Math.random() * 140,
            color: colors[Math.floor(Math.random() * colors.length)],
            roof: roofTypes[Math.floor(Math.random() * roofTypes.length)]
        });
    }

    // 障害物配置
    obstacles = [];
    const types = ['car', 'box', 'cone', 'cat', 'puddle', 'pit'];
    for (let i = 0; i < 40; i++) {
        let type = types[Math.floor(Math.random() * types.length)];
        let obsWidth = 50; let obsHeight = 50;
        let ox = 600 + i * 360 + Math.random() * 60;
        let groundY = getGroundY(ox);
        let obsY = groundY;

        if (type === 'car') { obsWidth = 70; obsHeight = 45; obsY = groundY + 15; }
        else if (type === 'box') { obsWidth = 50; obsHeight = 50; obsY = groundY + 10; }
        else if (type === 'cone') { obsWidth = 40; obsHeight = 45; obsY = groundY + 15; }
        else if (type === 'cat') { obsWidth = 50; obsHeight = 50; obsY = groundY + 10; }
        else if (type === 'puddle') { obsWidth = 70; obsHeight = 15; obsY = groundY + 45; }
        else if (type === 'pit') { obsWidth = 140; obsHeight = 160; obsY = groundY + 60; }

        obstacles.push({ x: ox, y: obsY, width: obsWidth, height: obsHeight, type: type, active: true });
    }

    // ① クッキーの出現バランス大幅調整
    cookies = [];
    let currentX = 400;
    while (currentX < goalX - 500) {
        // 次の配置ポイントまでの間隔を少し詰めて、全体数をアップ
        currentX += 80 + Math.random() * 140; 

        // 近くにある障害物を探す
        let nearObs = obstacles.find(obs => Math.abs(obs.x - currentX) < 180);
        
        let numGroup = Math.floor(Math.random() * 2) + 3; // 3〜4個の塊
        let groupHeightType = Math.random();

        for (let j = 0; j < numGroup; j++) {
            let cx = currentX + j * 42;
            let groundY = getGroundY(cx);
            let cy = groundY - 45; // 地上のデフォルト

            if (nearObs) {
                // 障害物が近くにある場合
                if (nearObs.type === 'puddle') {
                    // 水たまり：踏めないので、飛び越える放物線に合わせた中くらいの高さに配置
                    cy = groundY - 95;
                } else if (nearObs.type === 'pit') {
                    // 落とし穴：穴をジャンプで超える位置に配置
                    cy = groundY - 90;
                } else if (nearObs.type === 'car' || nearObs.type === 'box' || nearObs.type === 'cone') {
                    // 踏める障害物：踏みつけジャンプで取れる高い位置、または手前の飛び越し位置
                    if (groupHeightType < 0.5) {
                        cy = groundY - 155; // 踏みつけ大ジャンプ用（超高所）
                    } else {
                        cy = groundY - 95;  // 通常の飛び越し用（中高所）
                    }
                }
            } else {
                // 周りに何もないプレーンな道中：地上と中くらいをバランスよく配置
                if (groupHeightType < 0.4) cy = groundY - 85; 
            }

            // マップの外や落とし穴の底には配置しない
            if (cy < 350) {
                cookies.push({ x: cx, y: cy, width: 30, height: 30, collected: false });
            }
        }
        currentX += numGroup * 42;
    }
}

function triggerDamage() {
    playSe(audioAssets.seDamage);
    if (player.invincibleTimer > 0) return; 
    
    if (score > 0) {
        score--; 
        droppedCookies.push({
            x: player.x + player.width / 2, y: player.y + player.height / 2,
            vx: -2 - Math.random() * 3, vy: -7 - Math.random() * 3, 
            gravity: 0.5, rotation: 0, rotSpeed: (Math.random() - 0.5) * 0.2
        });
    }
    player.invincibleTimer = 120; 
}

function launchObstacleEffect(obs) {
    obs.active = false;
    fallingObstacles.push({
        type: obs.type, x: obs.x, y: obs.y, width: obs.width, height: obs.height,
        vx: 1 + Math.random() * 3, vy: -6 - Math.random() * 5, gravity: 0.6, rotation: 0, rotSpeed: 0.15 + Math.random() * 0.15
    });
}

// --- 更新処理 ---
function update() {
    gameFrame++;

    if (currentState !== STATES.PLAY) return;

    const charConfig = CHARACTER_CONFIG[selectedCharKey];

    if (player.invincibleTimer > 0) player.invincibleTimer--;

    droppedCookies.forEach(dc => { dc.vy += dc.gravity; dc.x += dc.vx; dc.y += dc.vy; dc.rotation += dc.rotSpeed; });
    droppedCookies = droppedCookies.filter(dc => dc.y < 450);

    fallingObstacles.forEach(fo => { fo.vy += fo.gravity; fo.x += fo.vx; fo.y += fo.vy; fo.rotation += fo.rotSpeed; });
    fallingObstacles = fallingObstacles.filter(fo => fo.y < 450);

    // 落とし穴落下中
    if (player.isFallingInPit) {
        player.vy += 0.8; player.y += player.vy;
        if (player.y > 420) {
            player.isFallingInPit = false;
            player.x = player.pitResetX; 
            player.y = getGroundY(player.x);
            player.vy = 0; player.isJumping = false;
        }
        cameraX = player.x - 100;
        return; 
    }

    player.speedModifier = 1.0; 

    // ② 【修正】長押し中の追加浮遊パワーも重力に合わせてクイックに調整
    if (player.isJumping && isInputPressing && jumpCounter < charConfig.maxJumpFrames) {
        player.vy -= 0.65 * (1 - (jumpCounter / charConfig.maxJumpFrames));
        jumpCounter++;
    }

    let nextX = player.x + charConfig.baseSpeed * player.speedModifier;
    let targetGroundY = getGroundY(nextX);

    let currentPit = null;
    obstacles.forEach(obs => {
        if (obs.type === 'pit' && obs.active) {
            let playerCenterX = nextX + player.width / 2;
            if (playerCenterX > obs.x + 15 && playerCenterX < obs.x + obs.width - 15) currentPit = obs;
        }
    });

    player.x = nextX;
    player.vy += player.gravity; player.y += player.vy;

    if (currentPit) {
        if (player.y >= targetGroundY) {
            player.isFallingInPit = true; player.vy = 4; 
            player.pitResetX = currentPit.x + currentPit.width + 20; 
            triggerDamage(); 
        }
    } else {
        let currentGroundY = getGroundY(player.x);
        if (player.y >= currentGroundY) {
            player.y = currentGroundY; player.vy = 0; player.isJumping = false;
        }
    }

    cameraX = player.x - 100;

    // クッキー判定
    cookies.forEach(cookie => {
        if (!cookie.collected &&
            player.x < cookie.x + cookie.width && player.x + player.width > cookie.x &&
            player.y < cookie.y + cookie.height && player.y + player.height > cookie.y) {
            cookie.collected = true;
            score++;
            playSe(audioAssets.seCookie);
        }
    });

    // 障害物判定
    obstacles.forEach(obs => {
        if (!obs.active || obs.type === 'pit') return;

        let isColliding = player.x < obs.x + obs.width && player.x + player.width > obs.x &&
                          player.y < obs.y + obs.height && player.y + player.height > obs.y;
        if (!isColliding) return;

        if (obs.type === 'car' || obs.type === 'box' || obs.type === 'cone') {
            if (player.vy > 0 && player.y + player.height - player.vy <= obs.y + 20) {
                player.y = obs.y - player.height;
                
                // ①・② 踏みつけ大ジャンプもキビキビと、より高く跳ねる（高所のクッキーが取れるように）
                player.vy = -14.5; 
                player.isJumping = true;
                jumpCounter = charConfig.maxJumpFrames; 
                
                launchObstacleEffect(obs);
                playSe(audioAssets.seJump); 
            } else {
                if (player.invincibleTimer === 0) { triggerDamage(); launchObstacleEffect(obs); }
            }
        } else if (obs.type === 'cat') {
            if (player.invincibleTimer === 0) { triggerDamage(); launchObstacleEffect(obs); }
        } else if (obs.type === 'puddle') {
            player.speedModifier = 0.5; 
        }
    });

    if (player.x >= goalX) endGame();
}

// ② ジャンプ開始（初速を速くしてスピーディーに）
function triggerJumpStart() {
    if (!player.isJumping && !player.isFallingInPit) {
        const charConfig = CHARACTER_CONFIG[selectedCharKey];
        player.vy = -charConfig.jumpPower; 
        player.isJumping = true;
        jumpCounter = 0; 
        isInputPressing = true;
        playSe(audioAssets.seJump);
    }
}

function triggerJumpEnd() {
    isInputPressing = false;
}

function endGame() {
    ranking.push(score); ranking.sort((a, b) => b - a); ranking = ranking.slice(0, 3);
    currentState = STATES.RESULT;
    playBgm(audioAssets.bgmClear);
}

// --- 描画処理 ---
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (currentState === STATES.TITLE) drawTitleScreen();
    else if (currentState === STATES.CHAR_SELECT) drawCharSelectScreen();
    else if (currentState === STATES.PLAY) drawPlayScreen();
    else if (currentState === STATES.RESULT) drawResultScreen();
}

function drawTitleScreen() {
    ctx.fillStyle = "#87CEEB"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#FFD700"; ctx.strokeStyle = "#DC2626"; ctx.lineWidth = 8;
    ctx.font = "bold 50px 'Arial Black'"; ctx.textAlign = "center";
    ctx.strokeText("パウ・パトロール ゲーム", canvas.width / 2, 150);
    ctx.fillText("パウ・パトロール ゲーム", canvas.width / 2, 150);
    ctx.fillStyle = "#FFFFFF"; ctx.font = "bold 24px sans-serif";
    ctx.fillText("まわりを タップして スタート！", canvas.width / 2, 280);
}

const charButtons = { chase: { x: 150, y: 160, width: 200, height: 160 }, marshall: { x: 450, y: 160, width: 200, height: 160 } };

function drawCharSelectScreen() {
    ctx.fillStyle = "#E0F2FE"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#1E293B"; ctx.font = "bold 32px sans-serif"; ctx.textAlign = "center";
    ctx.fillText("だれで あそぶ？", canvas.width / 2, 80);
    drawSelectButton('chase', charButtons.chase, CHARACTER_CONFIG.chase);
    drawSelectButton('marshall', charButtons.marshall, CHARACTER_CONFIG.marshall);
}

function drawSelectButton(key, rect, config) {
    ctx.fillStyle = config.color; ctx.beginPath(); ctx.roundRect(rect.x, rect.y, rect.width, rect.height, 20); ctx.fill();
    ctx.fillStyle = "#FFFFFF"; ctx.beginPath(); ctx.roundRect(rect.x + 8, rect.y + 8, rect.width - 16, rect.height - 16, 15); ctx.fill();
    let currentImgKey = (Math.floor(gameFrame / 15) % 2 === 0) ? 'run1' : 'run2';
    let img = imgAssets.chars[key][currentImgKey];
    if (img && img.complete) ctx.drawImage(img, rect.x + rect.width/2 - 40, rect.y + 20, 80, 80);
    ctx.fillStyle = "#1E293B"; ctx.font = "bold 22px sans-serif"; ctx.textAlign = "center";
    ctx.fillText(config.name, rect.x + rect.width / 2, rect.y + 135);
}

function drawPlayScreen() {
    ctx.fillStyle = "#87CEEB"; ctx.fillRect(0, 0, canvas.width, canvas.height);

    // 背景の建物
    ctx.save(); ctx.translate(-cameraX * 0.3, 0);
    bgBuildings.forEach(b => {
        let baseFloorY = BASE_GROUND_Y + 60; ctx.fillStyle = b.color;
        ctx.fillRect(b.x, baseFloorY - b.height, b.width, b.height);
        if (b.roof === 'triangle') {
            ctx.fillStyle = "#E11D48"; ctx.beginPath(); ctx.moveTo(b.x - 8, baseFloorY - b.height); ctx.lineTo(b.x + b.width / 2, baseFloorY - b.height - 35); ctx.lineTo(b.x + b.width + 8, baseFloorY - b.height); ctx.closePath(); ctx.fill();
        } else if (b.roof === 'dome') {
            ctx.fillStyle = "#1D4ED8"; ctx.beginPath(); ctx.arc(b.x + b.width / 2, baseFloorY - b.height, b.width / 2.5, Math.PI, 0); ctx.fill();
        }
        ctx.fillStyle = "rgba(255, 255, 255, 0.5)"; ctx.fillRect(b.x + 15, baseFloorY - b.height + 20, 15, 15); ctx.fillRect(b.x + b.width - 30, baseFloorY - b.height + 20, 15, 15);
    });
    ctx.restore();
    
    ctx.save(); ctx.translate(-cameraX, 0);

    // 地面
    ctx.fillStyle = "#22C55E"; ctx.beginPath();
    let startCamX = Math.max(0, cameraX - 100); let endCamX = cameraX + canvas.width + 100;
    ctx.moveTo(startCamX, 400);
    for (let x = startCamX; x <= endCamX; x += 5) {
        let inPit = false;
        obstacles.forEach(obs => { if (obs.type === 'pit' && obs.active && x >= obs.x && x <= obs.x + obs.width) inPit = true; });
        if (inPit) ctx.lineTo(x, 400); else ctx.lineTo(x, getGroundY(x) + 60);
    }
    ctx.lineTo(endCamX, 400); ctx.closePath(); ctx.fill();

    // 崖線
    obstacles.forEach(obs => { if (obs.type === 'pit' && obs.active) { ctx.fillStyle = "#78350F"; ctx.fillRect(obs.x - 3, getGroundY(obs.x) + 60, 4, 150); ctx.fillRect(obs.x + obs.width - 1, getGroundY(obs.x + obs.width) + 60, 4, 150); } });

    // 障害物
    obstacles.forEach(obs => {
        if (!obs.active || obs.type === 'pit') return;
        let obsImg = imgAssets.obstacles[obs.type];
        if (obsImg && obsImg.complete) ctx.drawImage(obsImg, obs.x, obs.y, obs.width, obs.height);
    });

    // クッキー
    cookies.forEach(cookie => { if (!cookie.collected) { let cookieImg = imgAssets.items.cookie; if (cookieImg && cookieImg.complete) ctx.drawImage(cookieImg, cookie.x, cookie.y, cookie.width, cookie.height); } });
    droppedCookies.forEach(dc => { ctx.save(); ctx.translate(dc.x, dc.y); ctx.rotate(dc.rotation); let cookieImg = imgAssets.items.cookie; if (cookieImg && cookieImg.complete) ctx.drawImage(cookieImg, -15, -15, 30, 30); ctx.restore(); });
    fallingObstacles.forEach(fo => { ctx.save(); ctx.translate(fo.x + fo.width / 2, fo.y + fo.height / 2); ctx.rotate(fo.rotation); let obsImg = imgAssets.obstacles[fo.type]; if (obsImg && obsImg.complete) ctx.drawImage(obsImg, -fo.width / 2, -fo.height / 2, fo.width, fo.height); ctx.restore(); });

    // パウステーション
    let stationImg = imgAssets.items.pawStation; if (stationImg && stationImg.complete) ctx.drawImage(stationImg, goalX, getGroundY(goalX) - 140, 150, 200);

    // プレイヤー
    let shouldDrawPlayer = true; if (player.invincibleTimer > 0 && Math.floor(player.invincibleTimer / 4) % 2 === 0) shouldDrawPlayer = false;
    if (shouldDrawPlayer) {
        let activeImgKey = 'run1'; if (player.isFallingInPit || player.isJumping) activeImgKey = 'jump'; else activeImgKey = (Math.floor(gameFrame / 10) % 2 === 0) ? 'run1' : 'run2';
        let pImg = imgAssets.chars[selectedCharKey][activeImgKey];
        if (pImg && pImg.complete) ctx.drawImage(pImg, player.x, player.y, player.width, player.height);
        if (player.invincibleTimer > 0) { ctx.fillStyle = "#38BDF8"; ctx.font = "30px sans-serif"; ctx.textAlign = "center"; let sweatY = player.y - 15 + Math.sin(gameFrame * 0.2) * 5; ctx.fillText("💦", player.x + player.width / 2, sweatY); }
    }
    ctx.restore();

    // UIスコア
    let uiCookieImg = imgAssets.items.cookie; if (uiCookieImg && uiCookieImg.complete) { ctx.drawImage(uiCookieImg, 20, 15, 30, 30); ctx.fillStyle = "#FFFFFF"; ctx.font = "bold 26px sans-serif"; ctx.textAlign = "left"; ctx.fillText(`× ${score}`, 60, 40); }
}

function drawResultScreen() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.75)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.textAlign = "center";
    
    ctx.fillStyle = "#FFD700"; ctx.strokeStyle = "#DC2626"; ctx.lineWidth = 6;
    ctx.font = "bold 55px sans-serif";
    ctx.strokeText("パウフェクト！", canvas.width / 2, 90);
    ctx.fillText("パウフェクト！", canvas.width / 2, 90);

    ctx.font = "bold 28px sans-serif"; ctx.fillStyle = "#FFFFFF";
    ctx.fillText(`あつめたクッキー: ${score} こ`, canvas.width / 2, 160);

    ctx.fillStyle = "#E2E8F0"; ctx.font = "bold 20px sans-serif";
    ctx.fillText("きろく ランキング", canvas.width / 2, 220);
    ranking.forEach((rankScore, index) => { ctx.fillText(`${index + 1}い: ${rankScore} こ`, canvas.width / 2, 260 + index * 30); });
    ctx.font = "18px sans-serif"; ctx.fillStyle = "#94A3B8"; ctx.fillText("画面をタップして 最初にもどる", canvas.width / 2, 370);
}

// --- 入力イベント処理 ---
function handleInputStart(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    const clickX = (clientX - rect.left) * (canvas.width / rect.width);
    const clickY = (clientY - rect.top) * (canvas.height / rect.height);

    if (currentState === STATES.TITLE) {
        currentState = STATES.CHAR_SELECT;
        playBgm(audioAssets.bgmTitle);
    } else if (currentState === STATES.CHAR_SELECT) {
        if (clickX >= charButtons.chase.x && clickX <= charButtons.chase.x + charButtons.chase.width &&
            clickY >= charButtons.charButtons.chase.y && clickY <= charButtons.chase.y + charButtons.chase.height) {
            // 安全対策として押し間違え防止用に直接キーで判定
        }
        if (clickX > 0 && clickX < 400 && clickY > 120 && clickY < 340) {
            selectedCharKey = 'chase'; initGame(); currentState = STATES.PLAY;
            playBgm(audioAssets.bgmPlay);
        } else if (clickX >= 400 && clickX < 800 && clickY > 120 && clickY < 340) {
            selectedCharKey = 'marshall'; initGame(); currentState = STATES.PLAY;
            playBgm(audioAssets.bgmPlay);
        }
    } else if (currentState === STATES.PLAY) {
        triggerJumpStart(); 
    } else if (currentState === STATES.RESULT) {
        currentState = STATES.TITLE;
        playBgm(audioAssets.bgmTitle);
    }
}

// マウスイベント
window.addEventListener("mousedown", (e) => {
    handleInputStart(e.clientX, e.clientY);
});
window.addEventListener("mouseup", () => {
    triggerJumpEnd(); 
});

// タッチイベント（スマホ用）
window.addEventListener("touchstart", (e) => {
    if (currentState === STATES.PLAY || currentState === STATES.TITLE || currentState === STATES.RESULT) e.preventDefault(); 
    if (e.touches.length > 0) {
        handleInputStart(e.touches[0].clientX, e.touches[0].clientY);
    }
}, { passive: false });

window.addEventListener("touchend", () => {
    triggerJumpEnd(); 
});

// キーボードイベント
window.addEventListener("keydown", (e) => {
    if (e.code === "Space" && currentState === STATES.PLAY) triggerJumpStart();
});
window.addEventListener("keyup", (e) => {
    if (e.code === "Space" && currentState === STATES.PLAY) triggerJumpEnd();
});

function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
gameLoop();
</script>
