<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>パウ・パトロール風 横スクロールゲーム</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
        canvas {
            background-color: #87CEEB; /* 空の色 */
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            max-width: 100%;
            max-height: 100%;
        }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="800" height="400"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// --- ゲームの状態 ---
const STATES = {
    TITLE: 'TITLE',
    CHAR_SELECT: 'CHAR_SELECT',
    MODE_SELECT: 'MODE_SELECT', 
    PLAY: 'PLAY',
    PAUSE: 'PAUSE',
    RESULT: 'RESULT',
    GAMEOVER: 'GAMEOVER',       
    RANKING_VIEW: 'RANKING_VIEW'
};
let currentState = STATES.TITLE;

// --- オーディオアセット ---
const audioAssets = {
    bgmTitle: new Audio("sounds/bgm_title.mp3"),
    bgmPlay: new Audio("sounds/bgm_play.mp3"),
    bgmClear: new Audio("sounds/bgm_clear.mp3"),
    bgmGameover: new Audio("sounds/bgm_gameover.mp3"), 
    seJump: new Audio("sounds/se_jump.mp3"),
    seCookie: new Audio("sounds/se_cookie.mp3"),
    seDamage: new Audio("sounds/se_damage.mp3"),
    sePit: new Audio("sounds/se_pit.mp3"),
    seClear: new Audio("sounds/se_clear.mp3"),
    seHeal: new Audio("sounds/se_heal.mp3")            
};

// 音量の一律統一設定
const UNIFORM_VOLUME = 0.5;
Object.keys(audioAssets).forEach(key => {
    audioAssets[key].volume = UNIFORM_VOLUME;
});

audioAssets.bgmTitle.loop = true;
audioAssets.bgmPlay.loop = true;
audioAssets.bgmClear.loop = true;
audioAssets.bgmGameover.loop = false; 

let currentActiveBgm = null; 
let isAudioInitialized = false; 

function playBgm(targetAudio) {
    audioAssets.bgmTitle.pause(); audioAssets.bgmTitle.currentTime = 0;
    audioAssets.bgmPlay.pause();  audioAssets.bgmPlay.currentTime = 0;
    audioAssets.bgmClear.pause(); audioAssets.bgmClear.currentTime = 0;
    audioAssets.bgmGameover.pause(); audioAssets.bgmGameover.currentTime = 0;
    
    currentActiveBgm = targetAudio;
    
    if (document.visibilityState === 'visible' && currentState !== STATES.PAUSE && isAudioInitialized) {
        targetAudio.play().catch(e => {});
    }
}

function playSe(targetSe) {
    if (!isAudioInitialized) return;
    targetSe.currentTime = 0;
    targetSe.play().catch(e => {});
}

function stopBgmOnHide() {
    if (currentActiveBgm) currentActiveBgm.pause();
}
function resumeBgmOnShow() {
    if (currentActiveBgm && document.visibilityState === 'visible' && currentState !== STATES.PAUSE && isAudioInitialized) {
        currentActiveBgm.play().catch(e => {});
    }
}
document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === 'hidden') stopBgmOnHide();
    else resumeBgmOnShow();
});
window.addEventListener("pagehide", stopBgmOnHide);
window.addEventListener("pageshow", resumeBgmOnShow);


// --- キャラクターの定数定義 ---
const CHARACTER_CONFIG = {
    chase: {
        name: "チェイス",
        color: "#1E3A8A",
        baseSpeed: 5.8,        
        jumpPower: 11.2,       
        maxJumpFrames: 14,     
        images: { run1: "images/chase_run1.png", run2: "images/chase_run2.png", jump: "images/chase_jump.png" }
    },
    marshall: {
        name: "マーシャル",
        color: "#DC2626",
        baseSpeed: 5.3,
        jumpPower: 11.6,       
        maxJumpFrames: 15,
        images: { run1: "images/marshall_run1.png", run2: "images/marshall_run2.png", jump: "images/marshall_jump.png" }
    },
    rubble: {
        name: "ラブル",
        color: "#EAB308",
        baseSpeed: 5.0,
        jumpPower: 12.0,
        maxJumpFrames: 17,
        images: { run1: "images/rubble_run1.png", run2: "images/rubble_run2.png", jump: "images/rubble_jump.png" }
    }
};

let selectedCharKey = 'chase'; 
let isLifeMode = true; 

// --- 入力長押し判定用変数 ---
let isInputPressing = false;
let jumpCounter = 0; 

// --- ボタンの配置定義 ---
const pauseButton = { x: 730, y: 15, width: 50, height: 50 };
const rankingButton = { x: 30, y: 330, width: 160, height: 45 };
const rankingBackButton = { x: 320, y: 320, width: 160, height: 50 };

const charButtons = {
    chase: { x: 40, y: 140, width: 220, height: 180 },
    marshall: { x: 290, y: 140, width: 220, height: 180 },
    rubble: { x: 540, y: 140, width: 220, height: 180 }
};

// 🛠️ モード選択ボタンの当たり判定位置を再調整（画面内 800px に綺麗に収まる設計）
const modeButtons = {
    noLife: { x: 65, y: 160, width: 310, height: 140 },
    withLife: { x: 425, y: 160, width: 310, height: 140 }
};

// --- 画像アセット ---
const imgAssets = { chars: {}, items: {}, obstacles: {} };
Object.keys(CHARACTER_CONFIG).forEach(charKey => {
    imgAssets.chars[charKey] = {};
    Object.keys(CHARACTER_CONFIG[charKey].images).forEach(imgKey => {
        imgAssets.chars[charKey][imgKey] = new Image();
        imgAssets.chars[charKey][imgKey].src = CHARACTER_CONFIG[charKey].images[imgKey];
    });
});
imgAssets.items.cookie = new Image();
imgAssets.items.cookie.src = "images/cookie.png";
imgAssets.items.bone = new Image();            
imgAssets.items.bone.src = "images/bone.png";
imgAssets.items.pawStation = new Image();
imgAssets.items.pawStation.src = "images/paw_station.png";

const obstacleImages = { car: "images/car.png", box: "images/box.png", cone: "images/cone.png", cat: "images/cat.png", puddle: "images/puddle.png" };
Object.keys(obstacleImages).forEach(key => {
    imgAssets.obstacles[key] = new Image();
    imgAssets.obstacles[key].src = obstacleImages[key];
});

// --- ゲーム変数 ---
let gameFrame = 0; 
let score = 0;
let lives = 5; 

let ranking = [15, 10, 5];
if (localStorage.getItem("paw_game_ranking")) {
    try {
        ranking = JSON.parse(localStorage.getItem("paw_game_ranking"));
    } catch(e) {
        ranking = [15, 10, 5];
    }
} else {
    localStorage.setItem("paw_game_ranking", JSON.stringify(ranking));
}

let player = {
    x: 100, y: 240, width: 60, height: 60, vy: 0, 
    gravity: 0.85, 
    isJumping: false, invincibleTimer: 0, speedModifier: 1.0, isFallingInPit: false 
};

let slopePoints = [];
const SLOPE_INTERVAL = 200;
const BASE_GROUND_Y = 240; 

let droppedCookies = []; 
let fallingObstacles = []; 
let bgBuildings = [];
let cookies = [];
let obstacles = [];
let bones = []; 
let goalX = 15000; 
let cameraX = 0;

function getGroundY(x) {
    if (x < 0 || x >= goalX - 400) return BASE_GROUND_Y;
    let index = Math.floor(x / SLOPE_INTERVAL);
    if (index >= slopePoints.length - 1) return BASE_GROUND_Y;
    let p1 = slopePoints[index];
    let p2 = slopePoints[index + 1];
    let ratio = (x % SLOPE_INTERVAL) / SLOPE_INTERVAL;
    return p1 + (p2 - p1) * ratio;
}

function initGame() {
    score = 0;
    lives = 5; 
    cameraX = 0;
    player.x = 100;
    player.vy = 0;
    player.isJumping = false;
    player.invincibleTimer = 0;
    player.speedModifier = 1.0;
    player.isFallingInPit = false;
    droppedCookies = [];
    fallingObstacles = [];
    jumpCounter = 0;

    // 坂道データ
    slopePoints = [];
    let numPoints = Math.ceil(goalX / SLOPE_INTERVAL) + 5;
    let lastY = BASE_GROUND_Y;
    for (let i = 0; i < numPoints; i++) {
        if (i < 3 || i > numPoints - 6) {
            slopePoints.push(BASE_GROUND_Y);
        } else {
            let change = (Math.random() - 0.5) * 50;
            let currentY = lastY + change;
            if (currentY < 180) currentY = 180;
            if (currentY > 270) currentY = 270;
            slopePoints.push(currentY);
            lastY = currentY;
        }
    }
    player.y = getGroundY(player.x);

    // 背景の建物
    bgBuildings = [];
    const colors = ["#FCA5A5", "#FECABC", "#FEF08A", "#BBF7D0", "#BFDBFE", "#E9D5FF", "#FBCFE8", "#FDE047", "#A7F3D0", "#93C5FD"];
    const roofTypes = ['flat', 'triangle', 'dome'];
    for (let i = 0; i < 75; i++) {
        bgBuildings.push({
            x: i * 220 + Math.random() * 60,
            width: 100 + Math.random() * 90,
            height: 120 + Math.random() * 140,
            color: colors[Math.floor(Math.random() * colors.length)],
            roof: roofTypes[Math.floor(Math.random() * roofTypes.length)]
        });
    }

    // 障害物配置
    obstacles = [];
    const types = ['car', 'box', 'cone', 'cat', 'puddle', 'pit'];
    for (let i = 0; i < 40; i++) {
        let type = types[Math.floor(Math.random() * types.length)];
        let obsWidth = 50; let obsHeight = 50;
        let ox = 600 + i * 360 + Math.random() * 60;
        let groundY = getGroundY(ox);
        let obsY = groundY;

        if (type === 'car') { obsWidth = 70; obsHeight = 45; obsY = groundY + 15; }
        else if (type === 'box') { obsWidth = 50; obsHeight = 50; obsY = groundY + 10; }
        else if (type === 'cone') { obsWidth = 40; obsHeight = 45; obsY = groundY + 15; }
        else if (type === 'cat') { obsWidth = 50; obsHeight = 50; obsY = groundY + 10; }
        else if (type === 'puddle') { obsWidth = 70; obsHeight = 15; obsY = groundY + 45; }
        else if (type === 'pit') { obsWidth = 140; obsHeight = 160; obsY = groundY + 60; }

        obstacles.push({ x: ox, y: obsY, width: obsWidth, height: obsHeight, type: type, active: true });
    }

    // クッキーの出現
    cookies = [];
    bones = []; 
    let currentX = 400;
    while (currentX < goalX - 500) {
        currentX += 80 + Math.random() * 140; 
        let nearObs = obstacles.find(obs => Math.abs(obs.x - currentX) < 180);
        let numGroup = Math.floor(Math.random() * 2) + 3; 
        let groupHeightType = Math.random();

        let spawnBone = isLifeMode && (Math.random() < 0.05);

        if (spawnBone) {
            let bx = currentX;
            let groundY = getGroundY(bx);
            let by = groundY - 50;
            bones.push({ x: bx, y: by, width: 35, height: 35, collected: false });
            currentX += 100;
            continue;
        }

        for (let j = 0; j < numGroup; j++) {
            let cx = currentX + j * 42;
            let groundY = getGroundY(cx);
            let cy = groundY - 45; 

            if (nearObs) {
                if (nearObs.type === 'puddle') {
                    cy = groundY - 95;
                } else if (nearObs.type === 'pit') {
                    cy = groundY - 90;
                } else if (nearObs.type === 'car' || nearObs.type === 'box' || nearObs.type === 'cone') {
                    if (groupHeightType < 0.5) {
                        cy = groundY - 155; 
                    } else {
                        cy = groundY - 95;  
                    }
                }
            } else {
                if (groupHeightType < 0.4) cy = groundY - 85; 
            }

            if (cy < 350) {
                cookies.push({ x: cx, y: cy, width: 30, height: 30, collected: false });
            }
        }
        currentX += numGroup * 42;
    }
}

function triggerDamage() {
    if (player.invincibleTimer > 0) return; 
    playSe(audioAssets.seDamage);
    
    if (isLifeMode) {
        lives--;
        if (lives <= 0) {
            lives = 0;
            triggerGameOver();
            return;
        }
    }

    if (score > 0) {
        score--; 
        droppedCookies.push({
            x: player.x + player.width / 2, y: player.y + player.height / 2,
            vx: -2 - Math.random() * 3, vy: -7 - Math.random() * 3, 
            gravity: 0.5, rotation: 0, rotSpeed: (Math.random() - 0.5) * 0.2
        });
    }
    player.invincibleTimer = 120; 
}

function triggerPitFall() {
    playSe(audioAssets.sePit);

    if (isLifeMode) {
        lives--;
        if (lives <= 0) {
            lives = 0;
            triggerGameOver();
            return;
        }
    }

    if (player.invincibleTimer === 0 && score > 0) {
        score--;
        droppedCookies.push({
            x: player.x + player.width / 2, y: player.y + player.height / 2,
            vx: -2 - Math.random() * 3, vy: -7 - Math.random() * 3, 
            gravity: 0.5, rotation: 0, rotSpeed: (Math.random() - 0.5) * 0.2
        });
    }
    player.invincibleTimer = 120;
}

function triggerGameOver() {
    currentState = STATES.GAMEOVER;
    playBgm(audioAssets.bgmGameover);
}

function launchObstacleEffect(obs) {
    obs.active = false;
    fallingObstacles.push({
        type: obs.type, x: obs.x, y: obs.y, width: obs.width, height: obs.height,
        vx: 1 + Math.random() * 3, vy: -6 - Math.random() * 5, gravity: 0.6, rotation: 0, rotSpeed: 0.15 + Math.random() * 0.15
    });
}

// --- 更新処理 ---
function update() {
    if (currentState === STATES.PAUSE || currentState === STATES.GAMEOVER) return;

    gameFrame++;

    if (currentState !== STATES.PLAY) return;

    const charConfig = CHARACTER_CONFIG[selectedCharKey];

    if (player.invincibleTimer > 0) player.invincibleTimer--;

    droppedCookies.forEach(dc => { dc.vy += dc.gravity; dc.x += dc.vx; dc.y += dc.vy; dc.rotation += dc.rotSpeed; });
    droppedCookies = droppedCookies.filter(dc => dc.y < 450);

    fallingObstacles.forEach(fo => { fo.vy += fo.gravity; fo.x += fo.vx; fo.y += fo.vy; fo.rotation += fo.rotSpeed; });
    fallingObstacles = fallingObstacles.filter(fo => fo.y < 450);

    if (player.isFallingInPit) {
        player.vy += 0.8; player.y += player.vy;
        if (player.y > 420) {
            player.isFallingInPit = false;
            player.x = player.pitResetX; 
            player.y = getGroundY(player.x);
            player.vy = 0; player.isJumping = false;
        }
        cameraX = player.x - 100;
        return; 
    }

    player.speedModifier = 1.0; 

    if (player.isJumping && isInputPressing && jumpCounter < charConfig.maxJumpFrames) {
        player.vy -= 0.65 * (1 - (jumpCounter / charConfig.maxJumpFrames));
        jumpCounter++;
    }

    let nextX = player.x + charConfig.baseSpeed * player.speedModifier;
    let targetGroundY = getGroundY(nextX);

    let currentPit = null;
    obstacles.forEach(obs => {
        if (obs.type === 'pit' && obs.active) {
            let playerCenterX = nextX + player.width / 2;
            if (playerCenterX > obs.x + 15 && playerCenterX < obs.x + obs.width - 15) currentPit = obs;
        }
    });

    player.x = nextX;
    player.vy += player.gravity; player.y += player.vy;

    if (currentPit) {
        if (player.y >= targetGroundY) {
            player.isFallingInPit = true; player.vy = 4; 
            player.pitResetX = currentPit.x + currentPit.width + 20; 
            triggerPitFall();
            if (currentState === STATES.GAMEOVER) return; 
        }
    } else {
        let currentGroundY = getGroundY(player.x);
        if (player.y >= currentGroundY) {
            player.y = currentGroundY; player.vy = 0; player.isJumping = false;
        }
    }

    cameraX = player.x - 100;

    // クッキー獲得
    cookies.forEach(cookie => {
        if (!cookie.collected &&
            player.x < cookie.x + cookie.width && player.x + player.width > cookie.x &&
            player.y < cookie.y + cookie.height && player.y + player.height > cookie.y) {
            cookie.collected = true;
            score++;
            playSe(audioAssets.seCookie);
        }
    });

    // ほねクッキー（回復）獲得
    bones.forEach(bone => {
        if (!bone.collected &&
            player.x < bone.x + bone.width && player.x + player.width > bone.x &&
            player.y < bone.y + bone.height && player.y + player.height > bone.y) {
            bone.collected = true;
            playSe(audioAssets.seHeal);
            if (lives < 5) lives++; 
        }
    });

    // 障害物衝突
    obstacles.forEach(obs => {
        if (!obs.active || obs.type === 'pit' || currentState === STATES.GAMEOVER) return;

        let isColliding = player.x < obs.x + obs.width && player.x + player.width > obs.x &&
                          player.y < obs.y + obs.height && player.y + player.height > obs.y;
        if (!isColliding) return;

        if (obs.type === 'car' || obs.type === 'box' || obs.type === 'cone') {
            if (player.vy > 0 && player.y + player.height - player.vy <= obs.y + 20) {
                player.y = obs.y - player.height;
                player.vy = -14.5; 
                player.isJumping = true;
                jumpCounter = charConfig.maxJumpFrames; 
                launchObstacleEffect(obs);
                playSe(audioAssets.seJump); 
            } else {
                if (player.invincibleTimer === 0) { triggerDamage(); if(obs.active) launchObstacleEffect(obs); }
            }
        } else if (obs.type === 'cat') {
            if (player.invincibleTimer === 0) { triggerDamage(); if(obs.active) launchObstacleEffect(obs); }
        } else if (obs.type === 'puddle') {
            player.speedModifier = 0.5; 
        }
    });

    if (player.x >= goalX && currentState === STATES.PLAY) endGame();
}

function triggerJumpStart() {
    if (!player.isJumping && !player.isFallingInPit) {
        const charConfig = CHARACTER_CONFIG[selectedCharKey];
        player.vy = -charConfig.jumpPower; 
        player.isJumping = true;
        jumpCounter = 0; 
        isInputPressing = true;
        playSe(audioAssets.seJump);
    }
}

function triggerJumpEnd() {
    isInputPressing = false;
}

function endGame() {
    playSe(audioAssets.seClear);

    ranking.push(score); 
    ranking.sort((a, b) => b - a); 
    ranking = ranking.slice(0, 3);
    localStorage.setItem("paw_game_ranking", JSON.stringify(ranking));

    currentState = STATES.RESULT;
    playBgm(audioAssets.bgmClear);
}

// --- 描画処理 ---
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (currentState === STATES.TITLE) drawTitleScreen();
    else if (currentState === STATES.CHAR_SELECT) drawCharSelectScreen();
    else if (currentState === STATES.MODE_SELECT) drawModeSelectScreen(); 
    else if (currentState === STATES.PLAY || currentState === STATES.PAUSE) drawPlayScreen(); 
    else if (currentState === STATES.RESULT) drawResultScreen();
    else if (currentState === STATES.GAMEOVER) drawGameOverScreen();       
    else if (currentState === STATES.RANKING_VIEW) drawRankingViewScreen();
}

function drawTitleScreen() {
    let skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
    skyGrad.addColorStop(0, "#00BFFF");
    skyGrad.addColorStop(0.6, "#1E90FF");
    skyGrad.addColorStop(1, "#4682B4");
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "rgba(255, 255, 255, 0.75)";
    function drawCloud(cx, cy, scale) {
        ctx.beginPath();
        ctx.arc(cx, cy, 25*scale, 0, Math.PI*2);
        ctx.arc(cx+30*scale, cy-10*scale, 35*scale, 0, Math.PI*2);
        ctx.arc(cx+70*scale, cy, 25*scale, 0, Math.PI*2);
        ctx.arc(cx+35*scale, cy+15*scale, 25*scale, 0, Math.PI*2);
        ctx.closePath();
        ctx.fill();
    }
    drawCloud(80, 100, 1.0);
    drawCloud(620, 80, 1.2);
    drawCloud(340, 60, 0.7);

    ctx.fillStyle = "rgba(255, 215, 0, 0.35)"; 
    ctx.beginPath();
    ctx.arc(400, 150, 65, 0, Math.PI*2); 
    ctx.fill();
    ctx.beginPath();
    ctx.arc(330, 100, 22, 0, Math.PI*2);
    ctx.arc(375, 65, 22, 0, Math.PI*2);
    ctx.arc(425, 65, 22, 0, Math.PI*2);
    ctx.arc(470, 100, 22, 0, Math.PI*2);
    ctx.fill();

    ctx.textAlign = "center";
    ctx.fillStyle = "#A31D1D"; 
    ctx.font = "bold 56px 'Arial Black', sans-serif";
    ctx.fillText("パウ・パトロール ゲーム", canvas.width / 2 + 4, 154);

    ctx.fillStyle = "#FFD700"; 
    ctx.strokeStyle = "#DC2626"; 
    ctx.lineWidth = 10;
    ctx.strokeText("パウ・パトロール ゲーム", canvas.width / 2, 150);
    ctx.fillText("パウ・パトロール ゲーム", canvas.width / 2, 150);

    let blink = Math.floor(gameFrame / 25) % 2 === 0;
    ctx.fillStyle = blink ? "#FFFFFF" : "#FFE4E1";
    ctx.font = "bold 24px sans-serif";
    ctx.shadowColor = "rgba(0,0,0,0.5)";
    ctx.shadowBlur = 6;
    ctx.fillText("👇 タップして スタート！ 👇", canvas.width / 2, 280);
    ctx.shadowBlur = 0; 

    // 「かこのきろく」ボタン
    ctx.fillStyle = "#FF9F43";
    ctx.beginPath();
    ctx.roundRect(rankingButton.x, rankingButton.y, rankingButton.width, rankingButton.height, 12);
    ctx.fill();
    ctx.strokeStyle = "#FFFFFF";
    ctx.lineWidth = 3;
    ctx.stroke();

    ctx.fillStyle = "#FFFFFF";
    ctx.font = "bold 18px sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText("🏆 かこのきろく", rankingButton.x + (rankingButton.width / 2), rankingButton.y + (rankingButton.height / 2) + 1);
    ctx.textBaseline = "alphabetic"; 
}

function drawCharSelectScreen() {
    ctx.fillStyle = "#E0F2FE"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#1E293B"; ctx.font = "bold 32px sans-serif"; ctx.textAlign = "center";
    ctx.fillText("だれで あそぶ？", canvas.width / 2, 80);
    
    drawSelectButton('chase', charButtons.chase, CHARACTER_CONFIG.chase);
    drawSelectButton('marshall', charButtons.marshall, CHARACTER_CONFIG.marshall);
    drawSelectButton('rubble', charButtons.rubble, CHARACTER_CONFIG.rubble);
}

function drawSelectButton(key, rect, config) {
    ctx.fillStyle = config.color; ctx.beginPath(); ctx.roundRect(rect.x, rect.y, rect.width, rect.height, 20); ctx.fill();
    ctx.fillStyle = "#FFFFFF"; ctx.beginPath(); ctx.roundRect(rect.x + 8, rect.y + 8, rect.width - 16, rect.height - 16, 15); ctx.fill();
    let currentImgKey = (Math.floor(gameFrame / 15) % 2 === 0) ? 'run1' : 'run2';
    let img = imgAssets.chars[key][currentImgKey];
    if (img && img.complete) ctx.drawImage(img, rect.x + rect.width/2 - 45, rect.y + 20, 90, 90);
    ctx.fillStyle = "#1E293B"; ctx.font = "bold 24px sans-serif"; ctx.textAlign = "center";
    ctx.fillText(config.name, rect.x + rect.width / 2, rect.y + 150);
}

// 🛠️ 難易度選択画面の描画（計算式を一新し、文字がボタンのセンターに絶対配置されるよう修正）
function drawModeSelectScreen() {
    ctx.fillStyle = "#FFFAF0"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#1E293B"; ctx.font = "bold 32px sans-serif"; ctx.textAlign = "center";
    ctx.fillText("どちらの モードに する？", canvas.width / 2, 90);

    // 1行に表示できる幅を持たせるため、フォントサイズを18pxに安全調整
    ctx.textAlign = "center";

    // --- 💚 ライフなし（あんしん練習モード） ---
    let b1 = modeButtons.noLife;
    ctx.fillStyle = "#10B981"; ctx.beginPath(); ctx.roundRect(b1.x, b1.y, b1.width, b1.height, 20); ctx.fill();
    
    // ボタンの完全な中心点のX座標を計算
    let b1CenterX = b1.x + (b1.width / 2);
    ctx.fillStyle = "#FFFFFF"; 
    ctx.font = "bold 18px sans-serif"; 
    ctx.fillText("💚 ライフなし", b1CenterX, b1.y + 55);
    ctx.font = "14px sans-serif"; 
    ctx.fillText("(ぶつかっても ずっと走れるよ)", b1CenterX, b1.y + 95);

    // --- ❤️ ライフあり（ドキドキ挑戦モード） ---
    let b2 = modeButtons.withLife;
    ctx.fillStyle = "#EF4444"; ctx.beginPath(); ctx.roundRect(b2.x, b2.y, b2.width, b2.height, 20); ctx.fill();
    
    // ボタンの完全な中心点のX座標を計算
    let b2CenterX = b2.x + (b2.width / 2);
    ctx.fillStyle = "#FFFFFF"; 
    ctx.font = "bold 18px sans-serif"; 
    ctx.fillText("❤️ ライフあり (5つ)", b2CenterX, b2.y + 55);
    ctx.font = "14px sans-serif"; 
    ctx.fillText("(5回ぶつかると ゲームオーバー)", b2CenterX, b2.y + 95);
}

function drawPlayScreen() {
    ctx.fillStyle = "#87CEEB"; ctx.fillRect(0, 0, canvas.width, canvas.height);

    // 背景の建物
    ctx.save(); ctx.translate(-cameraX * 0.3, 0);
    bgBuildings.forEach(b => {
        let baseFloorY = BASE_GROUND_Y + 60; ctx.fillStyle = b.color;
        ctx.fillRect(b.x, baseFloorY - b.height, b.width, b.height);
        if (b.roof === 'triangle') {
            ctx.fillStyle = "#E11D48"; ctx.beginPath(); ctx.moveTo(b.x - 8, baseFloorY - b.height); ctx.lineTo(b.x + b.width / 2, baseFloorY - b.height - 35); ctx.lineTo(b.x + b.width + 8, baseFloorY - b.height); ctx.closePath(); ctx.fill();
        } else if (b.roof === 'dome') {
            ctx.fillStyle = "#1D4ED8"; ctx.beginPath(); ctx.arc(b.x + b.width / 2, baseFloorY - b.height, b.width / 2.5, Math.PI, 0); ctx.fill();
        }
        ctx.fillStyle = "rgba(255, 255, 255, 0.5)"; ctx.fillRect(b.x + 15, baseFloorY - b.height + 20, 15, 15); ctx.fillRect(b.x + b.width - 30, baseFloorY - b.height + 20, 15, 15);
    });
    ctx.restore();
    
    ctx.save(); ctx.translate(-cameraX, 0);

    // 地面
    ctx.fillStyle = "#22C55E"; ctx.beginPath();
    let startCamX = Math.max(0, cameraX - 100); let endCamX = cameraX + canvas.width + 100;
    ctx.moveTo(startCamX, 400);
    for (let x = startCamX; x <= endCamX; x += 5) {
        let inPit = false;
        obstacles.forEach(obs => { if (obs.type === 'pit' && obs.active && x >= obs.x && x <= obs.x + obs.width) inPit = true; });
        if (inPit) ctx.lineTo(x, 400); else ctx.lineTo(x, getGroundY(x) + 60);
    }
    ctx.lineTo(endCamX, 400); ctx.closePath(); ctx.fill();

    obstacles.forEach(obs => { if (obs.type === 'pit' && obs.active) { ctx.fillStyle = "#78350F"; ctx.fillRect(obs.x - 3, getGroundY(obs.x) + 60, 4, 150); ctx.fillRect(obs.x + obs.width - 1, getGroundY(obs.x + obs.width) + 60, 4, 150); } });

    // 障害物
    obstacles.forEach(obs => {
        if (!obs.active || obs.type === 'pit') return;
        let obsImg = imgAssets.obstacles[obs.type];
        if (obsImg && obsImg.complete) ctx.drawImage(obsImg, obs.x, obs.y, obs.width, obs.height);
    });

    // クッキー
    cookies.forEach(cookie => { if (!cookie.collected) { let cookieImg = imgAssets.items.cookie; if (cookieImg && cookieImg.complete) ctx.drawImage(cookieImg, cookie.x, cookie.y, cookie.width, cookie.height); } });
    
    // ほねクッキー
    bones.forEach(bone => { if (!bone.collected) { let boneImg = imgAssets.items.bone; if (boneImg && boneImg.complete) ctx.drawImage(boneImg, bone.x, bone.y, bone.width, bone.height); } });

    droppedCookies.forEach(dc => { ctx.save(); ctx.translate(dc.x, dc.y); ctx.rotate(dc.rotation); let cookieImg = imgAssets.items.cookie; if (cookieImg && cookieImg.complete) ctx.drawImage(cookieImg, -15, -15, 30, 30); ctx.restore(); });
    fallingObstacles.forEach(fo => { ctx.save(); ctx.translate(fo.x + fo.width / 2, fo.y + fo.height / 2); ctx.rotate(fo.rotation); let obsImg = imgAssets.obstacles[fo.type]; if (obsImg && obsImg.complete) ctx.drawImage(obsImg, -fo.width / 2, -fo.height / 2, fo.width, fo.height); ctx.restore(); });

    // パウステーション
    let stationImg = imgAssets.items.pawStation; if (stationImg && stationImg.complete) ctx.drawImage(stationImg, goalX, getGroundY(goalX) - 140, 150, 200);

    // プレイヤー
    let shouldDrawPlayer = true; if (player.invincibleTimer > 0 && Math.floor(player.invincibleTimer / 4) % 2 === 0) shouldDrawPlayer = false;
    if (shouldDrawPlayer) {
        let activeImgKey = 'run1'; if (player.isFallingInPit || player.isJumping) activeImgKey = 'jump'; else activeImgKey = (Math.floor(gameFrame / 10) % 2 === 0) ? 'run1' : 'run2';
        let pImg = imgAssets.chars[selectedCharKey][activeImgKey];
        if (pImg && pImg.complete) ctx.drawImage(pImg, player.x, player.y, player.width, player.height);
        if (player.invincibleTimer > 0) { ctx.fillStyle = "#38BDF8"; ctx.font = "30px sans-serif"; ctx.textAlign = "center"; let sweatY = player.y - 15 + Math.sin(gameFrame * 0.2) * 5; ctx.fillText("💦", player.x + player.width / 2, sweatY); }
    }
    ctx.restore();

    // UIスコア
    let uiCookieImg = imgAssets.items.cookie; if (uiCookieImg && uiCookieImg.complete) { ctx.drawImage(uiCookieImg, 20, 15, 30, 30); ctx.fillStyle = "#FFFFFF"; ctx.font = "bold 26px sans-serif"; ctx.textAlign = "left"; ctx.fillText(`× ${score}`, 60, 40); }

    // ライフありモードのみ左上にハートを描画
    if (isLifeMode) {
        let heartX = 170;
        for (let i = 0; i < 5; i++) {
            ctx.font = "26px sans-serif";
            if (i < lives) {
                ctx.fillText("❤️", heartX + i * 32, 40);
            } else {
                ctx.fillText("🖤", heartX + i * 32, 40); 
            }
        }
    } else {
        ctx.fillStyle = "rgba(255, 255, 255, 0.8)"; ctx.font = "bold 18px sans-serif"; ctx.textAlign = "left";
        ctx.fillText("💚 あんしんモード", 170, 38);
    }

    // 一時停止ボタン「⏸️」
    ctx.fillStyle = "rgba(255, 255, 255, 0.6)";
    ctx.beginPath();
    ctx.roundRect(pauseButton.x, pauseButton.y, pauseButton.width, pauseButton.height, 12);
    ctx.fill();
    
    ctx.save();
    ctx.fillStyle = "#1E293B";
    ctx.font = "bold 20px sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle"; 
    ctx.fillText("⏸️", pauseButton.x + (pauseButton.width / 2), pauseButton.y + (pauseButton.height / 2) + 2);
    ctx.restore();

    // 一時停止中のオーバーレイ
    if (currentState === STATES.PAUSE) {
        ctx.fillStyle = "rgba(0, 0, 0, 0.4)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#FFFFFF";
        ctx.font = "bold 36px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("いちじちゅうだん", canvas.width / 2, canvas.height / 2);
        ctx.font = "20px sans-serif";
        ctx.fillText("画面をタップすると はじまるよ！", canvas.width / 2, canvas.height / 2 + 50);
    }
}

function drawResultScreen() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.75)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.textAlign = "center";
    
    ctx.fillStyle = "#FFD700"; ctx.strokeStyle = "#DC2626"; ctx.lineWidth = 6;
    ctx.font = "bold 55px sans-serif";
    ctx.strokeText("パウフェクト！", canvas.width / 2, 90);
    ctx.fillText("パウフェクト！", canvas.width / 2, 90);

    ctx.font = "bold 28px sans-serif"; ctx.fillStyle = "#FFFFFF";
    ctx.fillText(`あつめたクッキー: ${score} こ`, canvas.width / 2, 160);

    ctx.fillStyle = "#E2E8F0"; ctx.font = "bold 20px sans-serif";
    ctx.fillText("きろく ランキング", canvas.width / 2, 220);
    ranking.forEach((rankScore, index) => { ctx.fillText(`${index + 1}い: ${rankScore} こ`, canvas.width / 2, 260 + index * 30); });
    ctx.font = "18px sans-serif"; ctx.fillStyle = "#94A3B8"; ctx.fillText("画面をタップして 最初にもどる", canvas.width / 2, 370);
}

function drawGameOverScreen() {
    ctx.fillStyle = "rgba(15, 23, 42, 0.85)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.textAlign = "center";

    ctx.fillStyle = "#94A3B8"; ctx.strokeStyle = "#475569"; ctx.lineWidth = 5;
    ctx.font = "bold 50px sans-serif";
    ctx.strokeText("パウフェクトならず、、、！", canvas.width / 2, 150);
    ctx.fillText("パウフェクトならず、、、！", canvas.width / 2, 150);

    ctx.font = "bold 24px sans-serif"; ctx.fillStyle = "#F8FAFC";
    ctx.fillText(`とちゅうであつめたクッキー: ${score} こ`, canvas.width / 2, 220);

    let blink = Math.floor(gameFrame / 20) % 2 === 0;
    ctx.fillStyle = blink ? "#38BDF8" : "#0284C7";
    ctx.font = "bold 22px sans-serif";
    ctx.fillText("🐾 タップして もういちどチャレンジ！ 🐾", canvas.width / 2, 310);
}

function drawRankingViewScreen() {
    ctx.fillStyle = "#1E293B"; 
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.textAlign = "center";
    ctx.fillStyle = "#FFD700";
    ctx.font = "bold 36px sans-serif";
    ctx.fillText("🏆 かこのきろく ベスト3 🏆", canvas.width / 2, 80);

    const medalColors = ["#FFD700", "#C0C0C0", "#CD7F32"];
    ranking.forEach((rankScore, index) => {
        ctx.fillStyle = medalColors[index] || "#FFFFFF";
        ctx.font = "bold 28px sans-serif";
        ctx.fillText(`${index + 1} い :  ${rankScore} こ`, canvas.width / 2, 160 + index * 45);
    });

    ctx.fillStyle = "#EF4444";
    ctx.beginPath();
    ctx.roundRect(rankingBackButton.x, rankingBackButton.y, rankingBackButton.width, rankingBackButton.height, 15);
    ctx.fill();
    ctx.strokeStyle = "#FFFFFF";
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.fillStyle = "#FFFFFF";
    ctx.font = "bold 20px sans-serif";
    ctx.textBaseline = "middle";
    ctx.fillText("もどる", rankingBackButton.x + (rankingBackButton.width / 2), rankingBackButton.y + (rankingBackButton.height / 2));
    ctx.textBaseline = "alphabetic";
}

// --- 入力イベント処理 ---
function handleInputStart(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    const clickX = (clientX - rect.left) * (canvas.width / rect.width);
    const clickY = (clientY - rect.top) * (canvas.height / rect.height);

    if (!isAudioInitialized) {
        isAudioInitialized = true;
    }

    if (currentState === STATES.TITLE) {
        if (clickX >= rankingButton.x && clickX <= rankingButton.x + rankingButton.width &&
            clickY >= rankingButton.y && clickY <= rankingButton.y + rankingButton.height) {
            currentState = STATES.RANKING_VIEW;
            playBgm(audioAssets.bgmTitle);
            return;
        }

        currentState = STATES.CHAR_SELECT;
        playBgm(audioAssets.bgmTitle);
    } else if (currentState === STATES.RANKING_VIEW) {
        if (clickX >= rankingBackButton.x && clickX <= rankingBackButton.x + rankingBackButton.width &&
            clickY >= rankingBackButton.y && clickY <= rankingBackButton.y + rankingBackButton.height) {
            currentState = STATES.TITLE;
        }
    } else if (currentState === STATES.CHAR_SELECT) {
        if (clickX >= charButtons.chase.x && clickX <= charButtons.chase.x + charButtons.chase.width &&
            clickY >= charButtons.chase.y && clickY <= charButtons.chase.y + charButtons.chase.height) {
            selectedCharKey = 'chase'; currentState = STATES.MODE_SELECT; 
        } else if (clickX >= charButtons.marshall.x && clickX <= charButtons.marshall.x + charButtons.marshall.width &&
                   clickY >= charButtons.marshall.y && clickY <= charButtons.marshall.y + charButtons.marshall.height) {
            selectedCharKey = 'marshall'; currentState = STATES.MODE_SELECT; 
        } else if (clickX >= charButtons.rubble.x && clickX <= charButtons.rubble.x + charButtons.rubble.width &&
                   clickY >= charButtons.rubble.y && clickY <= charButtons.rubble.y + charButtons.rubble.height) {
            selectedCharKey = 'rubble'; currentState = STATES.MODE_SELECT; 
        }
    } else if (currentState === STATES.MODE_SELECT) {
        if (clickX >= modeButtons.noLife.x && clickX <= modeButtons.noLife.x + modeButtons.noLife.width &&
            clickY >= modeButtons.noLife.y && clickY <= modeButtons.noLife.y + modeButtons.noLife.height) {
            isLifeMode = false; initGame(); currentState = STATES.PLAY;
            playBgm(audioAssets.bgmPlay);
        } else if (clickX >= modeButtons.withLife.x && clickX <= modeButtons.withLife.x + modeButtons.withLife.width &&
                   clickY >= modeButtons.withLife.y && clickY <= modeButtons.withLife.y + modeButtons.withLife.height) {
            isLifeMode = true; initGame(); currentState = STATES.PLAY;
            playBgm(audioAssets.bgmPlay);
        }
    } else if (currentState === STATES.PLAY) {
        if (clickX >= pauseButton.x && clickX <= pauseButton.x + pauseButton.width &&
            clickY >= pauseButton.y && clickY <= pauseButton.y + pauseButton.height) {
            currentState = STATES.PAUSE;
            if (currentActiveBgm) currentActiveBgm.pause();
            return;
        }
        triggerJumpStart(); 
    } else if (currentState === STATES.PAUSE) {
        currentState = STATES.PLAY;
        if (currentActiveBgm) currentActiveBgm.play().catch(e => {});
    } else if (currentState === STATES.RESULT || currentState === STATES.GAMEOVER) {
        currentState = STATES.TITLE;
        playBgm(audioAssets.bgmTitle);
    }
}

// マウスイベント
window.addEventListener("mousedown", (e) => {
    handleInputStart(e.clientX, e.clientY);
});
window.addEventListener("mouseup", () => {
    triggerJumpEnd(); 
});

// タッチイベント
window.addEventListener("touchstart", (e) => {
    if (currentState !== STATES.CHAR_SELECT && currentState !== STATES.MODE_SELECT) e.preventDefault(); 
    if (e.touches.length > 0) {
        handleInputStart(e.touches[0].clientX, e.touches[0].clientY);
    }
}, { passive: false });

window.addEventListener("touchend", () => {
    triggerJumpEnd(); 
});

// キーボードイベント
window.addEventListener("keydown", (e) => {
    if (!isAudioInitialized) isAudioInitialized = true;
    if (e.code === "Space" && currentState === STATES.PLAY) triggerJumpStart();
    if (e.code === "Escape" && currentState === STATES.PLAY) {
        currentState = STATES.PAUSE;
        if (currentActiveBgm) currentActiveBgm.pause();
    } else if (e.code === "Escape" && currentState === STATES.PAUSE) {
        currentState = STATES.PLAY;
        if (currentActiveBgm) currentActiveBgm.play().catch(e => {});
    }
});
window.addEventListener("keyup", (e) => {
    if (e.code === "Space" && currentState === STATES.PLAY) triggerJumpEnd();
});

// 高速ループ
let lastTime = performance.now();
let accumulatedTime = 0;
const deltaTimeTarget = 1000 / 60; 

function gameLoop(timestamp) {
    let elapsed = timestamp - lastTime;
    lastTime = timestamp;

    if (elapsed > 100) elapsed = 100; 
    accumulatedTime += elapsed;

    while (accumulatedTime >= deltaTimeTarget) {
        update();
        accumulatedTime -= deltaTimeTarget;
    }

    draw();
    requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);
</script>
