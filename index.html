<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>パウ・パトロール風 横スクロールゲーム</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
        canvas {
            background-color: #87CEEB; /* 空の色 */
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            max-width: 100%;
            max-height: 100%;
        }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="800" height="400"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// --- ゲームの状態（画面遷移用） ---
const STATES = {
    TITLE: 'TITLE',
    CHAR_SELECT: 'CHAR_SELECT',
    PLAY: 'PLAY',
    RESULT: 'RESULT'
};
let currentState = STATES.TITLE;

// --- キャラクターの定数定義 ---
const CHARACTER_CONFIG = {
    chase: {
        name: "チェイス",
        color: "#1E3A8A",
        speed: 5,
        jumpPower: 12,
        images: {
            run1: "images/chase_run1.png",
            run2: "images/chase_run2.png",
            jump: "images/chase_jump.png"
        }
    },
    marshall: {
        name: "マーシャル",
        color: "#DC2626",
        speed: 4.5,
        jumpPower: 13,
        images: {
            run1: "images/marshall_run1.png",
            run2: "images/marshall_run2.png",
            jump: "images/marshall_jump.png"
        }
    }
};

// 選択されたキャラクター情報を保持する変数
let selectedCharKey = 'chase'; 

// --- 画像アセットの管理 ---
const imgAssets = {};
// 全キャラクターの全画像をループで読み込み
Object.keys(CHARACTER_CONFIG).forEach(charKey => {
    imgAssets[charKey] = {};
    Object.keys(CHARACTER_CONFIG[charKey].images).forEach(imgKey => {
        imgAssets[charKey][imgKey] = new Image();
        imgAssets[charKey][imgKey].src = CHARACTER_CONFIG[charKey].images[imgKey];
    });
});

// --- アニメーション用タイマー ---
let gameFrame = 0; // ループ毎に1ずつ増えるカウンター

// --- ゲームスコアとランキング ---
let score = 0;
let ranking = [15, 10, 5]; 

// --- プレイヤーオブジェクト ---
let player = {
    x: 100,
    y: 250,
    width: 50,
    height: 50,
    vy: 0,
    gravity: 0.6,
    isJumping: false
};

// --- ステージ要素の配列 ---
let cookies = [];
let obstacles = [];
let goalX = 3000; 
let cameraX = 0;

// --- ゲームの初期化関数 ---
function initGame() {
    score = 0;
    cameraX = 0;
    player.x = 100;
    player.y = 250;
    player.vy = 0;
    player.isJumping = false;

    // クッキーの配置
    cookies = [];
    for (let i = 0; i < 15; i++) {
        cookies.push({
            x: 400 + i * 180 + Math.random() * 50,
            y: 200 + Math.random() * 80,
            width: 25,
            height: 25,
            collected: false
        });
    }

    // 障害物の配置
    obstacles = [];
    for (let i = 0; i < 6; i++) {
        let type = Math.random() > 0.5 ? 'pit' : 'rock'; 
        obstacles.push({
            x: 600 + i * 400 + Math.random() * 100,
            y: type === 'rock' ? 260 : 300, 
            width: type === 'rock' ? 40 : 60,
            height: type === 'rock' ? 40 : 100,
            type: type
        });
    }
}

// --- 更新処理（プレイ画面用） ---
function update() {
    // 画面状態に関わらず、フレームカウンターは常に進める（アニメーション用）
    gameFrame++;

    if (currentState !== STATES.PLAY) return;

    const charConfig = CHARACTER_CONFIG[selectedCharKey];

    // プレイヤーの自動前進
    player.x += charConfig.speed;

    // 重力とジャンプ処理
    player.vy += player.gravity;
    player.y += player.vy;

    // 地面での接地判定
    if (player.y >= 250) {
        player.y = 250;
        player.vy = 0;
        player.isJumping = false;
    }

    // カメラの追従
    cameraX = player.x - 100;

    // クッキーとの当たり判定
    cookies.forEach(cookie => {
        if (!cookie.collected &&
            player.x < cookie.x + cookie.width &&
            player.x + player.width > cookie.x &&
            player.y < cookie.y + cookie.height &&
            player.y + player.height > cookie.y) {
            cookie.collected = true;
            score++;
        }
    });

    // 障害物との当たり判定
    obstacles.forEach(obs => {
        if (player.x < obs.x + obs.width &&
            player.x + player.width > obs.x &&
            player.y < obs.y + obs.height &&
            player.y + player.height > obs.y) {
            
            if (obs.type === 'pit') {
                endGame();
            } else {
                obs.x = -1000; 
                score = Math.max(0, score - 1);
            }
        }
    });

    // ゴール到達判定
    if (player.x >= goalX) {
        endGame();
    }
}

// ジャンプ動作の発火
function triggerJump() {
    if (!player.isJumping) {
        const charConfig = CHARACTER_CONFIG[selectedCharKey];
        player.vy = -charConfig.jumpPower; 
        player.isJumping = true;
    }
}

// ゲーム終了（リザルト画面へ）
function endGame() {
    ranking.push(score);
    ranking.sort((a, b) => b - a); 
    ranking = ranking.slice(0, 3); 
    currentState = STATES.RESULT;
}

// --- 描画処理 ---
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (currentState === STATES.TITLE) {
        drawTitleScreen();
    } else if (currentState === STATES.CHAR_SELECT) {
        drawCharSelectScreen();
    } else if (currentState === STATES.PLAY) {
        drawPlayScreen();
    } else if (currentState === STATES.RESULT) {
        drawResultScreen();
    }
}

// 1. タイトル画面の描画
function drawTitleScreen() {
    ctx.fillStyle = "#87CEEB";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#FFD700";
    ctx.strokeStyle = "#DC2626";
    ctx.lineWidth = 8;
    ctx.font = "bold 50px 'Arial Black'";
    ctx.textAlign = "center";
    ctx.strokeText("パウ・パトロール ゲーム", canvas.width / 2, 150);
    ctx.fillText("パウ・パトロール ゲーム", canvas.width / 2, 150);

    ctx.fillStyle = "#FFFFFF";
    ctx.font = "bold 24px sans-serif";
    ctx.fillText("画面を タップして スタート！", canvas.width / 2, 280);
}

// 2. キャラ選択画面の描画
const charButtons = {
    chase: { x: 150, y: 160, width: 200, height: 160 },
    marshall: { x: 450, y: 160, width: 200, height: 160 }
};

function drawCharSelectScreen() {
    ctx.fillStyle = "#E0F2FE";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#1E293B";
    ctx.font = "bold 32px sans-serif";
    ctx.textAlign = "center";
    ctx.fillText("だれで あそぶ？", canvas.width / 2, 80);

    drawSelectButton('chase', charButtons.chase, CHARACTER_CONFIG.chase);
    drawSelectButton('marshall', charButtons.marshall, CHARACTER_CONFIG.marshall);
}

function drawSelectButton(key, rect, config) {
    ctx.fillStyle = config.color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.width, rect.height, 20);
    ctx.fill();
    
    ctx.fillStyle = "#FFFFFF";
    ctx.beginPath();
    ctx.roundRect(rect.x + 8, rect.y + 8, rect.width - 16, rect.height - 16, 15);
    ctx.fill();

    // キャラ選択画面でのアニメーション（15フレームごとにrun1とrun2を交互に切り替え）
    let currentImgKey = (Math.floor(gameFrame / 15) % 2 === 0) ? 'run1' : 'run2';
    let img = imgAssets[key][currentImgKey];

    if (img && img.complete) {
        ctx.drawImage(img, rect.x + rect.width/2 - 40, rect.y + 20, 80, 80);
    } else {
        ctx.fillStyle = config.color;
        ctx.beginPath();
        ctx.arc(rect.x + rect.width / 2, rect.y + 60, 35, 0, Math.PI * 2);
        ctx.fill();
    }

    ctx.fillStyle = "#1E293B";
    ctx.font = "bold 22px sans-serif";
    ctx.textAlign = "center";
    ctx.fillText(config.name, rect.x + rect.width / 2, rect.y + 135);
}

// 3. プレイ画面の描画
function drawPlayScreen() {
    ctx.fillStyle = "#87CEEB";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    ctx.fillStyle = "#22C55E"; 
    ctx.fillRect(0, 300, canvas.width, 100);

    ctx.save();
    ctx.translate(-cameraX, 0);

    // 障害物の描画
    obstacles.forEach(obs => {
        if (obs.type === 'rock') {
            ctx.fillStyle = "#78716C"; 
            ctx.beginPath();
            ctx.roundRect(obs.x, obs.y, obs.width, obs.height, 10);
            ctx.fill();
        } else if (obs.type === 'pit') {
            ctx.fillStyle = "#87CEEB"; 
            ctx.fillRect(obs.x, 300, obs.width, 100);
        }
    });

    // クッキーの描画
    cookies.forEach(cookie => {
        if (!cookie.collected) {
            ctx.fillStyle = "#D97706"; 
            ctx.beginPath();
            ctx.arc(cookie.x + 12, cookie.y + 12, 12, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = "#451A03";
            ctx.fillRect(cookie.x + 6, cookie.y + 6, 3, 3);
            ctx.fillRect(cookie.x + 14, cookie.y + 8, 3, 3);
            ctx.fillRect(cookie.x + 10, cookie.y + 14, 3, 3);
        }
    });

    // ゴールの描画
    ctx.fillStyle = "#EF4444";
    ctx.fillRect(goalX, 100, 80, 200); 
    ctx.fillStyle = "#FFFFFF";
    ctx.font = "bold 20px sans-serif";
    ctx.fillText("パウステーション", goalX + 40, 90);

    // --- プレイヤーのアニメーション分け ---
    let activeImgKey = 'run1';
    if (player.isJumping) {
        // ジャンプ中は固定でjump画像
        activeImgKey = 'jump';
    } else {
        // 地面にいる時は、10フレームごとにrun1とrun2をパタパタ切り替え
        activeImgKey = (Math.floor(gameFrame / 10) % 2 === 0) ? 'run1' : 'run2';
    }

    let pImg = imgAssets[selectedCharKey][activeImgKey];
    const charConfig = CHARACTER_CONFIG[selectedCharKey];

    if (pImg && pImg.complete) {
        ctx.drawImage(pImg, player.x, player.y, player.width, player.height);
    } else {
        ctx.fillStyle = charConfig.color;
        ctx.fillRect(player.x, player.y, player.width, player.height);
    }

    ctx.restore();

    // スコアUI
    ctx.fillStyle = "#FFFFFF";
    ctx.font = "bold 24px sans-serif";
    ctx.textAlign = "left";
    ctx.fillText(`クッキー: ${score} こ`, 20, 40);
}

// 4. リザルト画面の描画
function drawResultScreen() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.6)"; 
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#FFFFFF";
    ctx.textAlign = "center";
    
    ctx.font = "bold 40px sans-serif";
    ctx.fillText("ゲームおわり！", canvas.width / 2, 80);

    ctx.font = "bold 30px sans-serif";
    ctx.fillStyle = "#FFD700";
    ctx.fillText(`きみのスコア: ${score} こ`, canvas.width / 2, 140);

    ctx.fillStyle = "#FFFFFF";
    ctx.font = "bold 22px sans-serif";
    ctx.fillText("とうばん ランキング", canvas.width / 2, 200);
    
    ranking.forEach((rankScore, index) => {
        ctx.fillText(`${index + 1}い: ${rankScore} こ`, canvas.width / 2, 240 + index * 30);
    });

    ctx.font = "18px sans-serif";
    ctx.fillStyle = "#CBD5E1";
    ctx.fillText("どこでも タップで タイトルにもどるよ", canvas.width / 2, 360);
}

// --- 入力（タップ・クリック）イベント処理 ---
function handleCanvasClick(e) {
    const rect = canvas.getBoundingClientRect();
    const clickX = (e.clientX - rect.left) * (canvas.width / rect.width);
    const clickY = (e.clientY - rect.top) * (canvas.height / rect.height);

    if (currentState === STATES.TITLE) {
        currentState = STATES.CHAR_SELECT;

    } else if (currentState === STATES.CHAR_SELECT) {
        if (clickX >= charButtons.chase.x && clickX <= charButtons.chase.x + charButtons.chase.width &&
            clickY >= charButtons.chase.y && clickY <= charButtons.chase.y + charButtons.chase.height) {
            selectedCharKey = 'chase';
            initGame();
            currentState = STATES.PLAY;
        } else if (clickX >= charButtons.marshall.x && clickX <= charButtons.marshall.x + charButtons.marshall.width &&
                   clickY >= charButtons.marshall.y && clickY <= charButtons.marshall.y + charButtons.marshall.height) {
            selectedCharKey = 'marshall';
            initGame();
            currentState = STATES.PLAY;
        }

    } else if (currentState === STATES.PLAY) {
        triggerJump();

    } else if (currentState === STATES.RESULT) {
        currentState = STATES.TITLE;
    }
}

canvas.addEventListener("mousedown", handleCanvasClick);
canvas.addEventListener("touchstart", function(e) {
    e.preventDefault(); 
    handleCanvasClick(e.touches[0]);
}, { passive: false });

window.addEventListener("keydown", (e) => {
    if (e.code === "Space") {
        if (currentState === STATES.PLAY) {
            triggerJump();
        }
    }
});

// --- メインループ ---
function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

// ループ開始
gameLoop();
</script>

</body>
</html>
