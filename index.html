<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>チェイスのパウパト・アクション（無敵復活機能付き）</title>
    <style>
        body { margin: 0; background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; position: relative; }
        canvas { background-color: #87CEEB; box-shadow: 0 4px 8px rgba(0,0,0,0.5); max-width: 100%; max-height: 100%; object-fit: contain; }
        .menu-container { position: absolute; display: flex; gap: 20px; top: 60%; }
        .mode-btn { padding: 15px 30px; font-size: 20px; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; box-shadow: 0 4px 0 #999; transition: 0.1s; }
        .mode-btn:active { transform: translateY(4px); box-shadow: none; }
        #easyBtn { background-color: #4ADE80; color: white; box-shadow: 0 4px 0 #166534; }
        #hardBtn { background-color: #F87171; color: white; box-shadow: 0 4px 0 #991B1B; }
    </style>
</head>
<body>

    <div class="menu-container" id="menuContainer">
        <button class="mode-btn" id="easyBtn" onclick="startGame('easy')">かんたん（0さい〜）</button>
        <button class="mode-btn" id="hardBtn" onclick="startGame('hard')">むずかしい（ライフ3つ）</button>
    </div>

    <canvas id="gameCanvas" width="800" height="400"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// ==========================================
// 🎵 1. オーディオ設定
// ==========================================
const bgm = new Audio("audio/bgm.mp3"); bgm.loop = true;
const seJump = new Audio("audio/jump.mp3");
const seItem = new Audio("audio/item.mp3");
const seHit = new Audio("audio/hit.mp3");
const seClear = new Audio("audio/clear.mp3");
const seGameOver = new Audio("audio/gameover.mp3");
const voiceStart = new Audio("audio/voice_start.mp3");
const voiceClear = new Audio("audio/voice_clear.mp3");

// ==========================================
// 🖼️ 2. グラフィック設定
// ==========================================
const bgImg = new Image(); bgImg.src = "images/background.png";
const goalImg = new Image(); goalImg.src = "images/paw_station.png";
const itemImg = new Image(); itemImg.src = "images/cookie.png";

const chaseFrames = [new Image(), new Image(), new Image()];
chaseFrames[0].src = "images/chase_run1.png";
chaseFrames[1].src = "images/chase_run2.png";
chaseFrames[2].src = "images/chase_jump.png";

const obstacleTypes = [
    { src: "images/cat.png", width: 45, height: 40, color: "#FFA500", name: "ねこ" },
    { src: "images/puddle.png", width: 60, height: 15, color: "#4169E1", name: "みずたまり" },
    { src: "images/box.png", width: 40, height: 40, color: "#8B4513", name: "きばこ" },
    { src: "images/car.png", width: 70, height: 40, color: "#333333", name: "くるま" },
    { src: "images/cone.png", width: 30, height: 40, color: "#FF4500", name: "コーン" }
];
obstacleTypes.forEach(obs => { obs.img = new Image(); obs.img.src = obs.src; });

// ==========================================
// 🎮 3. ゲームデータと定数
// ==========================================
const STAGE_WIDTH = 4000; 
const TILE_SIZE = 40;
const GROUND_Y = 340;

let score, isCleared, isGameOver, gameStarted = false, animeFrame = 0, gameMode = 'easy', lives;
let scrollX = 0;
let map = []; 
let obstacles = []; 
let items = []; 

// 🆕 無敵時間管理用の変数
let invincibleTimer = 0; 

const chase = { x: 100, y: 200, width: 50, height: 50, vy: 0, gravity: 0.6, jumpPower: -12, isGrounded: false };
const goal = { x: STAGE_WIDTH - 200, y: 140, width: 120, height: 200 }; 

function initGame() {
    score = 0; isCleared = false; isGameOver = false; lives = 3; scrollX = 0; animeFrame = 0; invincibleTimer = 0;
    chase.x = 100; chase.y = GROUND_Y - chase.height; chase.vy = 0; chase.isGrounded = true;

    map = Array(STAGE_WIDTH / TILE_SIZE).fill(0);
    for(let i = 0; i < map.length; i++) {
        if(i > 15 && i < map.length - 10 && i % 18 < 2) {
            map[i] = 1; 
        }
    }

    obstacles = [];
    for (let i = 300; i < STAGE_WIDTH - 400; i += 400 + Math.random() * 300) {
        let tileIdx = Math.floor(i / TILE_SIZE);
        if (map[tileIdx] === 0) { 
            const type = obstacleTypes[Math.floor(Math.random() * obstacleTypes.length)];
            obstacles.push({ x: i, y: GROUND_Y - type.height, width: type.width, height: type.height, img: type.img, color: type.color });
        }
    }

    items = [];
    for (let i = 200; i < STAGE_WIDTH - 300; i += 150 + Math.random() * 100) {
        items.push({ x: i, y: GROUND_Y - 80 - Math.random() * 60, width: 30, height: 30, isCollected: false });
    }
}

function playSound(audio) { audio.currentTime = 0; audio.play().catch(() => {}); }

// ==========================================
// 🕹️ 4. 操作・ゲーム開始とリトライ
// ==========================================
function startGame(mode) {
    if (gameStarted) return;
    initGame();
    gameMode = mode;
    gameStarted = true;
    document.getElementById("menuContainer").style.display = "none";
    playSound(bgm);
    playSound(voiceStart);
    gameLoop();
}

function backToTitle() {
    gameStarted = false;
    document.getElementById("menuContainer").style.display = "flex";
    drawTitleScreen();
}

function performJump() {
    if (gameStarted && !isCleared && !isGameOver && chase.isGrounded) {
        chase.vy = chase.jumpPower;
        chase.isGrounded = false;
        playSound(seJump);
    }
}

function handleInteraction() {
    if (!gameStarted) return;
    if (isCleared || isGameOver) backToTitle();
    else performJump();
}

window.addEventListener("keydown", (e) => {
    if (e.code === "Space" || e.code === "ArrowUp") {
        if (!gameStarted) return;
        if (isCleared || isGameOver) backToTitle();
        else performJump();
    }
});
window.addEventListener("mousedown", handleInteraction);
window.addEventListener("touchstart", handleInteraction);

// ==========================================
// 🔄 5. メインゲームループ
// ==========================================
function gameLoop() {
    if (!gameStarted) return;
    
    // ----- 更新処理 (Update) -----
    if (!isCleared && !isGameOver) {
        animeFrame++;
        scrollX += 5; 

        // 🆕 無敵タイマーのカウントダウン（1フレームごとに1減らす）
        if (invincibleTimer > 0) invincibleTimer--;

        chase.vy += chase.gravity;
        chase.y += chase.vy;

        let currentTileIndex = Math.floor((chase.x + scrollX + chase.width / 2) / TILE_SIZE);
        
        if (map[currentTileIndex] === 0) { 
            if (chase.y + chase.height >= GROUND_Y) {
                chase.y = GROUND_Y - chase.height;
                chase.vy = 0;
                chase.isGrounded = true;
            }
        } else { 
            chase.isGrounded = false;
        }

        // 穴に落ちた判定の修正
        if (chase.y > 400) {
            playSound(seHit);
            if (gameMode === 'hard') {
                lives--; // 🆕 むずかしいモードならしっかりHP（ライフ）を減らす
                if (lives <= 0) {
                    isGameOver = true; bgm.pause(); playSound(seGameOver);
                }
            }
            if (!isGameOver) {
                // 復活処理：穴の少し先の上空から安全に復帰
                chase.y = 100; 
                chase.vy = 0;
                invincibleTimer = 120; // 🆕 2秒間（60フレーム×2）の無敵時間をセット
            }
        }

        // 当たり判定：障害物
        obstacles.forEach(obs => {
            let screenObsX = obs.x - scrollX;
            if (chase.x < screenObsX + obs.width && chase.x + chase.width > screenObsX &&
                chase.y < obs.y + obs.height && chase.y + chase.height > obs.y) {
                
                // 🆕 無敵時間中でない場合のみダメージを受ける
                if (invincibleTimer === 0) {
                    playSound(seHit);
                    if (gameMode === 'hard') {
                        lives--;
                        if (lives <= 0) { isGameOver = true; bgm.pause(); playSound(seGameOver); }
                    }
                    obs.x = -1000; // 当たった障害物を消去
                    invincibleTimer = 120; // 🆕 障害物に当たった後も2秒間無敵にする
                }
            }
        });

        // 当たり判定：アイテム
        items.forEach(it => {
            let screenItemX = it.x - scrollX;
            if (!it.isCollected &&
                chase.x < screenItemX + it.width && chase.x + chase.width > screenItemX &&
                chase.y < it.y + it.height && chase.y + chase.height > it.y) {
                
                it.isCollected = true; score += 1; playSound(seItem);
            }
        });

        if (chase.x + scrollX > goal.x) {
            isCleared = true; bgm.pause(); playSound(seClear); playSound(voiceClear);
        }
    }

    // ----- 描画処理 (Draw) -----
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (bgImg.complete && bgImg.width > 0) {
        let bgMoveX = -(scrollX * 0.5) % canvas.width;
        ctx.drawImage(bgImg, bgMoveX, 0, canvas.width, canvas.height);
        ctx.drawImage(bgImg, bgMoveX + canvas.width, 0, canvas.width, canvas.height);
    } else {
        ctx.fillStyle = "#87CEEB"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    for(let i = 0; i < map.length; i++) {
        let screenTileX = i * TILE_SIZE - scrollX;
        if (screenTileX >= -TILE_SIZE && screenTileX <= canvas.width) {
            if (map[i] === 0) {
                ctx.fillStyle = "#228B22"; 
                ctx.fillRect(screenTileX, GROUND_Y, TILE_SIZE, canvas.height - GROUND_Y);
            }
        }
    }

    items.forEach(it => {
        let screenItemX = it.x - scrollX;
        if (!it.isCollected && screenItemX >= -30 && screenItemX <= canvas.width) {
            if (itemImg.complete && itemImg.width > 0) ctx.drawImage(itemImg, screenItemX, it.y, it.width, it.height);
            else { ctx.fillStyle = "#FBBF24"; ctx.beginPath(); ctx.arc(screenItemX + 15, it.y + 15, 15, 0, Math.PI * 2); ctx.fill(); }
        }
    });

    obstacles.forEach(obs => {
        let screenObsX = obs.x - scrollX;
        if (screenObsX >= -100 && screenObsX <= canvas.width) {
            if (obs.img && obs.img.complete && obs.img.width > 0) ctx.drawImage(obs.img, screenObsX, obs.y, obs.width, obs.height);
            else { ctx.fillStyle = obs.color; ctx.fillRect(screenObsX, obs.y, obs.width, obs.height); }
        }
    });

    let screenGoalX = goal.x - scrollX;
    if (goalImg.complete && goalImg.width > 0) {
        ctx.drawImage(goalImg, screenGoalX, goal.y, goal.width, goal.height);
    } else {
        ctx.fillStyle = "#1E3A8A"; ctx.fillRect(screenGoalX, goal.y, goal.width, goal.height);
        ctx.fillStyle = "#FFFFFF"; ctx.font = "bold 16px sans-serif"; ctx.fillText("GOAL", screenGoalX + 30, goal.y + 30);
    }

    // 🆕 チェイスの描画（無敵時間中はチカチカ点滅させる）
    // 5フレームごとに表示・非表示を切り替えるパラパラ漫画の仕組み
    if (invincibleTimer === 0 || Math.floor(animeFrame / 5) % 2 === 0) {
        let currentChaseImg = chaseFrames[0];
        if (!chase.isGrounded) currentChaseImg = chaseFrames[2];
        else currentChaseImg = chaseFrames[Math.floor(animeFrame / 10) % 2];

        if (currentChaseImg.complete && currentChaseImg.width > 0) {
            ctx.drawImage(currentChaseImg, chase.x, chase.y, chase.width, chase.height);
        } else {
            ctx.fillStyle = "#0000FF"; ctx.fillRect(chase.x, chase.y, chase.width, chase.height);
        }
    }

    ctx.fillStyle = "#FFFFFF"; ctx.font = "bold 20px sans-serif"; ctx.textAlign = "left";
    let statusText = "ほねクッキー: " + score + (gameMode === 'hard' ? "  ❤️×" + lives : "");
    ctx.fillText(statusText, 20, 40);

    ctx.fillStyle = "rgba(211, 211, 211, 0.5)"; ctx.fillRect(20, 55, 15 * 10, 8);
    ctx.fillStyle = "#FFFF00"; ctx.fillRect(20, 55, (scrollX / (STAGE_WIDTH - 800)) * (15 * 10), 8);

    if (isCleared || isGameOver) {
        ctx.fillStyle = "rgba(0, 0, 0, 0.6)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#FFFF00"; ctx.font = "bold 40px sans-serif"; ctx.textAlign = "center";
        ctx.fillText(isCleared ? "パウフェクト！" : "解決ならず…！", canvas.width / 2, canvas.height / 2 - 20);
        ctx.fillStyle = "#FFFFFF"; ctx.font = "18px sans-serif";
        ctx.fillText("【 クリック / タップで タイトルに もどる 】", canvas.width / 2, canvas.height / 2 + 40);
    } else {
        requestAnimationFrame(gameLoop);
    }
}

function drawTitleScreen() {
    ctx.fillStyle = "#87CEEB"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#228B22"; ctx.fillRect(0, GROUND_Y, canvas.width, canvas.height - GROUND_Y);
    ctx.fillStyle = "#FFFFFF"; ctx.font = "bold 28px sans-serif"; ctx.textAlign = "center";
    ctx.fillText("チェイスの パウパト・アクション！", canvas.width / 2, canvas.height / 2 - 60);
    ctx.font = "18px sans-serif"; ctx.fillText("どっちの モードで あそぶ？", canvas.width / 2, canvas.height / 2 - 20);
}

drawTitleScreen();
</script>

</body>
</html>
