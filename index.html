<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>パウ・パトロール風 横スクロールゲーム</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
        canvas {
            background-color: #87CEEB; /* 空の色 */
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            max-width: 100%;
            max-height: 100%;
        }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="800" height="400"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// --- ゲームの状態（画面遷移用） ---
const STATES = {
    TITLE: 'TITLE',
    CHAR_SELECT: 'CHAR_SELECT',
    PLAY: 'PLAY',
    RESULT: 'RESULT'
};
let currentState = STATES.TITLE;

// --- キャラクターの定数定義 ---
const CHARACTER_CONFIG = {
    chase: {
        name: "チェイス",
        color: "#1E3A8A",
        baseSpeed: 5.5,
        jumpPower: 13.5,
        images: {
            run1: "images/chase_run1.png",
            run2: "images/chase_run2.png",
            jump: "images/chase_jump.png"
        }
    },
    marshall: {
        name: "マーシャル",
        color: "#DC2626",
        baseSpeed: 5.0,
        jumpPower: 14.5,
        images: {
            run1: "images/marshall_run1.png",
            run2: "images/marshall_run2.png",
            jump: "images/marshall_jump.png"
        }
    }
};

let selectedCharKey = 'chase'; 

// --- 画像アセットの管理 ---
const imgAssets = {
    chars: {},
    items: {},
    obstacles: {}
};

// キャラクター画像の読み込み
Object.keys(CHARACTER_CONFIG).forEach(charKey => {
    imgAssets.chars[charKey] = {};
    Object.keys(CHARACTER_CONFIG[charKey].images).forEach(imgKey => {
        imgAssets.chars[charKey][imgKey] = new Image();
        imgAssets.chars[charKey][imgKey].src = CHARACTER_CONFIG[charKey].images[imgKey];
    });
});

imgAssets.items.cookie = new Image();
imgAssets.items.cookie.src = "images/cookie.png";
imgAssets.items.pawStation = new Image();
imgAssets.items.pawStation.src = "images/paw_station.png";

const obstacleImages = {
    car: "images/car.png",
    box: "images/box.png",
    cone: "images/cone.png",
    cat: "images/cat.png",
    puddle: "images/puddle.png"
};
Object.keys(obstacleImages).forEach(key => {
    imgAssets.obstacles[key] = new Image();
    imgAssets.obstacles[key].src = obstacleImages[key];
});

// --- アニメーション用タイマー ---
let gameFrame = 0; 

// --- ゲームスコアとランキング ---
let score = 0;
let ranking = [15, 10, 5]; 

// --- プレイヤーオブジェクト ---
let player = {
    x: 100,
    y: 240,
    width: 60,   
    height: 60,
    vy: 0,
    gravity: 0.65, 
    isJumping: false,
    invincibleTimer: 0, 
    speedModifier: 1.0,
    isFallingInPit: false // 落とし穴落下中フラグ
};

const GROUND_Y = 240; 

// --- エフェクト用の配列 ---
let droppedCookies = []; // ポロッと落ちるクッキー用配列

// --- 背景（ビル・建物）の自動生成用データ ---
let bgBuildings = [];

// --- ステージ要素の配列 ---
let cookies = [];
let obstacles = [];
let goalX = 15000; 
let cameraX = 0;

// --- ゲームの初期化関数 ---
function initGame() {
    score = 0;
    cameraX = 0;
    player.x = 100;
    player.y = GROUND_Y;
    player.vy = 0;
    player.isJumping = false;
    player.invincibleTimer = 0;
    player.speedModifier = 1.0;
    player.isFallingInPit = false;
    droppedCookies = [];

    // 背景の建物をランダムに生成
    bgBuildings = [];
    for (let i = 0; i < 60; i++) {
        bgBuildings.push({
            x: i * 260 + Math.random() * 80,
            width: 140 + Math.random() * 100,
            height: 150 + Math.random() * 120,
            color: ["#7DD3FC", "#93C5FD", "#A5B4FC"][Math.floor(Math.random() * 3)] // 遠くの淡い青・紫系
        });
    }

    // クッキーの配置
    cookies = [];
    for (let i = 0; i < 100; i++) {
        cookies.push({
            x: 400 + i * 145 + Math.random() * 30,
            y: GROUND_Y - 40 - Math.random() * 80,
            width: 30,
            height: 30,
            collected: false
        });
    }

    // 障害物の配置
    obstacles = [];
    const types = ['car', 'box', 'cone', 'cat', 'puddle', 'pit'];
    for (let i = 0; i < 40; i++) {
        let type = types[Math.floor(Math.random() * types.length)];
        let obsWidth = 50;
        let obsHeight = 50;
        let obsY = GROUND_Y;

        if (type === 'car') { obsWidth = 70; obsHeight = 45; obsY = GROUND_Y + 15; }
        else if (type === 'box') { obsWidth = 50; obsHeight = 50; obsY = GROUND_Y + 10; }
        else if (type === 'cone') { obsWidth = 40; obsHeight = 45; obsY = GROUND_Y + 15; }
        else if (type === 'cat') { obsWidth = 50; obsHeight = 50; obsY = GROUND_Y + 10; }
        else if (type === 'puddle') { obsWidth = 70; obsHeight = 15; obsY = GROUND_Y + 45; }
        else if (type === 'pit') { obsWidth = 130; obsHeight = 160; obsY = GROUND_Y + 60; } // ① 落とし穴を1.5倍広く、深く設定

        obstacles.push({
            x: 500 + i * 350 + Math.random() * 60,
            y: obsY,
            width: obsWidth,
            height: obsHeight,
            type: type
        });
    }
}

// 被弾時のダメージ共通処理
function triggerDamage(sourceObstacle = null) {
    if (player.invincibleTimer > 0) return; 
    
    if (score > 0) {
        score--; 
        // ③ クッキーがポロッと落ちるエフェクトのデータを追加
        droppedCookies.push({
            x: player.x + player.width / 2,
            y: player.y + player.height / 2,
            vx: -3 - Math.random() * 3, // 左後ろに飛ぶ
            vy: -6 - Math.random() * 4, // 上に跳ね上がる
            gravity: 0.5,
            rotation: 0,
            rotSpeed: (Math.random() - 0.5) * 0.2
        });
    }
    player.invincibleTimer = 120; // 2秒間無敵
}

// --- 更新処理 ---
function update() {
    gameFrame++;

    if (currentState !== STATES.PLAY) return;

    const charConfig = CHARACTER_CONFIG[selectedCharKey];

    // 無敵タイマーカウント
    if (player.invincibleTimer > 0) {
        player.invincibleTimer--;
    }

    // ③ ポロッと落ちたクッキーのエフェクト計算
    droppedCookies.forEach(dc => {
        dc.vy += dc.gravity;
        dc.x += dc.vx;
        dc.y += dc.vy;
        dc.rotation += dc.rotSpeed;
    });
    // 画面外か地面より下に落ちすぎたエフェクトを削除
    droppedCookies = droppedCookies.filter(dc => dc.y < 450);

    // ① 落とし穴落下中の専用挙動
    if (player.isFallingInPit) {
        player.vy += 0.8; // 急落下用の強い重力
        player.y += player.vy;
        
        // 穴の底（画面外の下部）まで落ちきったら復帰
        if (player.y > 420) {
            player.isFallingInPit = false;
            player.y = GROUND_Y;
            player.vy = 0;
            player.isJumping = false;
        }
        cameraX = player.x - 100; // 落っことされている間もカメラ位置は維持
        return; // 通常の移動や当たり判定をスキップ
    }

    player.speedModifier = 1.0; 

    // 通常時の移動
    player.x += charConfig.baseSpeed * player.speedModifier;

    // 重力とジャンプの物理演算
    player.vy += player.gravity;
    player.y += player.vy;

    if (player.y >= GROUND_Y) {
        player.y = GROUND_Y;
        player.vy = 0;
        player.isJumping = false;
    }

    cameraX = player.x - 100;

    // クッキーとの当たり判定
    cookies.forEach(cookie => {
        if (!cookie.collected &&
            player.x < cookie.x + cookie.width &&
            player.x + player.width > cookie.x &&
            player.y < cookie.y + cookie.height &&
            player.y + player.height > cookie.y) {
            cookie.collected = true;
            score++;
        }
    });

    // 障害物との当たり判定
    obstacles.forEach(obs => {
        let isColliding = player.x < obs.x + obs.width &&
                          player.x + player.width > obs.x &&
                          player.y < obs.y + obs.height &&
                          player.y + player.height > obs.y;

        if (!isColliding) return;

        // 車, 箱, コーン (踏みつけ自動ジャンプ)
        if (obs.type === 'car' || obs.type === 'box' || obs.type === 'cone') {
            if (player.vy > 0 && player.y + player.height - player.vy <= obs.y + 15) {
                player.y = obs.y - player.height;
                player.vy = -charConfig.jumpPower; 
                player.isJumping = true;
            } else {
                if (player.invincibleTimer === 0) triggerDamage();
            }
        } 
        // ニャンパト
        else if (obs.type === 'cat') {
            if (player.invincibleTimer === 0) triggerDamage();
        } 
        // 水たまり
        else if (obs.type === 'puddle') {
            player.speedModifier = 0.5; 
        }
        // ① 落とし穴（穴の中心近くまで踏み込んだら落下）
        else if (obs.type === 'pit') {
            if (player.x + player.width / 2 > obs.x + 15 && player.x + player.width / 2 < obs.x + obs.width - 15) {
                if (player.y >= GROUND_Y - 5) { // 地面にいる（または飛び越え損ねた）場合
                    player.isFallingInPit = true;
                    player.vy = 2; // 下方向への初速
                    // 落下復帰位置を設定（穴の手前）
                    player.x = obs.x - 60;
                    triggerDamage();
                }
            }
        }
    });

    if (player.x >= goalX) {
        endGame();
    }
}

function triggerJump() {
    // 穴に落ちている最中はジャンプできない
    if (!player.isJumping && !player.isFallingInPit) {
        const charConfig = CHARACTER_CONFIG[selectedCharKey];
        player.vy = -charConfig.jumpPower; 
        player.isJumping = true;
    }
}

function endGame() {
    ranking.push(score);
    ranking.sort((a, b) => b - a); 
    ranking = ranking.slice(0, 3); 
    currentState = STATES.RESULT;
}

// --- 描画処理 ---
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (currentState === STATES.TITLE) {
        drawTitleScreen();
    } else if (currentState === STATES.CHAR_SELECT) {
        drawCharSelectScreen();
    } else if (currentState === STATES.PLAY) {
        drawPlayScreen();
    } else if (currentState === STATES.RESULT) {
        drawResultScreen();
    }
}

function drawTitleScreen() {
    ctx.fillStyle = "#87CEEB";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#FFD700";
    ctx.strokeStyle = "#DC2626";
    ctx.lineWidth = 8;
    ctx.font = "bold 50px 'Arial Black'";
    ctx.textAlign = "center";
    ctx.strokeText("パウ・パトロール ゲーム", canvas.width / 2, 150);
    ctx.fillText("パウ・パトロール ゲーム", canvas.width / 2, 150);

    ctx.fillStyle = "#FFFFFF";
    ctx.font = "bold 24px sans-serif";
    ctx.fillText("まわりを タップしても スタートするよ！", canvas.width / 2, 280);
}

const charButtons = {
    chase: { x: 150, y: 160, width: 200, height: 160 },
    marshall: { x: 450, y: 160, width: 200, height: 160 }
};

function drawCharSelectScreen() {
    ctx.fillStyle = "#E0F2FE";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#1E293B";
    ctx.font = "bold 32px sans-serif";
    ctx.textAlign = "center";
    ctx.fillText("だれで あそぶ？", canvas.width / 2, 80);

    drawSelectButton('chase', charButtons.chase, CHARACTER_CONFIG.chase);
    drawSelectButton('marshall', charButtons.marshall, CHARACTER_CONFIG.marshall);
}

function drawSelectButton(key, rect, config) {
    ctx.fillStyle = config.color;
    ctx.beginPath();
    ctx.roundRect(rect.x, rect.y, rect.width, rect.height, 20);
    ctx.fill();
    
    ctx.fillStyle = "#FFFFFF";
    ctx.beginPath();
    ctx.roundRect(rect.x + 8, rect.y + 8, rect.width - 16, rect.height - 16, 15);
    ctx.fill();

    let currentImgKey = (Math.floor(gameFrame / 15) % 2 === 0) ? 'run1' : 'run2';
    let img = imgAssets.chars[key][currentImgKey];

    if (img && img.complete) {
        ctx.drawImage(img, rect.x + rect.width/2 - 40, rect.y + 20, 80, 80);
    } else {
        ctx.fillStyle = config.color;
        ctx.beginPath();
        ctx.arc(rect.x + rect.width / 2, rect.y + 60, 35, 0, Math.PI * 2);
        ctx.fill();
    }

    ctx.fillStyle = "#1E293B";
    ctx.font = "bold 22px sans-serif";
    ctx.textAlign = "center";
    ctx.fillText(config.name, rect.x + rect.width / 2, rect.y + 135);
}

function drawPlayScreen() {
    // スカイブルーの空
    ctx.fillStyle = "#87CEEB";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // ④ 背景の建物描画（パララックス効果：カメラの動くスピードを0.3倍にして遅く流す）
    ctx.save();
    ctx.translate(-cameraX * 0.3, 0);
    bgBuildings.forEach(b => {
        ctx.fillStyle = b.color;
        ctx.fillRect(b.x, GROUND_Y + 60 - b.height, b.width, b.height);
        // ビルの窓を簡易描画（それっぽく見せるため）
        ctx.fillStyle = "rgba(255, 255, 255, 0.4)";
        ctx.fillRect(b.x + 15, GROUND_Y + 90 - b.height, 15, 15);
        ctx.fillRect(b.x + b.width - 30, GROUND_Y + 90 - b.height, 15, 15);
        ctx.fillRect(b.x + 15, GROUND_Y + 130 - b.height, 15, 15);
        ctx.fillRect(b.x + b.width - 30, GROUND_Y + 130 - b.height, 15, 15);
    });
    ctx.restore();
    
    // 手前の緑の地面
    ctx.fillStyle = "#22C55E"; 
    ctx.fillRect(0, GROUND_Y + 60, canvas.width, 100);

    ctx.save();
    ctx.translate(-cameraX, 0);

    // 障害物の描画
    obstacles.forEach(obs => {
        if (obs.type === 'pit') {
            ctx.fillStyle = "#87CEEB"; // 空と同じ色で穴を抜く
            ctx.fillRect(obs.x, GROUND_Y + 60, obs.width, 110);
            // 穴の側面線
            ctx.strokeStyle = "#166534";
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(obs.x, GROUND_Y + 60);
            ctx.lineTo(obs.x, GROUND_Y + 160);
            ctx.moveTo(obs.x + obs.width, GROUND_Y + 60);
            ctx.lineTo(obs.x + obs.width, GROUND_Y + 160);
            ctx.stroke();
        } else {
            let obsImg = imgAssets.obstacles[obs.type];
            if (obsImg && obsImg.complete) {
                ctx.drawImage(obsImg, obs.x, obs.y, obs.width, obs.height);
            } else {
                ctx.fillStyle = obs.type === 'cat' ? '#F59E0B' : '#6B7280';
                ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
            }
        }
    });

    // クッキーの描画
    cookies.forEach(cookie => {
        if (!cookie.collected) {
            let cookieImg = imgAssets.items.cookie;
            if (cookieImg && cookieImg.complete) {
                ctx.drawImage(cookieImg, cookie.x, cookie.y, cookie.width, cookie.height);
            } else {
                ctx.fillStyle = "#D97706"; 
                ctx.beginPath();
                ctx.arc(cookie.x + 15, cookie.y + 15, 15, 0, Math.PI * 2);
                ctx.fill();
            }
        }
    });

    // ③ ポロッと落ちたクッキーのエフェクト描画
    droppedCookies.forEach(dc => {
        ctx.save();
        ctx.translate(dc.x, dc.y);
        ctx.rotate(dc.rotation);
        let cookieImg = imgAssets.items.cookie;
        if (cookieImg && cookieImg.complete) {
            ctx.drawImage(cookieImg, -15, -15, 30, 30); // 中心を軸に回す
        } else {
            ctx.fillStyle = "#9A3412";
            ctx.fillRect(-10, -10, 20, 20);
        }
        ctx.restore();
    });

    // ゴール（パウステーション）の描画
    let stationImg = imgAssets.items.pawStation;
    if (stationImg && stationImg.complete) {
        ctx.drawImage(stationImg, goalX, GROUND_Y - 140, 150, 200);
    } else {
        ctx.fillStyle = "#EF4444";
        ctx.fillRect(goalX, GROUND_Y - 140, 120, 200);
    }

    // プレイヤーの描画（無敵中は点滅）
    let shouldDrawPlayer = true;
    if (player.invincibleTimer > 0 && Math.floor(player.invincibleTimer / 4) % 2 === 0) {
        shouldDrawPlayer = false; 
    }

    if (shouldDrawPlayer) {
        let activeImgKey = 'run1';
        if (player.isFallingInPit || player.isJumping) {
            activeImgKey = 'jump';
        } else {
            activeImgKey = (Math.floor(gameFrame / 10) % 2 === 0) ? 'run1' : 'run2';
        }

        let pImg = imgAssets.chars[selectedCharKey][activeImgKey];
        const charConfig = CHARACTER_CONFIG[selectedCharKey];

        if (pImg && pImg.complete) {
            ctx.drawImage(pImg, player.x, player.y, player.width, player.height);
        } else {
            ctx.fillStyle = charConfig.color;
            ctx.fillRect(player.x, player.y, player.width, player.height);
        }

        // ② 被弾時・無敵時間の「💦」エフェクトの描画
        if (player.invincibleTimer > 0) {
            ctx.fillStyle = "#38BDF8";
            ctx.font = "30px sans-serif";
            ctx.textAlign = "center";
            // ぴょこぴょこ動かすためのサイン波
            let sweatY = player.y - 15 + Math.sin(gameFrame * 0.2) * 5;
            ctx.fillText("💦", player.x + player.width / 2, sweatY);
        }
    }

    ctx.restore();

    // スコアUI
    let uiCookieImg = imgAssets.items.cookie;
    if (uiCookieImg && uiCookieImg.complete) {
        ctx.drawImage(uiCookieImg, 20, 15, 30, 30);
        ctx.fillStyle = "#FFFFFF";
        ctx.font = "bold 26px sans-serif";
        ctx.textAlign = "left";
        ctx.fillText(`× ${score}`, 60, 40);
    } else {
        ctx.fillStyle = "#FFFFFF";
        ctx.font = "bold 24px sans-serif";
        ctx.fillText(`クッキー: ${score} こ`, 20, 40);
    }
}

function drawResultScreen() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.6)"; 
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#FFFFFF";
    ctx.textAlign = "center";
    
    ctx.font = "bold 40px sans-serif";
    ctx.fillText("ゲームおわり！", canvas.width / 2, 80);

    ctx.font = "bold 30px sans-serif";
    ctx.fillStyle = "#FFD700";
    ctx.fillText(`きみのスコア: ${score} こ`, canvas.width / 2, 140);

    ctx.fillStyle = "#FFFFFF";
    ctx.font = "bold 22px sans-serif";
    ctx.fillText("とうばん ランキング", canvas.width / 2, 200);
    
    ranking.forEach((rankScore, index) => {
        ctx.fillText(`${index + 1}い: ${rankScore} こ`, canvas.width / 2, 240 + index * 30);
    });

    ctx.font = "18px sans-serif";
    ctx.fillStyle = "#CBD5E1";
    ctx.fillText("どこでも タップで タイトルにもどるよ", canvas.width / 2, 360);
}

// --- 入力イベント処理 ---
function handleGlobalClick(e) {
    let clientX = e.clientX;
    let clientY = e.clientY;
    if (e.touches && e.touches.length > 0) {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
    }

    const rect = canvas.getBoundingClientRect();
    const clickX = (clientX - rect.left) * (canvas.width / rect.width);
    const clickY = (clientY - rect.top) * (canvas.height / rect.height);

    if (currentState === STATES.TITLE) {
        currentState = STATES.CHAR_SELECT;

    } else if (currentState === STATES.CHAR_SELECT) {
        if (clickX >= charButtons.chase.x && clickX <= charButtons.chase.x + charButtons.chase.width &&
            clickY >= charButtons.chase.y && clickY <= charButtons.chase.y + charButtons.chase.height) {
            selectedCharKey = 'chase';
            initGame();
            currentState = STATES.PLAY;
        } else if (clickX >= charButtons.marshall.x && clickX <= charButtons.marshall.x + charButtons.marshall.width &&
                   clickY >= charButtons.marshall.y && clickY <= charButtons.marshall.y + charButtons.marshall.height) {
            selectedCharKey = 'marshall';
            initGame();
            currentState = STATES.PLAY;
        }

    } else if (currentState === STATES.PLAY) {
        triggerJump();

    } else if (currentState === STATES.RESULT) {
        currentState = STATES.TITLE;
    }
}

window.addEventListener("mousedown", handleGlobalClick);
window.addEventListener("touchstart", function(e) {
    if (currentState === STATES.PLAY || currentState === STATES.TITLE || currentState === STATES.RESULT) {
        e.preventDefault(); 
    }
    handleGlobalClick(e);
}, { passive: false });

window.addEventListener("keydown", (e) => {
    if (e.code === "Space") {
        if (currentState === STATES.PLAY) {
            triggerJump();
        }
    }
});

// --- メインループ ---
function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
