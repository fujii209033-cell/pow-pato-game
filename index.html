<!DOCTYPE html>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        
        #gameContainer {
            width: 100vw;
            height: 50vw; 
            max-width: 800px;
            max-height: 400px;
            position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            background-color: #87CEEB;
        }

        @media (orientation: landscape) {
            #gameContainer {
                width: 100vw;
                height: 100vh;
                max-width: none;
                max-height: none;
                aspect-ratio: 2 / 1;
                margin: auto;
            }
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

<div id="gameContainer">
    <canvas id="gameCanvas" width="800" height="400"></canvas>
</div>

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

function resizeCanvasForRetina() {
    const dpr = window.devicePixelRatio || 1;
    canvas.width = 800 * dpr;
    canvas.height = 400 * dpr;
    ctx.scale(dpr, dpr);
}

window.addEventListener('load', resizeCanvasForRetina);
window.addEventListener('resize', () => {
    setTimeout(resizeCanvasForRetina, 200);
});
resizeCanvasForRetina();

    TITLE: 'TITLE',
    CHAR_SELECT: 'CHAR_SELECT',
    MODE_SELECT: 'MODE_SELECT', 
    PLAY: 'PLAY',
    PAUSE: 'PAUSE',
    RESULT: 'RESULT',
    GAMEOVER: 'GAMEOVER',       
    RANKING_VIEW: 'RANKING_VIEW'

};
const UNIFORM_VOLUME = 0.5;
Object.keys(audioAssets).forEach(key => { audioAssets[key].volume = UNIFORM_VOLUME; });
audioAssets.bgmTitle.loop = true;
audioAssets.bgmPlay.loop = true;
audioAssets.bgmClear.loop = true;

let currentActiveBgm = null; 
let isAudioInitialized = false;

function playBgm(targetAudio) {
    audioAssets.bgmTitle.pause(); audioAssets.bgmTitle.currentTime = 0;
    audioAssets.bgmPlay.pause();  audioAssets.bgmPlay.currentTime = 0;
    audioAssets.bgmClear.pause(); audioAssets.bgmClear.currentTime = 0;
    audioAssets.bgmGameover.pause(); audioAssets.bgmGameover.currentTime = 0;
    currentActiveBgm = targetAudio;
    if (document.visibilityState === 'visible' && currentState !== STATES.PAUSE && isAudioInitialized) {
        targetAudio.play().catch(e => {});
    }
}
function playSe(targetSe) {
    if (!isAudioInitialized) return;
    targetSe.currentTime = 0;
    targetSe.play().catch(e => {});
}

imgAssets.obstacles.cone.src = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 45"><polygon points="20,0 5,40 35,40" fill="#F97316"/><rect x="0" y="40" width="40" height="5" fill="#F97316"/><rect x="12" y="15" width="16" height="8" fill="#FFFFFF"/></svg>`);
imgAssets.obstacles.cat = new Image();
imgAssets.obstacles.cat.src = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 50"><circle cx="25" cy="25" r="15" fill="#94A3B8"/><polygon points="13,15 10,5 20,12" fill="#94A3B8"/><polygon points="37,15 40,5 30,12" fill="#94A3B8"/><circle cx="20" cy="22" r="2" fill="#000"/><circle cx="30" cy="22" r="2" fill="#000"/><path d="M22,28 Q25,32 28,28" stroke="#000" stroke-width="2" fill="none"/></svg>`);
imgAssets.obstacles.puddle = new Image();
imgAssets.obstacles.puddle.src = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 70 15"><ellipse cx="35" cy="8" rx="33" ry="6" fill="#60A5FA" opacity="0.8"/></svg>`);
imgAssets.obstacles.bird = new Image();
imgAssets.obstacles.bird.src = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 45 35"><path d="M10,15 Q20,0 30,15 Z" fill="#475569" /><path d="M10,15 Q0,5 5,0 Z" fill="#64748B" /><path d="M30,15 Q40,5 35,0 Z" fill="#64748B" /></svg>`);

// --- ゲーム変数 ---
let gameFrame = 0; 
let score = 0;
let lives = 5;
let ranking = [15, 10, 5];
if (localStorage.getItem("paw_game_ranking")) {
    try { ranking = JSON.parse(localStorage.getItem("paw_game_ranking")); } catch(e) { ranking = [15, 10, 5]; }
}

let player = {
    x: 100, y: 240, width: 60, height: 60, vy: 0, 
    gravity: 0.85, isJumping: false, invincibleTimer: 0, speedModifier: 1.0, isFallingInPit: false 
};
let slopePoints = [];
const SLOPE_INTERVAL = 200;
const BASE_GROUND_Y = 240; 

let droppedCookies = []; 
let fallingObstacles = [];
let bgBuildings = [];
let cookies = [];
let obstacles = [];
let bones = []; 
let shieldItems = [];
let dashPanels = []; 
let textPopups = []; 
let confettiParticles = []; 
let goalX = 15000; 
let cameraX = 0;

function getGroundY(x) {
    if (x < 0 || x >= goalX - 400) return BASE_GROUND_Y;
    let index = Math.floor(x / SLOPE_INTERVAL);
    if (index >= slopePoints.length - 1) return BASE_GROUND_Y;
    let p1 = slopePoints[index];
    let p2 = slopePoints[index + 1];
    let ratio = (x % SLOPE_INTERVAL) / SLOPE_INTERVAL;
    return p1 + (p2 - p1) * ratio;
}

function addTextPopup(x, y, text, color = "#FFF") {
    textPopups.push({ x: x, y: y, text: text, color: color, alpha: 1.0, timer: 45 });
}

function createConfetti() {
    const colors = ["#FF2A6D", "#05D9E8", "#F5A623", "#7ED321", "#F8E71C"];
    for (let i = 0; i < 100; i++) {
        confettiParticles.push({
            x: Math.random() * 800, y: Math.random() * -400, size: Math.random() * 8 + 5,
            color: colors[Math.floor(Math.random() * colors.length)],
            vx: (Math.random() - 0.5) * 4, vy: Math.random() * 3 + 2, rotation: Math.random() * Math.PI, rotSpeed: (Math.random() - 0.5) * 0.1
        });
    }
}

function initGame() {
    score = 0; lives = 5; cameraX = 0;
    player.x = 100; player.vy = 0; player.isJumping = false; player.invincibleTimer = 0; player.speedModifier = 1.0; player.isFallingInPit = false;
    droppedCookies = []; fallingObstacles = []; textPopups = []; confettiParticles = []; dashPanelTimer = 0; jumpCounter = 0;
    isHovering = false; hoverTimer = 0; hasRockyShield = (selectedCharKey === 'rocky'); rubbleRecoveryCount = 0; isZumaDashing = false;

    slopePoints = [];
    let numPoints = Math.ceil(goalX / SLOPE_INTERVAL) + 5;
    let lastY = BASE_GROUND_Y;
    for (let i = 0; i < numPoints; i++) {
        if (i < 3 || i > numPoints - 6) {
            slopePoints.push(BASE_GROUND_Y);
        } else {
            let change = (Math.random() - 0.5) * 40;
            let currentY = lastY + change;
            if (currentY < 190) currentY = 190;
            if (currentY > 260) currentY = 260;
            slopePoints.push(currentY);
            lastY = currentY;
        }
    }
    player.y = getGroundY(player.x);

    bgBuildings = [];
    const colors = ["#FCA5A5", "#FEF08A", "#BBF7D0", "#BFDBFE", "#E9D5FF"];
    for (let i = 0; i < 70; i++) {
        bgBuildings.push({
            x: i * 220 + Math.random() * 60, width: 100 + Math.random() * 90, height: 120 + Math.random() * 140,
            color: colors[Math.floor(Math.random() * colors.length)]
        });
    }

    obstacles = [];
    const types = ['car', 'moving_car', 'box', 'cone', 'cat', 'puddle', 'pit', 'spring'];
    if (isLifeMode) types.push('bird');

    for (let i = 0; i < 45; i++) {
        let type = types[Math.floor(Math.random() * types.length)];
        let ox = 700 + i * 330 + Math.random() * 50;
        let obsWidth = 50; let obsHeight = 50;
        let groundY = getGroundY(ox);
        let obsY = groundY;

        if (type === 'car' || type === 'moving_car') { obsWidth = 70; obsHeight = 45; obsY = groundY - 45; }
        else if (type === 'box') { obsWidth = 50; obsHeight = 50; obsY = groundY - 50; }
        else if (type === 'cone') { obsWidth = 40; obsHeight = 45; obsY = groundY - 45; }
        else if (type === 'cat') { obsWidth = 40; obsHeight = 40; obsY = groundY - 40; }
        else if (type === 'puddle') { obsWidth = 70; obsHeight = 15; obsY = groundY - 7; }
        // 【修正②】落とし穴自体の配置高さを、地面のトップ位置(groundY)にきれいに合わせる
        else if (type === 'pit') { obsWidth = 120; obsHeight = 180; obsY = groundY; }
        else if (type === 'spring') { obsWidth = 50; obsHeight = 40; obsY = groundY - 40; }
        else if (type === 'bird') { obsWidth = 45; obsHeight = 35; obsY = groundY - 110 - Math.random() * 30; }

        obstacles.push({ x: ox, y: obsY, width: obsWidth, height: obsHeight, type: type, active: true, vx: 0, isRunning: false });
    }

    dashPanels = [];
    for (let i = 1; i < 20; i++) {
        let px = i * 750 + Math.random() * 100;
        let gy = getGroundY(px);
        dashPanels.push({ x: px, y: gy - 15, width: 60, height: 15 });
    }

    cookies = []; bones = []; shieldItems = [];
    let currentX = 400;
    while (currentX < goalX - 500) {
        currentX += 90 + Math.random() * 120;
        let groundY = getGroundY(currentX);
        let randItem = Math.random();
        
        if (isLifeMode && randItem < 0.05) {
            bones.push({ x: currentX, y: groundY - 50, width: 35, height: 35, collected: false });
            currentX += 100; continue;
        }
        if (selectedCharKey === 'rocky' && randItem >= 0.05 && randItem < 0.09) {
            shieldItems.push({ x: currentX, y: groundY - 50, width: 40, height: 40, collected: false });
            currentX += 100; continue;
        }
        
        for (let j = 0; j < 3; j++) {
            let cx = currentX + j * 40;
            let gy = getGroundY(cx);
            cookies.push({ x: cx, y: gy - 45, width: 30, height: 30, collected: false });
        }
        currentX += 120;
    }
}

function triggerDamage() {
    if (player.invincibleTimer > 0) return;
    if (hasRockyShield) {
        hasRockyShield = false; player.invincibleTimer = 60;
        playSe(audioAssets.seHeal);
        addTextPopup(player.x + 30, player.y - 10, "バリアをうしなった！", "#EF4444");
        return;
    }
    playSe(audioAssets.seDamage);
    addTextPopup(player.x + 30, player.y - 10, "イタッ！", "#EF4444");
    if (isLifeMode) {
        lives--;
        if (lives <= 0) { lives = 0; triggerGameOver(); return; }
    }
    if (score > 0) score--;
    player.invincibleTimer = 90; 
}

function triggerPitFall() {
    if (selectedCharKey === 'rubble' && rubbleRecoveryCount < 3) {
        rubbleRecoveryCount++; player.isFallingInPit = false;
        player.vy = -14; player.isJumping = true; jumpCounter = 0;
        playSe(audioAssets.seJump);
        addTextPopup(player.x + 30, player.y - 10, "ド根性ふっかつ！", "#EAB308");
        return;
    }
    playSe(audioAssets.sePit);
    addTextPopup(player.x + 30, player.y - 10, "あなにおちた！", "#EF4444");
    if (isLifeMode) {
        lives--;
        if (lives <= 0) { lives = 0; triggerGameOver(); return; }
    }
    if (score > 0) score--;
    player.invincibleTimer = 90;
}

function update() {
    if (currentState === STATES.PAUSE || currentState === STATES.GAMEOVER) return;
    gameFrame++;

    if (currentState === STATES.RESULT) {
        confettiParticles.forEach(p => {
            p.x += p.vx; p.y += p.vy; p.rotation += p.rotSpeed;
            if (p.y > 400) { p.y = -20; p.x = Math.random() * 800; }
        });
        return;
    }

    if (currentState !== STATES.PLAY) return;
    const charConfig = CHARACTER_CONFIG[selectedCharKey];
    if (player.invincibleTimer > 0) player.invincibleTimer--;

    textPopups.forEach(p => { p.y -= 0.8; p.timer--; p.alpha = p.timer / 45; });
    textPopups = textPopups.filter(p => p.timer > 0);

    if (player.isFallingInPit) {
        player.vy += 0.8; player.y += player.vy;
        if (player.y > 420) {
            player.isFallingInPit = false;
            player.x = player.pitResetX; player.y = getGroundY(player.x) - player.height;
            player.vy = 0; player.isJumping = false;
        }
        cameraX = player.x - 100; return;
    }

    player.speedModifier = 1.0; 
    if (dashPanelTimer > 0) { dashPanelTimer--; player.speedModifier = 1.8; }

    obstacles.forEach(obs => {
        if (!obs.active) return;
        if (obs.type === 'moving_car' && !obs.isRunning && obs.x - player.x < 550) { obs.isRunning = true; obs.vx = -4.0; }
        if (obs.type === 'bird' && !obs.isRunning && obs.x - player.x < 600) { obs.isRunning = true; obs.vx = -5.0; }
        if (obs.isRunning) { obs.x += obs.vx; }
    });

    let onPuddle = false;
    obstacles.forEach(obs => {
        if (obs.type === 'puddle' && obs.active) {
            if (player.x + player.width > obs.x && player.x < obs.x + obs.width &&
                player.y + player.height >= obs.y && player.y + player.height <= obs.y + obs.height + 10) {
                onPuddle = true;
            }
        }
    });

    if (onPuddle) {
        if (selectedCharKey === 'zuma') isZumaDashing = true;
        else if (dashPanelTimer === 0) player.speedModifier = 0.5;
    }
    if (selectedCharKey === 'zuma' && isZumaDashing && dashPanelTimer === 0) player.speedModifier = 1.5;

    if (selectedCharKey === 'skye' && isHovering) {
        player.vy = 0; hoverTimer--;
        if (hoverTimer <= 0 || !isInputPressing) isHovering = false;
    } else {
        if (player.isJumping && isInputPressing && jumpCounter < charConfig.maxJumpFrames) {
            player.vy -= 0.65 * (1 - (jumpCounter / charConfig.maxJumpFrames));
            jumpCounter++;
        }
    }

    let nextX = player.x + charConfig.baseSpeed * player.speedModifier;
    let targetGroundY = getGroundY(nextX);
    let currentPit = null;

    obstacles.forEach(obs => {
        if (obs.type === 'pit' && obs.active) {
            let playerCenterX = nextX + player.width / 2;
            if (playerCenterX > obs.x + 10 && playerCenterX < obs.x + obs.width - 10) currentPit = obs;
        }
    });

    player.x = nextX;
    if (!(selectedCharKey === 'skye' && isHovering)) player.vy += player.gravity;
    player.y += player.vy;

    if (currentPit) {
        // 【修正②】プレイヤーの足元が地面位置に達した時に穴へ落下スタートさせる
        if (player.y + player.height >= targetGroundY) {
            player.isFallingInPit = true; player.vy = 4;
            player.pitResetX = currentPit.x + currentPit.width + 30;
            triggerPitFall();
            if (currentState === STATES.GAMEOVER) return;
        }
    } else {
        let currentGroundY = getGroundY(player.x);
        if (player.y + player.height >= currentGroundY) {
            player.y = currentGroundY - player.height;
            player.vy = 0;
            if (player.isJumping) { player.isJumping = false; if (selectedCharKey === 'zuma') isZumaDashing = false; }
            isHovering = false;
        }
    }

    cameraX = player.x - 100;

    // アイテム等の衝突判定
    dashPanels.forEach(panel => {
        if (player.x + player.width > panel.x && player.x < panel.x + panel.width &&
            player.y + player.height >= panel.y - 5 && player.y + player.height <= panel.y + panel.height + 5) {
            if (dashPanelTimer === 0) { dashPanelTimer = 60; playSe(audioAssets.seHeal); }
        }
    });

    cookies.forEach(c => {
        if (!c.collected && player.x < c.x + c.width && player.x + player.width > c.x && player.y < c.y + c.height && player.y + player.height > c.y) {
            c.collected = true; score++; playSe(audioAssets.seCookie);
        }
    });
    bones.forEach(b => {
        if (!b.collected && player.x < b.x + b.width && player.x + player.width > b.x && player.y < b.y + b.height && player.y + player.height > b.y) {
            b.collected = true; playSe(audioAssets.seHeal); if (lives < 5) lives++;
        }
    });
    shieldItems.forEach(s => {
        if (!s.collected && player.x < s.x + s.width && player.x + player.width > s.x && player.y < s.y + s.height && player.y + player.height > s.y) {
            s.collected = true; playSe(audioAssets.seHeal); if (selectedCharKey === 'rocky') hasRockyShield = true; else score += 3;
        }
    });

    // 障害物衝突判定（③の修正：踏みつけ判定条件を大幅に緩和して確実に成功するように変更）
    obstacles.forEach(obs => {
        if (!obs.active || obs.type === 'pit' || currentState === STATES.GAMEOVER) return;
        
        let isColliding = player.x < obs.x + obs.width && player.x + player.width > obs.x &&
                          player.y < obs.y + obs.height && player.y + player.height > obs.y;
        if (!isColliding) return;

        if (obs.type === 'spring') {
            if (player.vy > -2 && player.y + player.height - player.vy <= obs.y + 20) {
                player.y = obs.y - player.height;
                player.vy = (selectedCharKey === 'marshall') ? -20.5 : -16.5;
                player.isJumping = true; jumpCounter = 0; isHovering = false; playSe(audioAssets.seJump);
            }
        } else if (obs.type === 'puddle') {
            // 水たまりは減速のみ
        } else {
            // 【修正③】マーシャルが上から踏みつけた判定の数値を緩和。落下中でなくても、足元が敵の上半分にあれば踏みつけ成功とする
            let isFallingOnTop = (player.y + player.height - player.vy <= obs.y + 25);
            
            if (selectedCharKey === 'marshall' && isFallingOnTop) {
                obs.active = false;
                player.vy = -14.5; player.isJumping = true; jumpCounter = 0;
                playSe(audioAssets.seJump);
                addTextPopup(obs.x, obs.y, "🔥ふんづけ大ジャンプ！", "#DC2626");
                fallingObstacles.push({
                    x: obs.x, y: obs.y, width: obs.width, height: obs.height, type: obs.type,
                    vx: 4, vy: -10, gravity: 0.6, rotation: 0, rotSpeed: 0.2
                });
            } else {
                triggerDamage();
            }
        }
    });

    if (player.x >= goalX) triggerGoalClear();
}

function triggerGoalClear() {
    currentState = STATES.RESULT; playBgm(audioAssets.bgmClear); createConfetti();
    ranking.push(score); ranking.sort((a, b) => b - a); ranking = ranking.slice(0, 5);
    localStorage.setItem("paw_game_ranking", JSON.stringify(ranking));
}
function triggerGameOver() { currentState = STATES.GAMEOVER; playBgm(audioAssets.bgmGameover); }

function draw() {
    ctx.clearRect(0, 0, 800, 400);
    ctx.fillStyle = "#87CEEB"; ctx.fillRect(0, 0, 800, 400);

    // 背景ビル群
    bgBuildings.forEach(b => {
        let bx = b.x - cameraX * 0.3;
        if (bx > 850 || bx + b.width < -50) return;
        ctx.fillStyle = b.color; ctx.fillRect(bx, 400 - b.height, b.width, b.height);
    });

    if (currentState === STATES.TITLE) { drawTitleScreen(); } 
    else if (currentState === STATES.CHAR_SELECT) { drawCharSelectScreen(); } 
    else if (currentState === STATES.MODE_SELECT) { drawModeSelectScreen(); } 
    else if (currentState === STATES.RANKING_VIEW) { drawRankingViewScreen(); } 
    else {
        drawGameElements(); drawHud();
        if (currentState === STATES.PAUSE) drawPauseOverlay();
        if (currentState === STATES.GAMEOVER) drawGameOverScreen();
        if (currentState === STATES.RESULT) drawResultScreen();
    }
}

function drawTitleScreen() {
    ctx.fillStyle = "#FFFFFF"; ctx.font = "bold 40px sans-serif"; ctx.textAlign = "center";
    ctx.fillText("パウ・パトロール風 ゲーム", 400, 130);
    
    ctx.fillStyle = "#F59E0B"; ctx.beginPath(); ctx.roundRect(250, 220, 300, 65, 20); ctx.fill();
    ctx.fillStyle = "#FFFFFF"; ctx.font = "bold 26px sans-serif"; ctx.fillText("スタート！", 400, 262);

    ctx.fillStyle = "#475569"; ctx.beginPath(); ctx.roundRect(rankingButton.x, rankingButton.y, rankingButton.width, rankingButton.height, 12); ctx.fill();
    ctx.fillStyle = "#FFFFFF"; ctx.font = "bold 16px sans-serif"; ctx.fillText("🏆 ランキング", rankingButton.x + rankingButton.width / 2, rankingButton.y + 28);
}

function drawCharSelectScreen() {
    ctx.fillStyle = "#1E293B"; ctx.fillRect(0, 0, 800, 400);
    ctx.fillStyle = "#FFFFFF"; ctx.font = "bold 22px sans-serif"; ctx.textAlign = "center";
    ctx.fillText("だれで あそぶ？ キャラクターを えらんでね！", 400, 45);

    Object.keys(charButtons).forEach(key => {
        let btn = charButtons[key]; let config = CHARACTER_CONFIG[key];
        ctx.fillStyle = config.color; ctx.beginPath(); ctx.roundRect(btn.x, btn.y, btn.width, btn.height, 15); ctx.fill();
        ctx.lineWidth = 4; ctx.strokeStyle = (selectedCharKey === key) ? "#FFFFFF" : "rgba(255,255,255,0.2)"; ctx.stroke();
        
        // 【修正①】キャラ選択の枠内にインラインSVGキャラの顔をプレビュー表示させる
        try { ctx.drawImage(imgAssets.chars[key].run1, btn.x + 10, btn.y + 25, 60, 60); } catch(e){}
        
        ctx.fillStyle = "#FFFFFF"; ctx.font = "bold 18px sans-serif"; ctx.textAlign = "left";
        ctx.fillText(config.name, btn.x + 80, btn.y + 45);
        ctx.font = "11px sans-serif"; ctx.fillText("スキルをみる 🔍", btn.x + 80, btn.y + 80);
    });

    if (showCharPopup) {
        ctx.fillStyle = "rgba(0, 0, 0, 0.6)"; ctx.fillRect(0, 0, 800, 400);
        let config = CHARACTER_CONFIG[popupCharKey];
        ctx.fillStyle = "#F8FAFC"; ctx.beginPath(); ctx.roundRect(popupRect.x, popupRect.y, popupRect.width, popupRect.height, 20); ctx.fill();
        ctx.fillStyle = "#1E293B"; ctx.font = "bold 26px sans-serif"; ctx.textAlign = "center"; ctx.fillText(config.name, 400, 105);
        ctx.fillStyle = config.color; ctx.font = "bold 18px sans-serif"; ctx.fillText(config.skillTitle, 400, 155);
        ctx.fillStyle = "#475569"; ctx.font = "15px sans-serif"; ctx.fillText(config.skillDesc, 400, 205);

        ctx.fillStyle = config.color; ctx.beginPath(); ctx.roundRect(popupSelectBtn.x, popupSelectBtn.y, popupSelectBtn.width, popupSelectBtn.height, 12); ctx.fill();
        ctx.fillStyle = "#FFFFFF"; ctx.font = "bold 18px sans-serif"; ctx.fillText("この子にする！", 400, popupSelectBtn.y + 32);
        ctx.fillStyle = "#EF4444"; ctx.font = "bold 22px sans-serif"; ctx.fillText("✖", popupCloseBtn.x + 15, popupCloseBtn.y + 22);
    }
}

function drawModeSelectScreen() {
    ctx.fillStyle = "#1E293B"; ctx.fillRect(0, 0, 800, 400);
    ctx.fillStyle = "#FFFFFF"; ctx.font = "bold 24px sans-serif"; ctx.textAlign = "center";
    ctx.fillText("ゲームの むずかしさを えらんでね！", 400, 70);
    try { ctx.drawImage(btnImgNoLife, modeButtons.noLife.x, modeButtons.noLife.y); } catch(e){}
    try { ctx.drawImage(btnImgWithLife, modeButtons.withLife.x, modeButtons.withLife.y); } catch(e){}
}

function drawRankingViewScreen() {
    ctx.fillStyle = "#0F172A"; ctx.fillRect(0, 0, 800, 400);
    ctx.fillStyle = "#FFFFFF"; ctx.font = "bold 26px sans-serif"; ctx.textAlign = "center"; ctx.fillText("🏆 ハイスコアランキング 🏆", 400, 60);
    for (let i = 0; i < 5; i++) {
        let rScore = ranking[i] !== undefined ? ranking[i] : 0;
        ctx.font = "18px sans-serif"; ctx.textAlign = "left"; ctx.fillStyle = "#94A3B8";
        ctx.fillText(`第 ${i+1} 位 : `, 320, 120 + i * 35); ctx.textAlign = "right"; ctx.fillText(`${rScore} まい`, 480, 120 + i * 35);
    }
    ctx.fillStyle = "#EF4444"; ctx.beginPath(); ctx.roundRect(rankingBackButton.x, rankingBackButton.y, rankingBackButton.width, rankingBackButton.height, 12); ctx.fill();
    ctx.fillStyle = "#FFFFFF"; ctx.font = "bold 18px sans-serif"; ctx.textAlign = "center"; ctx.fillText("もどる", 400, rankingBackButton.y + 32);
}

function drawGameElements() {
    // 地面のベース描画
    ctx.fillStyle = "#10B981"; ctx.beginPath();
    let startY = getGroundY(cameraX); ctx.moveTo(0, startY);
    for (let px = 0; px <= 800; px += 10) { ctx.lineTo(px, getGroundY(cameraX + px)); }
    ctx.lineTo(800, 400); ctx.lineTo(0, 400); ctx.fill();

    // 障害物、落とし穴の描画
    obstacles.forEach(obs => {
        if (!obs.active) return;
        let screenX = obs.x - cameraX;
        if (screenX > 850 || screenX + obs.width < -50) return;

        // 【修正②】落とし穴の描画：地面の下を綺麗に真っ黒に塗りつぶし、突き出さないようにする
        if (obs.type === 'pit') {
            ctx.fillStyle = "#1E293B"; 
            ctx.fillRect(screenX, obs.y, obs.width, obs.height); // 地面から下方向へ箱を描画
            
            // 穴の左右のフチ（壁面）
            ctx.strokeStyle = "#047857"; ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(screenX, obs.y); ctx.lineTo(screenX, obs.y + 50);
            ctx.moveTo(screenX + obs.width, obs.y); ctx.lineTo(screenX + obs.width, obs.y + 50);
            ctx.stroke();
            return;
        }

        try { ctx.drawImage(imgAssets.obstacles[obs.type], screenX, obs.y, obs.width, obs.height); } catch(e) {}
    });

    // 跳ね飛ばされたエフェクト
    fallingObstacles.forEach(fo => {
        let screenX = fo.x - cameraX;
        ctx.save(); ctx.translate(screenX + fo.width/2, fo.y + fo.height/2); ctx.rotate(fo.rotation);
        try { ctx.drawImage(imgAssets.obstacles[fo.type], -fo.width/2, -fo.height/2, fo.width, fo.height); } catch(e) {}
        ctx.restore();
    });

    // 各種アイテム描画
    dashPanels.forEach(p => { try { ctx.drawImage(imgAssets.items.dashPanel, p.x - cameraX, p.y, p.width, p.height); } catch(e) {} });
    cookies.forEach(c => { if (!c.collected) try { ctx.drawImage(imgAssets.items.cookie, c.x - cameraX, c.y, c.width, c.height); } catch(e) {} });
    bones.forEach(b => { if (!b.collected) try { ctx.drawImage(imgAssets.items.bone, b.x - cameraX, b.y, b.width, b.height); } catch(e) {} });
    shieldItems.forEach(s => { if (!s.collected) try { ctx.drawImage(imgAssets.items.rockyShield, s.x - cameraX, s.y, s.width, s.height); } catch(e) {} });

    // パウステーション（ゴール）
    let goalScreenX = goalX - cameraX;
    if (goalScreenX < 900) { try { ctx.drawImage(imgAssets.items.pawStation, goalScreenX, getGroundY(goalX) - 150, 160, 160); } catch(e) {} }

    // プレイヤーの描画（①の修正：完全にインラインSVG画像を参照して点滅・アニメーション）
    if (player.invincibleTimer === 0 || Math.floor(gameFrame / 4) % 2 === 0) {
        ctx.save(); let pScreenX = player.x - cameraX;
        if (hasRockyShield) {
            ctx.strokeStyle = "#10B981"; ctx.lineWidth = 3; ctx.beginPath();
            ctx.arc(pScreenX + player.width/2, player.y + player.height/2, 38, 0, Math.PI*2); ctx.stroke();
        }
        let pImg = imgAssets.chars[selectedCharKey].run1;
        if (player.isJumping || isHovering) pImg = imgAssets.chars[selectedCharKey].jump;
        else pImg = (Math.floor(gameFrame / 6) % 2 === 0) ? imgAssets.chars[selectedCharKey].run1 : imgAssets.chars[selectedCharKey].run2;

        try { ctx.drawImage(pImg, pScreenX, player.y, player.width, player.height); } catch(e) {}
        ctx.restore();
    }

    // 文字ポップアップ
    textPopups.forEach(p => {
        ctx.save(); ctx.globalAlpha = p.alpha; ctx.fillStyle = p.color; ctx.font = "bold 15px sans-serif";
        ctx.textAlign = "center"; ctx.fillText(p.text, p.x - cameraX, p.y); ctx.restore();
    });
}

function drawHud() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.4)"; ctx.fillRect(0, 0, 800, 45);
    ctx.fillStyle = "#FEF08A"; ctx.font = "bold 18px sans-serif"; ctx.textAlign = "left"; ctx.fillText(`🍪 おやつ: ${score} まい`, 20, 28);

    if (isLifeMode) {
        let heartStr = ""; for(let i=0; i<5; i++) heartStr += (i < lives) ? "❤️" : "🖤";
        ctx.fillStyle = "#FFFFFF"; ctx.fillText(`らいふ: ${heartStr}`, 220, 28);
    } else {
        ctx.fillStyle = "#10B981"; ctx.fillText("らいふ: むげん 💚", 220, 28);
    }

    let progress = Math.min(100, Math.floor((player.x / goalX) * 100));
    ctx.fillStyle = "#FFFFFF"; ctx.font = "bold 14px sans-serif"; ctx.fillText(`ごーるまで: ${progress}%`, 530, 28);

    ctx.fillStyle = "rgba(255, 255, 255, 0.2)"; ctx.beginPath(); ctx.roundRect(pauseButton.x, pauseButton.y, pauseButton.width, pauseButton.height, 8); ctx.fill();
    ctx.fillStyle = "#FFFFFF"; ctx.textAlign = "center"; ctx.fillText("||", pauseButton.x + 25, pauseButton.y + 30);
}

function drawPauseOverlay() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.5)"; ctx.fillRect(0, 0, 800, 400);
    ctx.fillStyle = "#FFFFFF"; ctx.font = "bold 32px sans-serif"; ctx.textAlign = "center"; ctx.fillText("ポーズ (ひとやすみ)", 400, 180);
}
function drawGameOverScreen() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.75)"; ctx.fillRect(0, 0, 800, 400);
    ctx.fillStyle = "#EF4444"; ctx.font = "bold 42px sans-serif"; ctx.textAlign = "center"; ctx.fillText("ゲームオーバー", 400, 170);
}
function drawResultScreen() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.5)"; ctx.fillRect(0, 0, 800, 400);
    confettiParticles.forEach(p => {
        ctx.save(); ctx.fillStyle = p.color; ctx.translate(p.x, p.y); ctx.rotate(p.rotation);
        ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size); ctx.restore();
    });
    ctx.fillStyle = "#F5A623"; ctx.font = "bold 44px sans-serif"; ctx.textAlign = "center"; ctx.fillText("🎉 ゴール！おめでとう！ 🎉", 400, 140);
    ctx.fillStyle = "#FFFFFF"; ctx.font = "bold 24px sans-serif"; ctx.fillText(`おやつ: ${score} まいゲット！`, 400, 210);
}

// --- 操作イベントの処理 ---
function handleInputStart(clientX, clientY) {
    if (!isAudioInitialized) { isAudioInitialized = true; playBgm(audioAssets.bgmTitle); }
    const rect = canvas.getBoundingClientRect();
    const scaleX = 800 / rect.width; const scaleY = 400 / rect.height;
    const clickX = (clientX - rect.left) * scaleX; const clickY = (clientY - rect.top) * scaleY;

    if (currentState === STATES.TITLE) {
        if (clickX >= rankingButton.x && clickX <= rankingButton.x + rankingButton.width && clickY >= rankingButton.y && clickY <= rankingButton.y + rankingButton.height) { currentState = STATES.RANKING_VIEW; return; }
        if (clickX >= 250 && clickX <= 550 && clickY >= 220 && clickY <= 285) { currentState = STATES.CHAR_SELECT; }
    } 
    else if (currentState === STATES.RANKING_VIEW) {
        if (clickX >= rankingBackButton.x && clickX <= rankingBackButton.x + rankingBackButton.width && clickY >= rankingBackButton.y && clickY <= rankingBackButton.y + rankingBackButton.height) { currentState = STATES.TITLE; }
    } 
    else if (currentState === STATES.CHAR_SELECT) {
        if (showCharPopup) {
            if (clickX >= popupCloseBtn.x && clickX <= popupCloseBtn.x + popupCloseBtn.width && clickY >= popupCloseBtn.y && clickY <= popupCloseBtn.y + popupCloseBtn.height) { showCharPopup = false; return; }
            if (clickX >= popupSelectBtn.x && clickX <= popupSelectBtn.x + popupSelectBtn.width && clickY >= popupSelectBtn.y && clickY <= popupSelectBtn.y + popupSelectBtn.height) {
                selectedCharKey = popupCharKey; showCharPopup = false; currentState = STATES.MODE_SELECT; return;
            }
            return;
        }
        Object.keys(charButtons).forEach(key => {
            let btn = charButtons[key];
            if (clickX >= btn.x && clickX <= btn.x + btn.width && clickY >= btn.y && clickY <= btn.y + btn.height) { popupCharKey = key; showCharPopup = true; }
        });
    } 
    else if (currentState === STATES.MODE_SELECT) {
        if (clickX >= modeButtons.noLife.x && clickX <= modeButtons.noLife.x + modeButtons.noLife.width && clickY >= modeButtons.noLife.y && clickY <= modeButtons.noLife.y + modeButtons.noLife.height) { isLifeMode = false; initGame(); currentState = STATES.PLAY; playBgm(audioAssets.bgmPlay); }
        else if (clickX >= modeButtons.withLife.x && clickX <= modeButtons.withLife.x + modeButtons.withLife.width && clickY >= modeButtons.withLife.y && clickY <= modeButtons.withLife.y + modeButtons.withLife.height) { isLifeMode = true; initGame(); currentState = STATES.PLAY; playBgm(audioAssets.bgmPlay); }
    } 
    else if (currentState === STATES.PLAY) {
        if (clickX >= pauseButton.x && clickX <= pauseButton.x + pauseButton.width && clickY >= pauseButton.y && clickY <= pauseButton.y + pauseButton.height) { currentState = STATES.PAUSE; return; }
        triggerJumpStart();
    } 
    else if (currentState === STATES.PAUSE) { currentState = STATES.PLAY; } 
    else if (currentState === STATES.RESULT || currentState === STATES.GAMEOVER) { currentState = STATES.TITLE; playBgm(audioAssets.bgmTitle); }
}

function triggerJumpStart() {
    isInputPressing = true; if (player.isFallingInPit) return;
    if (!player.isJumping) {
        player.vy = -CHARACTER_CONFIG[selectedCharKey].jumpPower; player.isJumping = true; jumpCounter = 0; isHovering = false; playSe(audioAssets.seJump);
    } else if (selectedCharKey === 'skye' && !isHovering) {
        isHovering = true; hoverTimer = 55; player.vy = 0; playSe(audioAssets.seJump);
    }
}
function triggerJumpEnd() { isInputPressing = false; if (selectedCharKey === 'skye') isHovering = false; }

window.addEventListener("mousedown", (e) => { handleInputStart(e.clientX, e.clientY); });
window.addEventListener("mouseup", () => { triggerJumpEnd(); });
window.addEventListener("touchstart", (e) => {
    if (currentState !== STATES.CHAR_SELECT && currentState !== STATES.MODE_SELECT) e.preventDefault(); 
    if (e.touches.length > 0) handleInputStart(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: false });
window.addEventListener("touchend", () => { triggerJumpEnd(); });

let lastTime = performance.now();
let accumulatedTime = 0;
const deltaTimeTarget = 1000 / 60; 

function gameLoop(timestamp) {
    let elapsed = timestamp - lastTime; lastTime = timestamp;
    if (elapsed > 100) elapsed = 100; accumulatedTime += elapsed;
    while (accumulatedTime >= deltaTimeTarget) { update(); accumulatedTime -= deltaTimeTarget; }
    draw(); requestAnimationFrame(gameLoop);
}
requestAnimationFrame(gameLoop);
</script>
