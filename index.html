<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>パウ・パトロール風 横スクロールゲーム</title>
    <style>
        /* 画面全体のスタイルをスマホ最適化 */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none; /* ダブルタップズームなどを完全に禁止 */
        }
        
        /* キャンバスを外枠のコンテナで包み、常にアスペクト比2:1を維持して最大化 */
        #gameContainer {\n            width: 100vw;
            height: 50vw; /* 2:1 の比率 */
            max-width: 800px;
            max-height: 400px;
            position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            background-color: #87CEEB;
        }

        /* 横向きの時は画面いっぱいに広げる */
        @media (orientation: landscape) {
            #gameContainer {
                width: 200vh;
                height: 100vh;
                max-width: 800px;
                max-height: 400px;
            }
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
            background-color: transparent;
        }
    </style>
</head>
<body>

<div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
</div>

<script>
// --- ゲームの基本設定・解像度（Retina）対策 ---
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const container = document.getElementById("gameContainer");

const BASE_WIDTH = 800;
const BASE_HEIGHT = 400;

function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;
    canvas.width = BASE_WIDTH * dpr;
    canvas.height = BASE_HEIGHT * dpr;
    ctx.scale(dpr, dpr);
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

// --- ゲーム状態定義 ---
const STATES = {
    TITLE: "title",
    CHAR_SELECT: "char_select",
    MODE_SELECT: "mode_select",
    PLAY: "play",
    RESULT: "result",
    GAMEOVER: "gameover"
};
let currentState = STATES.TITLE;

// --- モード設定 ---
let isSafeMode = false; // あんしんモード（ライフ減少なし）

// --- オーディオシステム (Web Audio API によるシンセサイザー) ---
let audioCtx = null;
let isAudioInitialized = false;

function initAudio() {
    if (isAudioInitialized) return;
    try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        isAudioInitialized = true;
        // iOS/Safari対策: 1度ダミーの音を鳴らしてアンロック
        let buffer = audioCtx.createBuffer(1, 1, 22050);
        let node = audioCtx.createBufferSource();
        node.buffer = buffer;
        node.connect(audioCtx.destination);
        node.start(0);
    } catch(e) {
        console.log("AudioContextを初期化できませんでした", e);
    }
}

// 共通効果音・BGM生成ロジック
function playTone(freq, type, duration, startTimeOffset = 0, volume = 0.1) {
    if (!audioCtx) return;
    if (audioCtx.state === 'suspended') audioCtx.resume();
    
    let osc = audioCtx.createOscillator();
    let gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime + startTimeOffset);
    gain.gain.setValueAtTime(volume, audioCtx.currentTime + startTimeOffset);
    gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + startTimeOffset + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(audioCtx.currentTime + startTimeOffset);
    osc.stop(audioCtx.currentTime + startTimeOffset + duration);
}

// BGMループ管理
let bgmIntervalId = null;
function playBgm(notes) {
    stopBgm();
    let beatDuration = 0.2;
    let index = 0;
    
    function playLoop() {
        if (currentState !== STATES.TITLE && currentState !== STATES.PLAY) return;
        let note = notes[index % notes.length];
        if (note > 0) {
            playTone(note, "triangle", beatDuration * 0.9, 0, 0.05);
        }
        index++;
        bgmIntervalId = setTimeout(playLoop, beatDuration * 1000);
    }
    playLoop();
}

function stopBgm() {
    if (bgmIntervalId) {
        clearTimeout(bgmIntervalId);
        bgmIntervalId = null;
    }
}

// 楽曲データ
const audioAssets = {
    bgmTitle: [261.63, 329.63, 392.00, 523.25, 392.00, 329.63],
    bgmPlay: [392.00, 440.00, 493.88, 523.25, 587.33, 659.25, 698.46, 783.99],
    seJump: () => playTone(600, "sine", 0.15),
    seGet: () => playTone(880, "sine", 0.1),
    seDamage: () => playTone(150, "sawtooth", 0.3),
    seSkill: () => {
        playTone(523.25, "square", 0.1, 0);
        playTone(659.25, "square", 0.1, 0.05);
        playTone(783.99, "square", 0.2, 0.1);
    },
    seVehicle: () => { // お助けビークル起動音
        playTone(587.33, "square", 0.08, 0, 0.15);
        playTone(587.33, "square", 0.08, 0.08, 0.15);
        playTone(783.99, "sine", 0.1, 0.16, 0.15);
        playTone(987.77, "sine", 0.3, 0.26, 0.15);
    }
};

// --- キャラクターパラメーター & グラフィック定義 (SVGデータURI) ---
const CHARACTERS = {

        speed: 5.0, jumpForce: 10, maxLives: 3,
        svg: `<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><circle cx="32" cy="32" r="28" fill="#10B981"/><rect x="20" y="16" width="24" height="20" rx="5" fill="#9CA3AF"/><circle cx="26" cy="22" r="3" fill="#000"/><circle cx="38" cy="22" r="3" fill="#000"/><path d="M 26 28 Q 32 34 38 28" stroke="#000" stroke-width="2" fill="none"/><polygon points="20,16 12,5 26,10" fill="#9CA3AF"/><polygon points="44,16 52,5 38,10" fill="#10B981"/><circle cx="32" cy="45" r="6" fill="#FFFFFF"/><path d="M 32 41 L 35 46 L 29 46 Z" fill="#10B981"/></svg>`
    },
    zuma: {
        name: "ズーマ", color: "#F97316", skillName: "すいすいダッシュ",

        speed: 5.5, jumpForce: 10, maxLives: 3,
        svg: `<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg"><circle cx="32" cy="32" r="28" fill="#F97316"/><rect x="20" y="16" width="24" height="20" rx="5" fill="#1F2937"/><circle cx="26" cy="22" r="3" fill="#FFFFFF"/><circle cx="38" cy="22" r="3" fill="#FFFFFF"/><circle cx="26" cy="22" r="1.5" fill="#000"/><circle cx="38" cy="22" r="1.5" fill="#000"/><path d="M 26 28 Q 32 34 38 28" stroke="#FFF" stroke-width="2" fill="none"/><rect x="14" y="24" width="6" height="14" rx="3" fill="#F97316"/><rect x="44" y="24" width="6" height="14" rx="3" fill="#F97316"/></svg>`
    }
};

// お助けビークル（共通変身形態）のSVG
const VEHICLE_SVG = `<svg viewBox="0 0 80 64" xmlns="http://www.w3.org/2000/svg"><rect x="10" y="25" width="60" height="20" rx="8" fill="#EF4444"/><rect x="20" y="12" width="35" height="15" rx="5" fill="#3B82F6" opacity="0.7"/><circle cx="25" cy="48" r="10" fill="#333" stroke="#FFF" stroke-width="3"/><circle cx="55" cy="48" r="10" fill="#333" stroke="#FFF" stroke-width="3"/><polygon points="65,25 75,32 65,38" fill="#F59E0B"/><circle cx="32" cy="22" r="8" fill="#F59E0B"/><path d="M 28 20 Q 32 24 36 20" stroke="#000" stroke-width="1.5" fill="none"/><rect x="2" y="28" width="10" height="5" fill="#9CA3AF"/></svg>`;

// ケント（パウバトロールバッジ風）のSVG
const RYDER_BADGE_SVG = `<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg"><path d="M 24 4 L 42 12 L 36 34 L 24 44 L 12 34 L 6 12 Z" fill="#EF4444" stroke="#FFF" stroke-width="3"/><path d="M 24 8 L 38 15 L 33 32 L 24 40 L 15 32 L 10 15 Z" fill="#3B82F6"/><polygon points="24,12 28,22 38,22 30,29 33,39 24,32 15,39 18,29 10,22 20,22" fill="#F59E0B"/></svg>`;

// 各イメージオブジェクトの事前生成とデータURL同期
const charImages = {};
Object.keys(CHARACTERS).forEach(key => {
    charImages[key] = new Image();
    charImages[key].src = "data:image/svg+xml;utf8," + encodeURIComponent(CHARACTERS[key].svg);
});
const vehicleImage = new Image();
vehicleImage.src = "data:image/svg+xml;utf8," + encodeURIComponent(VEHICLE_SVG);

const ryderBadgeImage = new Image();
ryderBadgeImage.src = "data:image/svg+xml;utf8," + encodeURIComponent(RYDER_BADGE_SVG);

// クッキーアイコン (骨型おやつ風)
const cookieImage = new Image();
cookieImage.src = "data:image/svg+xml;utf8," + encodeURIComponent(`<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg"><path d="M 6 10 C 3 10, 3 16, 8 16 C 3 16, 3 22, 6 22 L 26 22 C 29 22, 29 16, 24 16 C 29 16, 29 10, 26 10 Z" fill="#F59E0B" stroke="#D97706" stroke-width="2"/></svg>`);

// 障害物アイコン (コーン)
const obstacleImage = new Image();
obstacleImage.src = "data:image/svg+xml;utf8," + encodeURIComponent(`<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg"><polygon points="16,2 28,28 4,28" fill="#F97316"/><rect x="6" y="12" width="20" height="4" fill="#FFFFFF"/><rect x="2" y="26" width="28" height="4" fill="#F97316" rx="1"/></svg>`);

// --- ゲーム内各種変数 ---
let selectedCharKey = "chase";
let player = {
    x: 100, y: 250, width: 50, height: 50,
    vy: 0, gravity: 0.5, isGrounded: false,
    jumpCount: 0, maxJumps: 1,
    lives: 3, maxLives: 3,
    invincibleTimer: 0,
    hasRubbleShield: false,
    hasMarshallResurrection: false,
    // お助けビークル関連パラメータ
    isVehicleActive: false,
    vehicleTimer: 0
};

let cameraX = 0;
let score = 0;
let cookies = [];
let obstacles = [];
let holes = [];
let bridges = []; // ロッキーのスキル用橋オブジェクト
let ryderBadges = []; // ケントのお助けバッジ配置用配列
let confettiParticles = []; // ゴール時の紙吹雪演出用

const GOAL_DISTANCE = 2500; // ゴールまでの距離
let isGoalReached = false;

// UI用ボタン領域定義（スマホのタッチ判定用）
let buttons = {
    start: { x: 300, y: 280, w: 200, h: 50 },
    safeMode: { x: 250, y: 230, w: 300, h: 40 },
    restart: { x: 300, y: 300, w: 200, h: 40 },
    charCards: []
};

// キャラクター選択カードのレイアウト計算
function setupCharCards() {
    buttons.charCards = [];
    const keys = Object.keys(CHARACTERS);
    const cardW = 110;
    const cardH = 140;
    const startX = (BASE_WIDTH - (cardW * 6 + 10 * 5)) / 2;
    const startY = 130;
    
    keys.forEach((key, idx) => {
        buttons.charCards.push({
            key: key,
            x: startX + idx * (cardW + 10),
            y: startY,
            w: cardW,
            h: cardH
        });
    });
}
setupCharCards();

// --- ステージ生成 ---
function initStage() {
    cameraX = 0;
    score = 0;
    isGoalReached = false;
    cookies = [];
    obstacles = [];
    holes = [];
    bridges = [];
    ryderBadges = [];
    confettiParticles = [];
    
    // プレイヤー初期化
    const charData = CHARACTERS[selectedCharKey];
    player.x = 100;
    player.y = 250;
    player.vy = 0;
    player.isGrounded = true;
    player.jumpCount = 0;
    player.maxJumps = (selectedCharKey === "skye") ? 2 : 1; // スカイは2段ホバー
    player.lives = isSafeMode ? 999 : charData.maxLives;
    player.maxLives = charData.maxLives;
    player.invincibleTimer = 0;
    player.hasRubbleShield = (selectedCharKey === "rubble"); // ラブルは初期バリア保持
    player.hasMarshallResurrection = (selectedCharKey === "marshall"); // マーシャルは復活保持
    player.isVehicleActive = false;
    player.vehicleTimer = 0;

    // クッキー・障害物・落とし穴・ケントバッジの自動ランダム・規則配置
    let nextX = 400;
    while (nextX < GOAL_DISTANCE - 200) {
        let r = Math.random();
        if (r < 0.25) {
            // 落とし穴配置
            holes.push({ x: nextX, width: 70 });
            // 落とし穴の上にクッキーを並べる
            cookies.push({ x: nextX, y: 160, width: 25, height: 25, collected: false });
            cookies.push({ x: nextX + 25, y: 140, width: 25, height: 25, collected: false });
            cookies.push({ x: nextX + 50, y: 160, width: 25, height: 25, collected: false });
            nextX += 180;
        } else if (r < 0.6) {
            // 障害物コーン配置
            obstacles.push({ x: nextX, y: 270, width: 30, height: 30 });
            // 障害物の手前か上にクッキー
            cookies.push({ x: nextX - 30, y: 220, width: 25, height: 25, collected: false });
            cookies.push({ x: nextX, y: 180, width: 25, height: 25, collected: false });
            nextX += 150;
        } else {
            // クッキーの直線・ウェーブ配置
            let count = Math.floor(Math.random() * 3) + 2;
            let startY = Math.random() * 80 + 180;
            for(let i=0; i<count; i++) {
                cookies.push({ x: nextX + i*35, y: startY, width: 25, height: 25, collected: false });
            }
            nextX += 200;
        }
    }

    // ★ケントのお助けバッジを中間地点付近（1200px地点）に確実に配置
    ryderBadges.push({
        x: 1200,
        y: 260,
        width: 40,
        height: 40,
        active: true
    });
}

// --- 入力制御 & ジャンプトリガー ---
function triggerJumpStart() {
    const charData = CHARACTERS[selectedCharKey];
    
    // スカイのホバー能力（2回目のジャンプ時に重力を一時的に超軽減する）
    if (selectedCharKey === "skye" && player.jumpCount === 1) {
        player.vy = -4.5; 
        player.jumpCount++;
        audioAssets.seJump();
        audioAssets.seSkill(); // 特殊スキル音
        return;
    }
    
    // 通常ジャンプ及び1段目
    if (player.isGrounded || player.jumpCount < player.maxJumps) {
        player.vy = -charData.jumpForce;
        player.isGrounded = false;
        player.jumpCount++;
        audioAssets.seJump();
    }
}

function triggerJumpEnd() {
    // ボタン長押しによる大ジャンプ制御（ボタンを離したら上昇を減速）
    if (player.vy < -3) {
        player.vy = -3;
    }
}

function handleInputStart(clientX, clientY) {
    initAudio();
    const rect = canvas.getBoundingClientRect();
    // キャンバス上のスケーリングされた座標を逆算
    const mouseX = (clientX - rect.left) * (BASE_WIDTH / rect.width);
    const mouseY = (clientY - rect.top) * (BASE_HEIGHT / rect.height);

    if (currentState === STATES.TITLE) {
        if (mouseX >= buttons.start.x && mouseX <= buttons.start.x + buttons.start.w &&
            mouseY >= buttons.start.y && mouseY <= buttons.start.y + buttons.start.h) {
            currentState = STATES.CHAR_SELECT;
        }
    } 
    else if (currentState === STATES.CHAR_SELECT) {
        for (let card of buttons.charCards) {
            if (mouseX >= card.x && mouseX <= card.x + card.w &&
                mouseY >= card.y && mouseY <= card.y + card.h) {
                selectedCharKey = card.key;
                currentState = STATES.MODE_SELECT;
                break;
            }
        }
    } 
    else if (currentState === STATES.MODE_SELECT) {
        // 通常モード
        if (mouseX >= 250 && mouseX <= 550 && mouseY >= 140 && mouseY <= 190) {
            isSafeMode = false;
            initStage();
            currentState = STATES.PLAY;
            playBgm(audioAssets.bgmPlay);
        }
        // あんしんモード
        if (mouseX >= buttons.safeMode.x && mouseX <= buttons.safeMode.x + buttons.safeMode.w &&
            mouseY >= buttons.safeMode.y && mouseY <= buttons.safeMode.y + buttons.safeMode.h) {
            isSafeMode = true;
            initStage();
            currentState = STATES.PLAY;
            playBgm(audioAssets.bgmPlay);
        }
    } 
    else if (currentState === STATES.PLAY) {
        triggerJumpStart();
    } 
    else if (currentState === STATES.RESULT || currentState === STATES.GAMEOVER) {
        if (mouseX >= buttons.restart.x && mouseX <= buttons.restart.x + buttons.restart.w &&
            mouseY >= buttons.restart.y && mouseY <= buttons.restart.y + buttons.restart.h) {
            currentState = STATES.TITLE;
            playBgm(audioAssets.bgmTitle);
        }
    }
}

// --- ゲーム状態更新ロジック ---
function updateGame() {
    if (currentState !== STATES.PLAY) return;

    const charData = CHARACTERS[selectedCharKey];

    // お助けビークルのタイマー処理
    if (player.isVehicleActive) {
        player.vehicleTimer -= deltaTimeTarget;
        if (player.vehicleTimer <= 0) {
            player.isVehicleActive = false;
        }
    }

    // プレイヤーの移動速度（ビークル搭乗中は超高速ダッシュ化、ズーマは常に安定、チェイスは高速）
    let currentSpeed = charData.speed;
    if (player.isVehicleActive) {
        currentSpeed = 9.5; 
    }

    cameraX += currentSpeed;
    player.x = cameraX + 100; // 画面内での相対位置固定

    // 重力と物理演算
    player.vy += player.gravity;
    player.y += player.vy;

    // 通常の地面の高さ
    const GROUND_Y = 250;

    // 落とし穴の判定およびロッキーの架橋スキル
    let onHole = false;
    let currentHole = null;
    for (let hole of holes) {
        if (player.x + player.width > hole.x && player.x < hole.x + hole.width) {
            onHole = true;
            currentHole = hole;
            break;
        }
    }

    // ロッキー固有スキル：落とし穴の手前に来たら自動で橋を架ける
    if (selectedCharKey === "rocky" && onHole && currentHole) {
        let bridgeExists = bridges.some(b => b.x === currentHole.x);
        if (!bridgeExists) {
            bridges.push({ x: currentHole.x, width: currentHole.width });
            audioAssets.seSkill();
        }
    }

    // 橋があるかどうかのチェック
    let onBridge = bridges.some(b => player.x + player.width > b.x && player.x < b.x + b.width);

    // 接地・落下判定
    if (onHole && !onBridge) {
        if (player.y >= BASE_HEIGHT) {
            // 穴に落ちた
            handlePlayerDamage(true);
        }
    } else {
        if (player.y >= GROUND_Y) {
            player.y = GROUND_Y;
            player.vy = 0;
            player.isGrounded = true;
            player.jumpCount = 0;
        }
    }

    // 無敵タイマー減算
    if (player.invincibleTimer > 0) {
        player.invincibleTimer -= deltaTimeTarget;
    }

    // ★クッキーの更新と「自動引き寄せ（マグネット）」の処理
    cookies.forEach(cookie => {
        if (!cookie.collected) {
            // お助けビークル搭乗中は、広範囲からクッキーを強力に自動吸引
            if (player.isVehicleActive) {
                let pCenterX = player.x + player.width / 2;
                let pCenterY = player.y + player.height / 2;
                let cCenterX = cookie.x + cookie.width / 2;
                let cCenterY = cookie.y + cookie.height / 2;

                let dx = pCenterX - cCenterX;
                let dy = pCenterY - cCenterY;
                let distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < 250) { // 吸引射程
                    cookie.x += (dx / distance) * 12; // 吸い込みスピード
                    cookie.y += (dy / distance) * 12;
                }
            }

            // 通常の衝突判定
            if (player.x < cookie.x + cookie.width &&
                player.x + player.width > cookie.x &&
                player.y < cookie.y + cookie.height &&
                player.y + player.height > cookie.y) {
                cookie.collected = true;
                score += 10;
                audioAssets.seGet();
            }
        }
    });

    // 障害物の判定
    obstacles.forEach(obs => {
        if (player.x < obs.x + obs.width &&
            player.x + player.width > obs.x &&
            player.y < obs.y + obs.height &&
            player.y + player.height > obs.y) {
            
            // ビークル状態なら障害物をすり抜け・または粉砕扱い
            if (player.isVehicleActive) {
                return; 
            }

            // ラブル固有スキル：1回だけバリアで守る
            if (player.hasRubbleShield) {
                player.hasRubbleShield = false;
                player.invincibleTimer = 1000; // 1秒無敵
                obs.x = -999; // 障害物を消去
                audioAssets.seSkill();
                return;
            }

            handlePlayerDamage(false);
        }
    });

    // ★ケントのお助けバッジの衝突判定
    ryderBadges.forEach(badge => {
        if (badge.active &&
            player.x < badge.x + badge.width &&
            player.x + player.width > badge.x &&
            player.y < badge.y + badge.height &&
            player.y + player.height > badge.y) {
            
            badge.active = false;
            player.isVehicleActive = true;
            player.vehicleTimer = 7000; // 7秒間ビークルモード
            audioAssets.seVehicle(); // 専用ファンファール
        }
    });

    // ゴール判定
    if (cameraX >= GOAL_DISTANCE && !isGoalReached) {
        isGoalReached = true;
        stopBgm();
        // 紙吹雪を散らす
        for (let i = 0; i < 80; i++) {
            confettiParticles.push({
                x: BASE_WIDTH / 2,
                y: BASE_HEIGHT / 2 - 50,
                vx: (Math.random() - 0.5) * 8,
                vy: (Math.random() - 0.7) * 10,
                color: `hsl(${Math.random() * 360}, 100%, 60%)`,
                size: Math.random() * 6 + 4
            });
        }
        setTimeout(() => {
            currentState = STATES.RESULT;
        }, 2500);
    }

    // 紙吹雪の物理移動
    if (isGoalReached) {
        confettiParticles.forEach(p => {
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.2; // 重力
        });
    }
}

// --- ダメージ・ダウン処理 ---
function handlePlayerDamage(isPitfall) {
    if (player.invincibleTimer > 0 || isSafeMode) return;

    audioAssets.seDamage();

    // マーシャル固有スキル：たおれても1回だけその場で大復活
    if (player.hasMarshallResurrection) {
        player.hasMarshallResurrection = false;
        player.invincibleTimer = 2000; // 2秒無敵
        if (isPitfall) {
            player.y = 150; // 穴から引き上げる
            player.vy = 0;
        }
        audioAssets.seSkill();
        return;
    }

    player.lives--;
    if (player.lives <= 0) {
        stopBgm();
        currentState = STATES.GAMEOVER;
    } else {
        player.invincibleTimer = 1500; // 1.5秒の点滅無敵
        if (isPitfall) {
            player.y = 150; // 穴から救出
            player.vy = 0;
        }
    }
}

// --- 画面描画ロジック ---
function drawGame() {
    ctx.clearRect(0, 0, BASE_WIDTH, BASE_HEIGHT);

    if (currentState === STATES.TITLE) {
        // タイ飾りの背景グラデーション
        let grad = ctx.createLinearGradient(0, 0, 0, BASE_HEIGHT);
        grad.addColorStop(0, "#87CEEB");
        grad.addColorStop(1, "#E0F2FE");
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, BASE_WIDTH, BASE_HEIGHT);

        ctx.fillStyle = "#1E3A8A";
        ctx.font = "bold 36px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("パウ・パトロール風", BASE_WIDTH / 2, 120);
        ctx.fillStyle = "#EF4444";
        ctx.font = "bold 46px sans-serif";
        ctx.fillText("ワンワン大冒険！", BASE_WIDTH / 2, 180);

        // スタートボタン
        ctx.fillStyle = "#F59E0B";
        ctx.beginPath();
        ctx.roundRect(buttons.start.x, buttons.start.y, buttons.start.w, buttons.start.h, 15);
        ctx.fill();
        ctx.strokeStyle = "#FFFFFF";
        ctx.lineWidth = 3;
        ctx.stroke();

        ctx.fillStyle = "#FFFFFF";
        ctx.font = "bold 22px sans-serif";
        ctx.fillText("あそぶ", BASE_WIDTH / 2, buttons.start.y + 33);
    } 
    
    else if (currentState === STATES.CHAR_SELECT) {
        ctx.fillStyle = "#F3F4F6";
        ctx.fillRect(0, 0, BASE_WIDTH, BASE_HEIGHT);
        
        ctx.fillStyle = "#111827";
        ctx.font = "bold 26px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("いっしょに はしる こを えらんでね！", BASE_WIDTH / 2, 60);

        buttons.charCards.forEach(card => {
            const data = CHARACTERS[card.key];
            // カード外枠
            ctx.fillStyle = "#FFFFFF";
            ctx.beginPath();
            ctx.roundRect(card.x, card.y, card.w, card.h, 10);
            ctx.fill();
            ctx.strokeStyle = data.color;
            ctx.lineWidth = 3;
            ctx.stroke();

            // キャラアイコンのプレビュー
            if (charImages[card.key]) {
                ctx.drawImage(charImages[card.key], card.x + 25, card.y + 15, 60, 60);
            }

            // キャラのなまえ
            ctx.fillStyle = "#111827";
            ctx.font = "bold 15px sans-serif";
            ctx.fillText(data.name, card.x + card.w/2, card.y + 95);

            // スキルバッジ風ラベル
            ctx.fillStyle = data.color;
            ctx.beginPath();
            ctx.roundRect(card.x + 10, card.y + 110, card.w - 20, 20, 5);
            ctx.fill();
            ctx.fillStyle = "#FFFFFF";
            ctx.font = "11px sans-serif";
            ctx.fillText(data.skillName, card.x + card.w/2, card.y + 124);
        });
    } 
    
    else if (currentState === STATES.MODE_SELECT) {
        ctx.fillStyle = "#EFF6FF";
        ctx.fillRect(0, 0, BASE_WIDTH, BASE_HEIGHT);

        ctx.fillStyle = "#1E3A8A";
        ctx.font = "bold 26px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("ゲームの モードを えらんでね！", BASE_WIDTH / 2, 80);

        // チャレンジモード
        ctx.fillStyle = "#3B82F6";
        ctx.beginPath();
        ctx.roundRect(250, 140, 300, 50, 10);
        ctx.fill();
        ctx.fillStyle = "#FFFFFF";
        ctx.font = "bold 20px sans-serif";
        ctx.fillText("チャレンジ（ライフあり）", BASE_WIDTH / 2, 172);

        // あんしんモード
        ctx.fillStyle = "#10B981";
        ctx.beginPath();
        ctx.roundRect(buttons.safeMode.x, buttons.safeMode.y, buttons.safeMode.w, buttons.safeMode.h, 10);
        ctx.fill();
        ctx.fillStyle = "#FFFFFF";
        ctx.font = "bold 18px sans-serif";
        ctx.fillText("あんしんモード（ライフがへらない）", BASE_WIDTH / 2, buttons.safeMode.y + 26);
    } 
    
    else if (currentState === STATES.PLAY || isGoalReached) {
        // スクロール背景の描画
        ctx.fillStyle = "#87CEEB";
        ctx.fillRect(0, 0, BASE_WIDTH, BASE_HEIGHT);

        // 遠景：ビルや街並みのシルエット
        ctx.fillStyle = "#BAE6FD";
        for (let i = 0; i < 10; i++) {
            let bgX = (i * 150) - (cameraX * 0.2) % 150;
            ctx.fillRect(bgX, 150, 80, 100);
        }

        // 通常地面ベース
        ctx.fillStyle = "#4ADE80";
        ctx.fillRect(0, 290, BASE_WIDTH, 110);
        ctx.fillStyle = "#F59E0B"; // 道
        ctx.fillRect(0, 290, BASE_WIDTH, 10);

        // ★お助けビークル発動時の、画面全体が赤く輝くサイレン風の演出効果
        if (player.isVehicleActive) {
            let pulse = Math.sin(Date.now() / 150) * 0.15 + 0.15;
            ctx.fillStyle = `rgba(239, 68, 68, ${pulse})`;
            ctx.fillRect(0, 0, BASE_WIDTH, BASE_HEIGHT);
        }

        // 落とし穴の切り抜き上書き描画
        ctx.fillStyle = "#87CEEB"; 
        holes.forEach(hole => {
            let screenX = hole.x - cameraX;
            if (screenX > -hole.width && screenX < BASE_WIDTH) {
                ctx.fillRect(screenX, 290, hole.width, 110);
            }
        });

        // ロッキーの橋の描画
        ctx.fillStyle = "#9CA3AF";
        bridges.forEach(b => {
            let screenX = b.x - cameraX;
            if (screenX > -b.width && screenX < BASE_WIDTH) {
                ctx.fillRect(screenX, 290, b.width, 12);
                ctx.strokeStyle = "#374151";
                ctx.strokeRect(screenX, 290, b.width, 12);
            }
        });

        // クッキー（骨おやつ）の描画
        cookies.forEach(cookie => {
            if (!cookie.collected) {
                let screenX = cookie.x - cameraX;
                if (screenX > -30 && screenX < BASE_WIDTH) {
                    ctx.drawImage(cookieImage, screenX, cookie.y, cookie.width, cookie.height);
                }
            }
        });

        // 障害物（コーン）の描画
        obstacles.forEach(obs => {
            let screenX = obs.x - cameraX;
            if (screenX > -30 && screenX < BASE_WIDTH) {
                ctx.drawImage(obstacleImage, screenX, obs.y, obs.width, obs.height);
            }
        });

        // ★ケントのお助けバッジの描画
        ryderBadges.forEach(badge => {
            if (badge.active) {
                let screenX = badge.x - cameraX;
                // 上下にふわふわ浮くアニメーション演出
                let waveY = Math.sin(Date.now() / 200) * 6;
                if (screenX > -50 && screenX < BASE_WIDTH) {
                    ctx.drawImage(ryderBadgeImage, screenX, badge.y + waveY, badge.width, badge.height);
                }
            }
        });

        // ゴールラインの描画
        let goalScreenX = GOAL_DISTANCE - cameraX;
        if (goalScreenX < BASE_WIDTH) {
            ctx.fillStyle = "#FFFFFF";
            ctx.fillRect(goalScreenX, 100, 20, 200);
            ctx.fillStyle = "#000000";
            for(let y=100; y<300; y+=20) {
                if((y/20)%2===0) ctx.fillRect(goalScreenX, y, 10, 10);
                else ctx.fillRect(goalScreenX+10, y, 10, 10);
            }
        }

        // プレイヤーの描画（点滅処理およびビークル変身）
        let showPlayer = true;
        if (player.invincibleTimer > 0 && Math.floor(player.invincibleTimer / 100) % 2 === 0) {
            showPlayer = false; // 無敵点滅
        }
        // ビークルモード終了間近（1.5秒以下）なら高速点滅
        if (player.isVehicleActive && player.vehicleTimer < 1500 && Math.floor(player.vehicleTimer / 50) % 2 === 0) {
            showPlayer = false;
        }

        if (showPlayer) {
            let pScreenX = player.x - cameraX;
            if (player.isVehicleActive) {
                // お助けビークル形態で走行！少し幅広に描写
                ctx.drawImage(vehicleImage, pScreenX - 10, player.y - 10, player.width + 20, player.height + 5);
            } else {
                // 通常の子犬形態走行
                ctx.drawImage(charImages[selectedCharKey], pScreenX, player.y, player.width, player.height);
            }

            // ラブル固有のシールドエフェクト
            if (selectedCharKey === "rubble" && player.hasRubbleShield) {
                ctx.strokeStyle = "rgba(245, 158, 11, 0.6)";
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.arc(pScreenX + player.width/2, player.y + player.height/2, player.width*0.7, 0, Math.PI*2);
                ctx.stroke();
            }
        }

        // ゴール紙吹雪の描画
        if (isGoalReached) {
            confettiParticles.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, p.size, p.size);
            });
            
            // 任務完了デカ文字ポップアップ
            ctx.fillStyle = "#EF4444";
            ctx.font = "bold 42px sans-serif";
            ctx.textAlign = "center";
            ctx.strokeStyle = "#FFFFFF";
            ctx.lineWidth = 6;
            ctx.strokeText("パウ・フェクト！にんむかんりょう！", BASE_WIDTH/2, 160);
            ctx.fillText("パウ・フェクト！にんむかんりょう！", BASE_WIDTH/2, 160);
        }

        // プレイ中の常駐UIヘッダー
        ctx.fillStyle = "rgba(0,0,0,0.4)";
        ctx.fillRect(10, 10, BASE_WIDTH - 20, 40);

        // スコア表示
        ctx.fillStyle = "#FFFFFF";
        ctx.font = "bold 18px sans-serif";
        ctx.textAlign = "left";
        ctx.fillText(`クッキー: ${score}`, 25, 36);

        // 進捗度ゲージ
        ctx.fillStyle = "#4B5563";
        ctx.fillRect(200, 23, 300, 14);
        let progress = Math.min(cameraX / GOAL_DISTANCE, 1);
        ctx.fillStyle = CHARACTERS[selectedCharKey].color;
        ctx.fillRect(200, 23, 300 * progress, 14);

        // ライフアイコン（骨マークまたはハート）
        ctx.textAlign = "right";
        if (isSafeMode) {
            ctx.fillStyle = "#10B981";
            ctx.fillText("あんしんモード❤むてき", BASE_WIDTH - 25, 36);
        } else {
            ctx.fillStyle = "#EF4444";
            let heartStr = "";
            for(let i=0; i<player.lives; i++) heartStr += "🦴";
            ctx.fillText(heartStr, BASE_WIDTH - 25, 35);
        }

        // ★お助けモード中の残りゲージ表示
        if (player.isVehicleActive) {
            ctx.fillStyle = "rgba(255, 255, 255, 0.8)";
            ctx.fillRect(BASE_WIDTH / 2 - 100, 60, 200, 10);
            ctx.fillStyle = "#F59E0B";
            ctx.fillRect(BASE_WIDTH / 2 - 100, 60, 200 * (player.vehicleTimer / 7000), 10);
        }
    } 
    
    else if (currentState === STATES.RESULT) {
        ctx.fillStyle = "#FEF3C7";
        ctx.fillRect(0, 0, BASE_WIDTH, BASE_HEIGHT);

        ctx.fillStyle = "#D97706";
        ctx.font = "bold 38px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("☆ ゴール おめでとう ☆", BASE_WIDTH / 2, 120);

        ctx.fillStyle = "#111827";
        ctx.font = "24px sans-serif";
        ctx.fillText(`あつめたクッキー: ${score} こ`, BASE_WIDTH / 2, 190);

        ctx.fillStyle = "#3B82F6";
        ctx.beginPath();
        ctx.roundRect(buttons.restart.x, buttons.restart.y, buttons.restart.w, buttons.restart.h, 10);
        ctx.fill();
        ctx.fillStyle = "#FFFFFF";
        ctx.font = "bold 18px sans-serif";
        ctx.fillText("タイトルへ もどる", BASE_WIDTH / 2, buttons.restart.y + 26);
    } 
    
    else if (currentState === STATES.GAMEOVER) {
        ctx.fillStyle = "#FEE2E2";
        ctx.fillRect(0, 0, BASE_WIDTH, BASE_HEIGHT);

        ctx.fillStyle = "#EF4444";
        ctx.font = "bold 40px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("パウ・パトロール、いったんきゅうけい！", BASE_WIDTH / 2, 130);

        ctx.fillStyle = "#111827";
        ctx.font = "18px sans-serif";
        ctx.fillText("つぎは きっと クリアできるよ！がんばろう！", BASE_WIDTH / 2, 190);

        ctx.fillStyle = "#EF4444";
        ctx.beginPath();
        ctx.roundRect(buttons.restart.x, buttons.restart.y, buttons.restart.w, buttons.restart.h, 10);
        ctx.fill();
        ctx.fillStyle = "#FFFFFF";
        ctx.font = "bold 18px sans-serif";
        ctx.fillText("もういちど あそぶ", BASE_WIDTH / 2, buttons.restart.y + 26);
    }
}

// --- メイン固定FPS駆動ゲームループ ---
let lastTime = performance.now();
let accumulatedTime = 0;
const deltaTimeTarget = 1000 / 60; // 60FPS

function gameLoop(timestamp) {
    let elapsed = timestamp - lastTime;
    lastTime = timestamp;
    if (elapsed > 100) elapsed = 100; // フリーズハング時の異常蓄積を防止
    accumulatedTime += elapsed;

    while (accumulatedTime >= deltaTimeTarget) {
        updateGame();
        accumulatedTime -= deltaTimeTarget;
    }

    drawGame();
    requestAnimationFrame(gameLoop);
}

// タイトルBGMを再生開始
playBgm(audioAssets.bgmTitle);
requestAnimationFrame(gameLoop);

// --- グローバルイベントリスナー群 (PC・スマホ双方対応) ---
window.addEventListener("mousedown", (e) => { handleInputStart(e.clientX, e.clientY); });
window.addEventListener("mouseup", () => { triggerJumpEnd(); });

window.addEventListener("touchstart", (e) => {
    // 誤動作やブラウザの不要なスクロールを強力にロック
    if (currentState !== STATES.CHAR_SELECT && currentState !== STATES.MODE_SELECT) e.preventDefault(); 
    if (e.touches.length > 0) handleInputStart(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: false });
window.addEventListener("touchend", () => { triggerJumpEnd(); });

window.addEventListener("keydown", (e) => {
    initAudio();
    if (e.code === "Space" && currentState === STATES.PLAY) triggerJumpStart();
});
window.addEventListener("keyup", (e) => {
    if (e.code === "Space" && currentState === STATES.PLAY) triggerJumpEnd();
});
</script>
