// 高解像度ディスプレイ（Retinaなど）およびスマホ画面フィットのための自動スケーリング処理
function resizeCanvasForRetina() {
    const dpr = window.devicePixelRatio || 1;
    // 現在表示されている実サイズを取得
    const rect = canvas.getBoundingClientRect();
    
    // 描画バッファの解像度を決定（ベース解像度は 800x400）
    canvas.width = 800 * dpr;
    canvas.height = 400 * dpr;
    
    // 描画コンテキストのスケールをデバイスピクセル比に合わせる
    ctx.scale(dpr, dpr);
}

// 画面回転やリサイズ時に確実に処理を行う
window.addEventListener('load', resizeCanvasForRetina);
window.addEventListener('resize', () => {
    setTimeout(resizeCanvasForRetina, 200); // 回転時のタイムラグを吸収
});

    audioAssets[key].volume = UNIFORM_VOLUME;
});

audioAssets.bgmTitle.loop = true;
audioAssets.bgmPlay.loop = true;
audioAssets.bgmClear.loop = true;
audioAssets.bgmGameover.loop = false; 

let currentActiveBgm = null; 
let isAudioInitialized = false;

function playBgm(targetAudio) {
    audioAssets.bgmTitle.pause(); audioAssets.bgmTitle.currentTime = 0;
    audioAssets.bgmPlay.pause();  audioAssets.bgmPlay.currentTime = 0;
    audioAssets.bgmClear.pause(); audioAssets.bgmClear.currentTime = 0;
    audioAssets.bgmGameover.pause(); audioAssets.bgmGameover.currentTime = 0;
    
    currentActiveBgm = targetAudio;
    
    if (document.visibilityState === 'visible' && currentState !== STATES.PAUSE && isAudioInitialized) {
        targetAudio.play().catch(e => {});
    }
}

function playSe(targetSe) {
    if (!isAudioInitialized) return;
    targetSe.currentTime = 0;
    targetSe.play().catch(e => {});
}

function stopBgmOnHide() {
    if (currentActiveBgm) currentActiveBgm.pause();
}
function resumeBgmOnShow() {
    if (currentActiveBgm && document.visibilityState === 'visible' && currentState !== STATES.PAUSE && isAudioInitialized) {
        currentActiveBgm.play().catch(e => {});
    }
}
document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === 'hidden') stopBgmOnHide();
    else resumeBgmOnShow();
});
window.addEventListener("pagehide", stopBgmOnHide);
window.addEventListener("pageshow", resumeBgmOnShow);

// --- ゲーム変数 ---
let gameFrame = 0; 
let score = 0;
let lives = 5;
let ranking = [15, 10, 5];
if (localStorage.getItem("paw_game_ranking")) {
    try { 
        ranking = JSON.parse(localStorage.getItem("paw_game_ranking"));
    } catch(e) {

let player = {
    x: 100, y: 240, width: 60, height: 60, vy: 0, 
    gravity: 0.85, isJumping: false, invincibleTimer: 0, speedModifier: 1.0, isFallingInPit: false 
};
let slopePoints = [];
const SLOPE_INTERVAL = 200;
const BASE_GROUND_Y = 240; 

let droppedCookies = []; 
let fallingObstacles = [];
let bgBuildings = [];
let cookies = [];
let obstacles = [];
let bones = []; 
let shieldItems = [];
let dashPanels = []; 
let textPopups = []; 
let confettiParticles = []; 
let goalX = 15000; 
let cameraX = 0;

function getGroundY(x) {
    if (x < 0 || x >= goalX - 400) return BASE_GROUND_Y;
    let index = Math.floor(x / SLOPE_INTERVAL);
    if (index >= slopePoints.length - 1) return BASE_GROUND_Y;
    let p1 = slopePoints[index];
    let p2 = slopePoints[index + 1];
    let ratio = (x % SLOPE_INTERVAL) / SLOPE_INTERVAL;
    return p1 + (p2 - p1) * ratio;
}

function addTextPopup(x, y, text, color = "#FFF") {
    textPopups.push({
        x: x, y: y, text: text, color: color, alpha: 1.0, timer: 45
    });
}

function createConfetti() {
    const colors = ["#FF2A6D", "#05D9E8", "#01012B", "#F5A623", "#7ED321", "#B8E986", "#F8E71C"];
    for (let i = 0; i < 150; i++) {
        confettiParticles.push({
            x: Math.random() * 800,
            y: Math.random() * -400,
            size: Math.random() * 8 + 5,
            color: colors[Math.floor(Math.random() * colors.length)],
            vx: (Math.random() - 0.5) * 4,
            vy: Math.random() * 3 + 2,
            rotation: Math.random() * Math.PI,
            rotSpeed: (Math.random() - 0.5) * 0.1
        });
    }
}

function initGame() {
    score = 0;
    lives = 5; 
    cameraX = 0;
    player.x = 100;
    player.vy = 0;
    player.isJumping = false;
    player.invincibleTimer = 0;
    player.speedModifier = 1.0;
    player.isFallingInPit = false;
    droppedCookies = [];
    fallingObstacles = [];
    textPopups = [];
    confettiParticles = [];
    dashPanelTimer = 0;
    jumpCounter = 0;

    isHovering = false;
    hoverTimer = 0;
    hasRockyShield = (selectedCharKey === 'rocky');
    rubbleRecoveryCount = 0;
    isZumaDashing = false;

    slopePoints = [];
    let numPoints = Math.ceil(goalX / SLOPE_INTERVAL) + 5;
    let lastY = BASE_GROUND_Y;
    for (let i = 0; i < numPoints; i++) {
        if (i < 3 || i > numPoints - 6) {
            slopePoints.push(BASE_GROUND_Y);
        } else {
            let change = (Math.random() - 0.5) * 50;
            let currentY = lastY + change;
            if (currentY < 180) currentY = 180;
            if (currentY > 270) currentY = 270;
            slopePoints.push(currentY);
            lastY = currentY;
        }
    }
    player.y = getGroundY(player.x);

    bgBuildings = [];
    const colors = ["#FCA5A5", "#FECABC", "#FEF08A", "#BBF7D0", "#BFDBFE", "#E9D5FF", "#FBCFE8", "#FDE047", "#A7F3D0", "#93C5FD"];
    const roofTypes = ['flat', 'triangle', 'dome'];
    for (let i = 0; i < 75; i++) {
        bgBuildings.push({
            x: i * 220 + Math.random() * 60,
            width: 100 + Math.random() * 90,
            height: 120 + Math.random() * 140,
            color: colors[Math.floor(Math.random() * colors.length)],
            roof: roofTypes[Math.floor(Math.random() * roofTypes.length)]
        });
    }

    obstacles = [];
    // 「ライフあり」の時だけ「鳥 (bird)」を抽選候補に含める
    const types = ['car', 'moving_car', 'box', 'cone', 'cat', 'puddle', 'pit', 'spring'];
    if (isLifeMode) {
        types.push('bird'); // むずかしいモードのみ鳥を追加
    }

    for (let i = 0; i < 42; i++) {
        let type = types[Math.floor(Math.random() * types.length)];
        let ox = 600 + i * 350 + Math.random() * 60;
        if (type === 'moving_car' && ox < goalX / 2) {
            type = 'car';
        }

        let obsWidth = 50; let obsHeight = 50;
        let groundY = getGroundY(ox);
        let obsY = groundY;

        if (type === 'car' || type === 'moving_car') { obsWidth = 70; obsHeight = 45; obsY = groundY + 15; }
        else if (type === 'box') { obsWidth = 50; obsHeight = 50; obsY = groundY + 10; }
        else if (type === 'cone') { obsWidth = 40; obsHeight = 45; obsY = groundY + 15; }
        else if (type === 'cat') { obsWidth = 50; obsHeight = 50; obsY = groundY + 10; }
        else if (type === 'puddle') { obsWidth = 70; obsHeight = 15; obsY = groundY + 45; }
        else if (type === 'pit') { obsWidth = 140; obsHeight = 160; obsY = groundY + 60; }
        else if (type === 'spring') { obsWidth = 50; obsHeight = 40; obsY = groundY + 20; }
        else if (type === 'bird') { 
            obsWidth = 45;
            obsHeight = 35; obsY = groundY - 80 - Math.random() * 40;
        }

        obstacles.push({ 
            x: ox, y: obsY, width: obsWidth, height: obsHeight, 
            type: type, active: true, vx: 0, isRunning: false 
        });
    }

    dashPanels = [];
    for (let i = 1; i < 20; i++) {
        let px = i * 750 + Math.random() * 100;
        let nearObs = obstacles.find(obs => Math.abs(obs.x - px) < 100);
        if (!nearObs) {
            let gy = getGroundY(px);
            dashPanels.push({ x: px, y: gy + 45, width: 60, height: 15 });
        }
    }

    cookies = [];
    bones = []; 
    shieldItems = [];
    let currentX = 400;
    while (currentX < goalX - 500) {
        currentX += 80 + Math.random() * 140;
        let nearObs = obstacles.find(obs => Math.abs(obs.x - currentX) < 180);
        let numGroup = Math.floor(Math.random() * 2) + 3;
        let groupHeightType = Math.random();

        let randItem = Math.random();
        let spawnBone = isLifeMode && (randItem < 0.05);
        
        let spawnShield = false;
        if (!spawnBone && selectedCharKey === 'rocky') {
            if (randItem >= 0.05 && randItem < 0.08) {
                spawnShield = true;
            }
        }

        if (spawnBone) {
            let bx = currentX;
            let groundY = getGroundY(bx);
            let by = groundY - 50;
            bones.push({ x: bx, y: by, width: 35, height: 35, collected: false });
            currentX += 100;
            continue;
        }

        if (spawnShield) {
            let sx = currentX;
            let groundY = getGroundY(sx);
            let sy = groundY - 50;
            shieldItems.push({ x: sx, y: sy, width: 40, height: 40, collected: false });
            currentX += 100;
            continue;
        }

        for (let j = 0; j < numGroup; j++) {
            let cx = currentX + j * 42;
            let groundY = getGroundY(cx);
            let cy = groundY - 45;
            if (nearObs) {
                if (nearObs.type === 'puddle') cy = groundY - 95;
                else if (nearObs.type === 'pit') cy = groundY - 90;
                else if (nearObs.type === 'spring') cy = groundY - 120;
                else if (nearObs.type === 'car' || nearObs.type === 'moving_car' || nearObs.type === 'box' || nearObs.type === 'cone' || nearObs.type === 'bird') {
                    if (groupHeightType < 0.5) cy = groundY - 155;
                    else cy = groundY - 95;  
                }
            } else {
                if (groupHeightType < 0.4) cy = groundY - 85;
            }

            if (cy < 350) cookies.push({ x: cx, y: cy, width: 30, height: 30, collected: false });
        }
        currentX += numGroup * 42;
    }
}

function triggerDamage() {
    if (player.invincibleTimer > 0) return;
    if (hasRockyShield) {
        hasRockyShield = false;
        player.invincibleTimer = 60;
        playSe(audioAssets.seHeal);
        addTextPopup(player.x + 30, player.y - 10, "バリアをうしなった！", "#EF4444");
        return;
    }

    playSe(audioAssets.seDamage);
    addTextPopup(player.x + 30, player.y - 10, "イタッ！", "#EF4444");
    
    if (isLifeMode) {
        lives--;
        if (lives <= 0) { lives = 0; triggerGameOver(); return; }
    }

    if (score > 0) {
        score--;
        droppedCookies.push({
            x: player.x + player.width / 2, y: player.y + player.height / 2,
            vx: -2 - Math.random() * 3, vy: -7 - Math.random() * 3, 
            gravity: 0.5, rotation: 0, rotSpeed: (Math.random() - 0.5) * 0.2
        });
    }
    player.invincibleTimer = 120; 
}

function triggerPitFall() {
    if (selectedCharKey === 'rubble' && rubbleRecoveryCount < 3) {
        rubbleRecoveryCount++;
        player.isFallingInPit = false;
        player.vy = -14; 
        player.isJumping = true;
        jumpCounter = 0;
        playSe(audioAssets.seJump);
        addTextPopup(player.x + 30, player.y - 10, "ド根性ふっかつ！", "#EAB308");
        return;
    }

    playSe(audioAssets.sePit);
    addTextPopup(player.x + 30, player.y - 10, "あなにおちた！", "#EF4444");

    if (isLifeMode) {
        lives--;
        if (lives <= 0) { lives = 0; triggerGameOver(); return; }
    }

    if (player.invincibleTimer === 0 && score > 0) {
        score--;
        droppedCookies.push({
            x: player.x + player.width / 2, y: player.y + player.height / 2,
            vx: -2 - Math.random() * 3, vy: -7 - Math.random() * 3, 
            gravity: 0.5, rotation: 0, rotSpeed: (Math.random() - 0.5) * 0.2
        });
    }
    player.invincibleTimer = 120;
}

function update() {
    if (currentState === STATES.PAUSE || currentState === STATES.GAMEOVER) return;
    gameFrame++;

    if (currentState === STATES.RESULT) {
        confettiParticles.forEach(p => {
            p.x += p.vx; p.y += p.vy; p.rotation += p.rotSpeed;
            if (p.y > 400) { p.y = -20; p.x = Math.random() * 800; }
        });
        return;
    }

    if (currentState !== STATES.PLAY) return;

    const charConfig = CHARACTER_CONFIG[selectedCharKey];
    if (player.invincibleTimer > 0) player.invincibleTimer--;
    textPopups.forEach(p => { p.y -= 0.8; p.timer--; p.alpha = p.timer / 45; });
    textPopups = textPopups.filter(p => p.timer > 0);
    droppedCookies.forEach(dc => { dc.vy += dc.gravity; dc.x += dc.vx; dc.y += dc.vy; dc.rotation += dc.rotSpeed; });
    droppedCookies = droppedCookies.filter(dc => dc.y < 450);

    fallingObstacles.forEach(fo => { fo.vy += fo.gravity; fo.x += fo.vx; fo.y += fo.vy; fo.rotation += fo.rotSpeed; });
    fallingObstacles = fallingObstacles.filter(fo => fo.y < 450);

    if (player.isFallingInPit) {
        player.vy += 0.8;
        player.y += player.vy;
        if (player.y > 420) {
            player.isFallingInPit = false;
            player.x = player.pitResetX; 
            player.y = getGroundY(player.x);
            player.vy = 0; player.isJumping = false;
        }
        cameraX = player.x - 100;
        return;
    }

    player.speedModifier = 1.0; 

    if (dashPanelTimer > 0) {
        dashPanelTimer--;
        player.speedModifier = 1.8; 
    }

    obstacles.forEach(obs => {
        if (obs.type === 'moving_car' && obs.active) {
            if (!obs.isRunning && obs.x - player.x < 600) {
                obs.isRunning = true;
                obs.vx = -3.5; 
            }
            if (obs.isRunning) {
                obs.x += obs.vx;
                obs.y = getGroundY(obs.x) + 15;
            }
        }
        if (obs.type === 'bird' && obs.active) {
            if (!obs.isRunning && obs.x - player.x < 700) {
                obs.isRunning = true;
                obs.vx = -4.5; 
            }
            if (obs.isRunning) {
                obs.x += obs.vx;
                obs.y += Math.sin(gameFrame * 0.15) * 1;
            }
        }
    });

    let onPuddle = false;
    obstacles.forEach(obs => {
        if (obs.type === 'puddle' && obs.active) {
            if (player.x + player.width > obs.x && player.x < obs.x + obs.width &&
                player.y + player.height >= obs.y - 5 && player.y + player.height <= obs.y + obs.height + 10) {
                onPuddle = true;
            }
        }
    });

    if (onPuddle) {
        if (selectedCharKey === 'zuma') {
            isZumaDashing = true;
        } else {
            if (dashPanelTimer === 0) player.speedModifier = 0.5;
        }
    }

    if (selectedCharKey === 'zuma' && isZumaDashing && dashPanelTimer === 0) {
        player.speedModifier = 1.5;
    }

    if (selectedCharKey === 'skye' && isHovering) {
        player.vy = 0;
        hoverTimer--;
        if (hoverTimer <= 0 || !isInputPressing) isHovering = false;
    } else {
        if (player.isJumping && isInputPressing && jumpCounter < charConfig.maxJumpFrames) {
            player.vy -= 0.65 * (1 - (jumpCounter / charConfig.maxJumpFrames));
            jumpCounter++;
        }
    }

    let nextX = player.x + charConfig.baseSpeed * player.speedModifier;
    let targetGroundY = getGroundY(nextX);
    let currentPit = null;

    obstacles.forEach(obs => {
        if (obs.type === 'pit' && obs.active) {
            let playerCenterX = nextX + player.width / 2;
            if (playerCenterX > obs.x + 15 && playerCenterX < obs.x + obs.width - 15) currentPit = obs;
        }
    });

    player.x = nextX;
    if (!(selectedCharKey === 'skye' && isHovering)) player.vy += player.gravity;
    player.y += player.vy;

    if (currentPit) {
        if (player.y >= targetGroundY) {
            player.isFallingInPit = true;
            player.vy = 4;
            player.pitResetX = currentPit.x + currentPit.width + 20;
            triggerPitFall();
            if (currentState === STATES.GAMEOVER) return;
        }
    } else {
        let currentGroundY = getGroundY(player.x);
        if (player.y >= currentGroundY) {
            player.y = currentGroundY;
            player.vy = 0;
            if (player.isJumping) {
                player.isJumping = false;
                if (selectedCharKey === 'zuma') isZumaDashing = false;
            }
            isHovering = false;
        }
    }

    cameraX = player.x - 100;

    dashPanels.forEach(panel => {
        if (player.x + player.width > panel.x && player.x < panel.x + panel.width &&
            player.y + player.height >= panel.y - 10 && player.y + player.height <= panel.y + panel.height + 5) {
            if (dashPanelTimer === 0) {
                dashPanelTimer = 60;
                playSe(audioAssets.seHeal);
                addTextPopup(player.x + 20, player.y - 10, "⚡超パウダッシュ！", "#3B82F6");
            }
        }
    });

    cookies.forEach(cookie => {
        if (!cookie.collected && player.x < cookie.x + cookie.width && player.x + player.width > cookie.x &&
            player.y < cookie.y + cookie.height && player.y + player.height > cookie.y) {
            cookie.collected = true;
            score++;
            playSe(audioAssets.seCookie);
            addTextPopup(cookie.x, cookie.y, "+1", "#FEF08A");
        }
    });

    bones.forEach(bone => {
        if (!bone.collected && player.x < bone.x + bone.width && player.x + player.width > bone.x &&
            player.y < bone.y + bone.height && player.y + player.height > bone.y) {
            bone.collected = true;
            playSe(audioAssets.seHeal);
            if (lives < 5) lives++;
            addTextPopup(bone.x, bone.y, "❤️ライフ回復", "#EF4444");
        }
    });

    shieldItems.forEach(shield => {
        if (!shield.collected && player.x < shield.x + shield.width && player.x + player.width > shield.x &&
            player.y < shield.y + shield.height && player.y + player.height > shield.y) {
            shield.collected = true;
            playSe(audioAssets.seHeal);
            if (selectedCharKey === 'rocky') {
                hasRockyShield = true;
                addTextPopup(shield.x, shield.y, "🛡️バリアゲット", "#10B981");
            } else {
                score += 3;
                addTextPopup(shield.x, shield.y, "+3", "#10B981");
            }
        }
    });

    obstacles.forEach(obs => {
        if (!obs.active || obs.type === 'pit' || currentState === STATES.GAMEOVER) return;
        let isColliding = player.x < obs.x + obs.width && player.x + player.width > obs.x &&
                          player.y < obs.y + obs.height && player.y + player.height > obs.y;
        if (!isColliding) return;

        if (obs.type === 'spring') {
            if (player.vy > 0 && player.y + player.height - player.vy <= obs.y + 15) {
                player.y = obs.y - player.height;
                if (selectedCharKey === 'marshall') {
                    player.vy = -20.5;
                } else {
                    player.vy = -16.5;
                }
                player.isJumping = true;
                jumpCounter = 0;
                isHovering = false;
                playSe(audioAssets.seJump);
                addTextPopup(player.x + 10, player.y, "パウ・ジャンプだい！", "#FF8400");
            }
        } else if (obs.type === 'puddle') {
            // ズーマとダッシュ時以外は減速処理、衝突無効化
        } else {
            if (selectedCharKey === 'marshall' && player.vy > 0 && player.y + player.height - player.vy <= obs.y + 18) {
                obs.active = false;
                player.vy = -14.5;
                player.isJumping = true;
                jumpCounter = 0;
                playSe(audioAssets.seJump);
                addTextPopup(obs.x, obs.y, "🔥ふんづけウルトラ大ジャンプ！", "#DC2626");
                fallingObstacles.push({
                    x: obs.x, y: obs.y, width: obs.width, height: obs.height, type: obs.type,
                    vx: 2 + Math.random() * 3, vy: -8, gravity: 0.6, rotation: 0, rotSpeed: 0.15
                });
            } else {
                triggerDamage();
            }
        }
    });

    if (player.x >= goalX) {
        triggerGoalClear();
    }
}

function triggerGoalClear() {
    currentState = STATES.RESULT;
    playBgm(audioAssets.bgmClear);
    createConfetti();

    ranking.push(score);
    ranking.sort((a, b) => b - a);
    ranking = ranking.slice(0, 5);
    localStorage.setItem("paw_game_ranking", JSON.stringify(ranking));
}

function triggerGameOver() {
    currentState = STATES.GAMEOVER;
    playBgm(audioAssets.bgmGameover);
}

function draw() {
    ctx.clearRect(0, 0, 800, 400);

    // --- 背景のグラデーション ---
    let skyGrad = ctx.createLinearGradient(0, 0, 0, 400);
    skyGrad.addColorStop(0, "#87CEEB");
    skyGrad.addColorStop(0.6, "#E0F2FE");
    skyGrad.addColorStop(1, "#BAE6FD");
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, 800, 400);

    // 遠景の雲
    ctx.fillStyle = "rgba(255,255,255,0.7)";
    for (let i = 0; i < 6; i++) {
        let cx = (i * 300 - cameraX * 0.1) % 900;
        if (cx < -100) cx += 900;
        ctx.beginPath();
        ctx.arc(cx, 50, 30, 0, Math.PI * 2);
        ctx.arc(cx + 40, 40, 40, 0, Math.PI * 2);
        ctx.arc(cx + 80, 50, 25, 0, Math.PI * 2);
        ctx.fill();
    }

    // 背景の街並み
    bgBuildings.forEach(b => {
        let bx = b.x - cameraX * 0.3;
        if (bx > 850 || bx + b.width < -50) return;
        ctx.fillStyle = b.color;
        ctx.fillRect(bx, 400 - b.height, b.width, b.height);

        ctx.fillStyle = "rgba(255, 255, 255, 0.4)";
        let rows = Math.floor(b.height / 35);
        let cols = Math.floor(b.width / 25);
        for (let r = 0; r < rows - 1; r++) {
            for (let c = 0; c < cols; c++) {
                ctx.fillRect(bx + 8 + c * 24, 400 - b.height + 15 + r * 35, 10, 15);
            }
        }

        ctx.fillStyle = b.color;
        if (b.roof === 'triangle') {
            ctx.beginPath();
            ctx.moveTo(bx - 10, 400 - b.height);
            ctx.lineTo(bx + b.width / 2, 400 - b.height - 40);
            ctx.lineTo(bx + b.width + 10, 400 - b.height);
            ctx.fill();
        } else if (b.roof === 'dome') {
            ctx.beginPath();
            ctx.arc(bx + b.width / 2, 400 - b.height, b.width / 2, Math.PI, 0);
            ctx.fill();
        }
    });

    if (currentState === STATES.TITLE) {
        drawTitleScreen();
    } else if (currentState === STATES.CHAR_SELECT) {
        drawCharSelectScreen();
    } else if (currentState === STATES.MODE_SELECT) {
        drawModeSelectScreen();
    } else if (currentState === STATES.RANKING_VIEW) {
        drawRankingViewScreen();
    } else {
        // メインゲームの描画
        drawGameElements();
        drawHud();

        if (currentState === STATES.PAUSE) drawPauseOverlay();
        if (currentState === STATES.GAMEOVER) drawGameOverScreen();
        if (currentState === STATES.RESULT) drawResultScreen();
    }
}

function drawGameElements() {
    // 地面の緑・茶土
    ctx.fillStyle = "#10B981";
    ctx.beginPath();
    let startY = getGroundY(cameraX);
    ctx.moveTo(0, startY + 60);
    for (let px = 0; px <= 800; px += 10) {
        let gy = getGroundY(cameraX + px);
        ctx.lineTo(px, gy + 60);
    }
    ctx.lineTo(800, 400); ctx.lineTo(0, 400); ctx.fill();

    ctx.fillStyle = "#78350F";
    ctx.beginPath();
    ctx.moveTo(0, startY + 70);
    for (let px = 0; px <= 800; px += 10) {
        let gy = getGroundY(cameraX + px);
        ctx.lineTo(px, gy + 70);
    }
    ctx.lineTo(800, 400); ctx.lineTo(0, 400); ctx.fill();

    // 地面のデコレーション線
    ctx.strokeStyle = "#059669"; ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(0, startY + 60);
    for (let px = 0; px <= 800; px += 10) {
        let gy = getGroundY(cameraX + px);
        ctx.lineTo(px, gy + 60);
    }
    ctx.stroke();

    // 超パウダッシュパネル
    dashPanels.forEach(panel => {
        let screenX = panel.x - cameraX;
        if (screenX > 850 || screenX + panel.width < -50) return;
        try { ctx.drawImage(imgAssets.items.dashPanel, screenX, panel.y, panel.width, panel.height); } catch(e) {}
    });

    // 障害物の描画
    obstacles.forEach(obs => {
        if (!obs.active) return;
        let screenX = obs.x - cameraX;
        if (screenX > 850 || screenX + obs.width < -50) return;

        if (obs.type === 'pit') {
            ctx.fillStyle = "#1E293B";
            ctx.fillRect(screenX, obs.y - 60, obs.width, obs.height);
            ctx.strokeStyle = "#475569"; ctx.lineWidth = 4;
            ctx.strokeRect(screenX, obs.y - 60, obs.width, obs.height);
            return;
        }

        try {
            let img = imgAssets.obstacles[obs.type];
            if (img) ctx.drawImage(img, screenX, obs.y, obs.width, obs.height);
        } catch(e) {}
    });

    // 跳ね飛ばされたギミックの描画
    fallingObstacles.forEach(fo => {
        let screenX = fo.x - cameraX;
        ctx.save();
        ctx.translate(screenX + fo.width/2, fo.y + fo.height/2);
        ctx.rotate(fo.rotation);
        try {
            let img = imgAssets.obstacles[fo.type];
            if (img) ctx.drawImage(img, -fo.width/2, -fo.height/2, fo.width, fo.height);
        } catch(e) {}
        ctx.restore();
    });

    // クッキー（おやつ）
    cookies.forEach(cookie => {
        if (cookie.collected) return;
        let screenX = cookie.x - cameraX;
        if (screenX > 850 || screenX + cookie.width < -50) return;
        try { ctx.drawImage(imgAssets.items.cookie, screenX, cookie.y, cookie.width, cookie.height); } catch(e) {}
    });

    // 骨（ライフ回復）
    bones.forEach(bone => {
        if (bone.collected) return;
        let screenX = bone.x - cameraX;
        if (screenX > 850 || screenX + bone.width < -50) return;
        try { ctx.drawImage(imgAssets.items.bone, screenX, bone.y, bone.width, bone.height); } catch(e) {}
    });

    // ロッキーの予備シールド
    shieldItems.forEach(shield => {
        if (shield.collected) return;
        let screenX = shield.x - cameraX;
        if (screenX > 850 || screenX + shield.width < -50) return;
        try { ctx.drawImage(imgAssets.items.rockyShield, screenX, shield.y, shield.width, shield.height); } catch(e) {}
    });

    // ぶつかって飛び散ったクッキー
    droppedCookies.forEach(dc => {
        let screenX = dc.x - cameraX;
        ctx.save();
        ctx.translate(screenX, dc.y);
        ctx.rotate(dc.rotation);
        try { ctx.drawImage(imgAssets.items.cookie, -15, -15, 30, 30); } catch(e) {}
        ctx.restore();
    });

    // ゴールステーション
    let goalScreenX = goalX - cameraX;
    if (goalScreenX < 900) {
        try { ctx.drawImage(imgAssets.items.pawStation, goalScreenX, BASE_GROUND_Y - 140, 200, 200); } catch(e) {}
    }

    // プレイヤーの描画
    if (player.invincibleTimer === 0 || Math.floor(gameFrame / 4) % 2 === 0) {
        ctx.save();
        let pScreenX = player.x - cameraX;
        
        if (hasRockyShield) {
            ctx.shadowColor = "#10B981"; ctx.shadowBlur = 15;
            ctx.strokeStyle = "#10B981"; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.arc(pScreenX + player.width/2, player.y + player.height/2, 40, 0, Math.PI*2); ctx.stroke();
        } else if (dashPanelTimer > 0 || isZumaDashing) {
            ctx.shadowColor = "#3B82F6"; ctx.shadowBlur = 15;
        }

        let pImg = imgAssets.chars[selectedCharKey].run1;
        if (player.isJumping || isHovering) {
            pImg = imgAssets.chars[selectedCharKey].jump;
        } else {
            pImg = (Math.floor(gameFrame / 6) % 2 === 0) ? imgAssets.chars[selectedCharKey].run1 : imgAssets.chars[selectedCharKey].run2;
        }

        try { ctx.drawImage(pImg, pScreenX, player.y, player.width, player.height); } catch(e) {}
        ctx.restore();
    }

    // ポップアップテキストの描画
    textPopups.forEach(p => {
        ctx.save();
        ctx.globalAlpha = p.alpha;
        ctx.fillStyle = p.color; ctx.font = "bold 16px sans-serif"; ctx.textAlign = "center";
        ctx.fillText(p.text, p.x - cameraX, p.y);
        ctx.restore();
    });
}

function drawHud() {
    // 透過ヘッダー
    ctx.fillStyle = "rgba(0, 0, 0, 0.4)";
    ctx.fillRect(0, 0, 800, 50);

    // クッキー枚数
    ctx.fillStyle = "#FEF08A"; ctx.font = "bold 20px sans-serif"; ctx.textAlign = "left";
    ctx.fillText(`🍪 おやつ: ${score} まい`, 20, 32);

    // ライフ表示（ハート）
    if (isLifeMode) {
        let heartStr = "";
        for(let i=0; i<5; i++) heartStr += (i < lives) ? "❤️" : "🖤";
        ctx.fillStyle = "#FFFFFF"; ctx.font = "20px sans-serif";
        ctx.fillText(`らいふ: ${heartStr}`, 230, 32);
    } else {
        ctx.fillStyle = "#10B981"; ctx.font = "bold 20px sans-serif";
        ctx.fillText("らいふ: むげん 💚", 230, 32);
    }

    // 進捗（％表示）
    let progress = Math.min(100, Math.floor((player.x / goalX) * 100));
    ctx.fillStyle = "#3B82F6"; ctx.fillRect(490, 18, 150, 14);
    ctx.fillStyle = "#6EE7B7"; ctx.fillRect(490, 18, progress * 1.5, 14);
    ctx.fillStyle = "#FFFFFF"; ctx.font = "bold 13px sans-serif";
    ctx.fillText(`ごーるまで: ${progress}%`, 500, 30);

    // ポーズボタン（右上）
    ctx.fillStyle = "rgba(255, 255, 255, 0.2)";
    ctx.beginPath(); ctx.roundRect(pauseButton.x, pauseButton.y, pauseButton.width, pauseButton.height, 8); ctx.fill();
    ctx.fillStyle = "#FFFFFF"; ctx.font = "bold 14px sans-serif"; ctx.textAlign = "center";
    ctx.fillText("||", pauseButton.x + 25, pauseButton.y + 30);
}

function drawPauseOverlay() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.5)"; ctx.fillRect(0, 0, 800, 400);
    ctx.fillStyle = "#FFFFFF"; ctx.font = "bold 36px sans-serif"; ctx.textAlign = "center";
    ctx.fillText("ひとやすみ (ポーズ)", 400, 180);
    ctx.font = "18px sans-serif";
    ctx.fillText("がめんを おすと もういちど はじまるよ！", 400, 230);
}

function drawGameOverScreen() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.75)"; ctx.fillRect(0, 0, 800, 400);
    ctx.fillStyle = "#EF4444"; ctx.font = "bold 46px sans-serif"; ctx.textAlign = "center";
    ctx.fillText("ゲームオーバー", 400, 160);
    ctx.fillStyle = "#FFFFFF"; ctx.font = "22px sans-serif";
    ctx.fillText("つぎは がんばるぞ！がめんを タップして タイトルへ", 400, 230);
}

function drawResultScreen() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.5)"; ctx.fillRect(0, 0, 800, 400);

    // クラッカー紙吹雪の更新・描画
    confettiParticles.forEach(p => {
        ctx.save();
        ctx.fillStyle = p.color;
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rotation);
        ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
        ctx.restore();
    });

    ctx.fillStyle = "#F5A623"; ctx.font = "bold 48px sans-serif"; ctx.textAlign = "center";
    ctx.fillText("🎉 ゴール！おめでとう！ 🎉", 400, 130);
    
    ctx.fillStyle = "#FFFFFF"; ctx.font = "bold 26px sans-serif";
    ctx.fillText(`ゲットしたおやつ: ${score} まい！`, 400, 200);
    ctx.font = "18px sans-serif";
    ctx.fillText("がめんを タップして タイトルへもどる", 400, 270);
}

// --- 入力・操作イベント関連 ---
function handleInputStart(clientX, clientY) {
    if (!isAudioInitialized) {
        isAudioInitialized = true;
        playBgm(audioAssets.bgmTitle);
    }

    // キャンバス表示上の座標に変換
    const rect = canvas.getBoundingClientRect();
    const scaleX = 800 / rect.width;
    const scaleY = 400 / rect.height;
    const clickX = (clientX - rect.left) * scaleX;
    const clickY = (clientY - rect.top) * scaleY;

    if (currentState === STATES.TITLE) {
        if (clickX >= rankingButton.x && clickX <= rankingButton.x + rankingButton.width &&
            clickY >= rankingButton.y && clickY <= rankingButton.y + rankingButton.height) {
            currentState = STATES.RANKING_VIEW;
            return;
        }
        if (clickX >= 250 && clickX <= 550 && clickY >= 230 && clickY <= 300) {
            currentState = STATES.CHAR_SELECT;
        }
    } 
    else if (currentState === STATES.RANKING_VIEW) {
        if (clickX >= rankingBackButton.x && clickX <= rankingBackButton.x + rankingBackButton.width &&
            clickY >= rankingBackButton.y && clickY <= rankingBackButton.y + rankingBackButton.height) {
            currentState = STATES.TITLE;
        }
    } 
    else if (currentState === STATES.CHAR_SELECT) {
        if (showCharPopup) {
            if (clickX >= popupCloseBtn.x && clickX <= popupCloseBtn.x + popupCloseBtn.width &&
                clickY >= popupCloseBtn.y && clickY <= popupCloseBtn.y + popupCloseBtn.height) {
                showCharPopup = false; return;
            }
            if (clickX >= popupSelectBtn.x && clickX <= popupSelectBtn.x + popupSelectBtn.width &&
                clickY >= popupSelectBtn.y && clickY <= popupSelectBtn.y + popupSelectBtn.height) {
                selectedCharKey = popupCharKey;
                showCharPopup = false;
                currentState = STATES.MODE_SELECT;
                return;
            }
            return;
        }

        Object.keys(charButtons).forEach(key => {
            let btn = charButtons[key];
            if (clickX >= btn.x && clickX <= btn.x + btn.width && clickY >= btn.y && clickY <= btn.y + btn.height) {
                popupCharKey = key;
                showCharPopup = true;
            }
        });
    } 
    else if (currentState === STATES.MODE_SELECT) {
        if (clickX >= modeButtons.noLife.x && clickX <= modeButtons.noLife.x + modeButtons.noLife.width &&
            clickY >= modeButtons.noLife.y && clickY <= modeButtons.noLife.y + modeButtons.noLife.height) {
            isLifeMode = false;
            initGame();
            currentState = STATES.PLAY;
            playBgm(audioAssets.bgmPlay);
        }
        else if (clickX >= modeButtons.withLife.x && clickX <= modeButtons.withLife.x + modeButtons.withLife.width &&
                 clickY >= modeButtons.withLife.y && clickY <= modeButtons.withLife.y + modeButtons.withLife.height) {
            isLifeMode = true;
            initGame();
            currentState = STATES.PLAY;
            playBgm(audioAssets.bgmPlay);
        }
    } 
    else if (currentState === STATES.PLAY) {
        if (clickX >= pauseButton.x && clickX <= pauseButton.x + pauseButton.width &&
            clickY >= pauseButton.y && clickY <= pauseButton.y + pauseButton.height) {
            currentState = STATES.PAUSE;
            stopBgmOnHide();
            return;
        }
        triggerJumpStart();
    } 
    else if (currentState === STATES.PAUSE) {
        currentState = STATES.PLAY;
        resumeBgmOnShow();
    } 
    else if (currentState === STATES.RESULT || currentState === STATES.GAMEOVER) {
        currentState = STATES.TITLE;
        playBgm(audioAssets.bgmTitle);
    }
}

function triggerJumpStart() {
    isInputPressing = true;
    if (player.isFallingInPit) return;

    if (!player.isJumping) {
        player.vy = -CHARACTER_CONFIG[selectedCharKey].jumpPower;
        player.isJumping = true;
        jumpCounter = 0;
        isHovering = false;
        playSe(audioAssets.seJump);
    } else {
        if (selectedCharKey === 'skye' && !isHovering) {
            isHovering = true;
            hoverTimer = 55; 
            player.vy = 0;
            playSe(audioAssets.seJump);
            addTextPopup(player.x + 20, player.y - 10, "🚀 ホバーフライング！", "#EC4899");
        }
    }
}

function triggerJumpEnd() {
    isInputPressing = false;
    if (selectedCharKey === 'skye') isHovering = false;
}

window.addEventListener("mousedown", (e) => { handleInputStart(e.clientX, e.clientY); });
window.addEventListener("mouseup", () => { triggerJumpEnd(); });

window.addEventListener("touchstart", (e) => {
    if (currentState !== STATES.CHAR_SELECT && currentState !== STATES.MODE_SELECT) e.preventDefault(); 
    if (e.touches.length > 0) handleInputStart(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: false });
window.addEventListener("touchend", () => { triggerJumpEnd(); });

window.addEventListener("keydown", (e) => {
    if (!isAudioInitialized) isAudioInitialized = true;
    if (e.code === "Space" && currentState === STATES.PLAY) triggerJumpStart();
});
window.addEventListener("keyup", (e) => {
    if (e.code === "Space" && currentState === STATES.PLAY) triggerJumpEnd();
});

let lastTime = performance.now();
let accumulatedTime = 0;
const deltaTimeTarget = 1000 / 60; 

function gameLoop(timestamp) {
    let elapsed = timestamp - lastTime;
    lastTime = timestamp;
    if (elapsed > 100) elapsed = 100; 
    accumulatedTime += elapsed;
    while (accumulatedTime >= deltaTimeTarget) {
        update();
        accumulatedTime -= deltaTimeTarget;
    }
    draw();
    requestAnimationFrame(gameLoop);
}
requestAnimationFrame(gameLoop);
</script>
