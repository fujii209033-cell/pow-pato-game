<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>パウ・パトロール風 横スクロールゲーム</title>
    <style>
        /* 画面全体のスタイルをスマホ最適化 */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none; /* ダブルタップズームなどを完全に禁止 */
        }
        
        /* キャンバスを外枠のコンテナで包み、常にアスペクト比2:1を維持して最大化 */
        #gameContainer {
            width: 100vw;
            height: 50vw; /* 2:1 の比率 */
            max-width: 800px;
            max-height: 400px;
            position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            background-color: #87CEEB;
        }

        /* 横向きの時は画面いっぱいに広げる */
        @media (orientation: landscape) {
            #gameContainer {
                width: 100vw;
                height: 100vh;
                max-width: none;
                max-height: none;
                aspect-ratio: 2 / 1;
                margin: auto;
            }
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

<div id="gameContainer">
    <canvas id="gameCanvas" width="800" height="400"></canvas>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// 高解像度ディスプレイおよびスマホ画面フィットのための自動スケーリング処理
function resizeCanvasForRetina() {
    const dpr = window.devicePixelRatio || 1;
    canvas.width = 800 * dpr;
    canvas.height = 400 * dpr;
    ctx.scale(dpr, dpr);
}

window.addEventListener('load', resizeCanvasForRetina);
window.addEventListener('resize', () => {
    setTimeout(resizeCanvasForRetina, 200);
});
resizeCanvasForRetina();

window.addEventListener("load", () => {
    setTimeout(() => { window.scrollTo(0, 1); }, 100);
});

// --- ゲームの状態 ---
const STATES = {
    TITLE: 'TITLE',
    CHAR_SELECT: 'CHAR_SELECT',
    MODE_SELECT: 'MODE_SELECT', 
    PLAY: 'PLAY',
    PAUSE: 'PAUSE',
    RESULT: 'RESULT',
    GAMEOVER: 'GAMEOVER',       
    RANKING_VIEW: 'RANKING_VIEW',
    BADGE_VIEW: 'BADGE_VIEW' // ①バッジ図鑑の状態を追加
};
let currentState = STATES.TITLE;

// --- オーディオアセット ---
const audioAssets = {
    bgmTitle: new Audio("sounds/bgm_title.mp3"),
    bgmPlay: new Audio("sounds/bgm_play.mp3"),
    bgmClear: new Audio("sounds/bgm_clear.mp3"),
    bgmGameover: new Audio("sounds/bgm_gameover.mp3"), 
    seJump: new Audio("sounds/se_jump.mp3"),
    seCookie: new Audio("sounds/se_cookie.mp3"),
    seDamage: new Audio("sounds/se_damage.mp3"),
    sePit: new Audio("sounds/se_pit.mp3"),
    seClear: new Audio("sounds/se_clear.mp3"),
    seHeal: new Audio("sounds/se_heal.mp3")            
};
const UNIFORM_VOLUME = 0.5;
Object.keys(audioAssets).forEach(key => {
    audioAssets[key].volume = UNIFORM_VOLUME;
});

audioAssets.bgmTitle.loop = true;
audioAssets.bgmPlay.loop = true;
audioAssets.bgmClear.loop = true;
audioAssets.bgmGameover.loop = false; 

let currentActiveBgm = null; 
let isAudioInitialized = false;

function playBgm(targetAudio) {
    audioAssets.bgmTitle.pause(); audioAssets.bgmTitle.currentTime = 0;
    audioAssets.bgmPlay.pause();  audioAssets.bgmPlay.currentTime = 0;
    audioAssets.bgmClear.pause(); audioAssets.bgmClear.currentTime = 0;
    audioAssets.bgmGameover.pause(); audioAssets.bgmGameover.currentTime = 0;
    
    currentActiveBgm = targetAudio;
    if (document.visibilityState === 'visible' && currentState !== STATES.PAUSE && isAudioInitialized) {
        targetAudio.play().catch(e => {});
    }
}

function playSe(targetSe) {
    if (!isAudioInitialized) return;
    targetSe.currentTime = 0;
    targetSe.play().catch(e => {});
}

function stopBgmOnHide() {
    if (currentActiveBgm) currentActiveBgm.pause();
}
function resumeBgmOnShow() {
    if (currentActiveBgm && document.visibilityState === 'visible' && currentState !== STATES.PAUSE && isAudioInitialized) {
        currentActiveBgm.play().catch(e => {});
    }
}
document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === 'hidden') stopBgmOnHide();
    else resumeBgmOnShow();
});
window.addEventListener("pagehide", stopBgmOnHide);
window.addEventListener("pageshow", resumeBgmOnShow);

// 各画像の読み込み完了チェック用

totalImagesCount += 3;

imgAssets.items.bone = new Image(); imgAssets.items.bone.onload = onImageLoad; imgAssets.items.bone.src = "images/bone.png";
imgAssets.items.rockyShield = new Image(); imgAssets.items.rockyShield.onload = onImageLoad; imgAssets.items.rockyShield.src = "images/rocky_shield.png";

imgAssets.items.spring = new Image();
imgAssets.items.spring.src = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(`

const obstacleImages = { car: "images/car.png", moving_car: "images/car.png", box: "images/box.png", cone: "images/cone.png", cat: "images/cat.png", puddle: "images/puddle.png" };

// --- ゲーム内各種変数 ---
let gameFrame = 0; 
let score = 0;
let lives = 5;
let ranking = [15, 10, 5];

if (localStorage.getItem("paw_game_ranking")) {
    try { ranking = JSON.parse(localStorage.getItem("paw_game_ranking")); } catch(e) { ranking = [15, 10, 5]; }
} else {
    localStorage.setItem("paw_game_ranking", JSON.stringify(ranking));
}

let player = {
    x: 100, y: 240, width: 60, height: 60, vy: 0, 
    gravity: 0.85, isJumping: false, invincibleTimer: 0, speedModifier: 1.0, isFallingInPit: false 
};
let slopePoints = [];
const SLOPE_INTERVAL = 200;
const BASE_GROUND_Y = 240; 

let droppedCookies = []; 
let fallingObstacles = [];
let bgBuildings = [];
let bgClouds = [];
let cookies = [];
let obstacles = [];
let bones = []; 
let shieldItems = [];
let dashPanels = []; 
let textPopups = []; 
let confettiParticles = []; 
let goalX = 15000; 
let cameraX = 0;

function getGroundY(x) {
    if (x < 0 || x >= goalX - 400) return BASE_GROUND_Y;
    let index = Math.floor(x / SLOPE_INTERVAL);
    if (index >= slopePoints.length - 1) return BASE_GROUND_Y;
    let p1 = slopePoints[index];
    let p2 = slopePoints[index + 1];
    let ratio = (x % SLOPE_INTERVAL) / SLOPE_INTERVAL;
    return p1 + (p2 - p1) * ratio;
}

function addTextPopup(x, y, text, color = "#FFF") {
    textPopups.push({ x: x, y: y, text: text, color: color, alpha: 1.0, timer: 45 });
}

function createConfetti() {
    const colors = ["#FF2A6D", "#05D9E8", "#F5A623", "#7ED321", "#B8E986", "#F8E71C"];
    for (let i = 0; i < 150; i++) {
        confettiParticles.push({
            x: Math.random() * 800, y: Math.random() * -400,
            size: Math.random() * 8 + 5,
            color: colors[Math.floor(Math.random() * colors.length)],
            vx: (Math.random() - 0.5) * 4, vy: Math.random() * 3 + 2,
            rotation: Math.random() * Math.PI, rotSpeed: (Math.random() - 0.5) * 0.1
        });
    }
}

function initGame() {
    gameFrame = 0;
    score = 0;
    lives = 5; 
    cameraX = 0;
    player.x = 100;
    player.vy = 0;
    player.isJumping = false;
    player.invincibleTimer = 0;
    player.speedModifier = 1.0;
    player.isFallingInPit = false;
    droppedCookies = [];
    fallingObstacles = [];
    textPopups = [];
    confettiParticles = [];
    dashPanelTimer = 0;
    jumpCounter = 0;

    isHovering = false;
    hoverTimer = 0;
    hasRockyShield = (selectedCharKey === 'rocky');
    rubbleRecoveryCount = 0;
    isZumaDashing = false;

    // 地形の生成
    slopePoints = [];
    let numPoints = Math.ceil(goalX / SLOPE_INTERVAL) + 5;
    let lastY = BASE_GROUND_Y;
    for (let i = 0; i < numPoints; i++) {
        if (i < 3 || i > numPoints - 6) {
            slopePoints.push(BASE_GROUND_Y);
        } else {
            let change = (Math.random() - 0.5) * 50;
            let currentY = lastY + change;
            if (currentY < 180) currentY = 180;
            if (currentY > 270) currentY = 270;
            slopePoints.push(currentY);
            lastY = currentY;
        }
    }
    player.y = getGroundY(player.x);

    // 背景の建物生成
    bgBuildings = [];
    const colors = ["#FCA5A5", "#FECABC", "#FEF08A", "#BBF7D0", "#BFDBFE", "#E9D5FF", "#FBCFE8"];
    const roofTypes = ['flat', 'triangle', 'dome'];
    for (let i = 0; i < 80; i++) {
        bgBuildings.push({
            x: i * 200 + Math.random() * 40,
            width: 110 + Math.random() * 70,
            height: 130 + Math.random() * 130,
            color: colors[Math.floor(Math.random() * colors.length)],
            roof: roofTypes[Math.floor(Math.random() * roofTypes.length)]
        });
    }

    // 雲の初期化
    bgClouds = [];
    for (let i = 0; i < 10; i++) {
        bgClouds.push({ x: Math.random() * 900, y: 30 + Math.random() * 80, speed: 0.2 + Math.random() * 0.3, size: 30 + Math.random() * 20 });
    }

    // 障害物の生成
    obstacles = [];
    const types = ['car', 'moving_car', 'box', 'cone', 'cat', 'puddle', 'pit', 'spring'];
    if (isLifeMode) types.push('bird');

    for (let i = 0; i < 42; i++) {
        let type = types[Math.floor(Math.random() * types.length)];
        let ox = 700 + i * 340 + Math.random() * 60;
        if (type === 'moving_car' && ox < goalX / 2) type = 'car';

        let obsWidth = 50; let obsHeight = 50;
        let groundY = getGroundY(ox);
        let obsY = groundY;

        if (type === 'car' || type === 'moving_car') { obsWidth = 70; obsHeight = 45; obsY = groundY + 15; }
        else if (type === 'box') { obsWidth = 48; obsHeight = 48; obsY = groundY + 12; }
        else if (type === 'cone') { obsWidth = 38; obsHeight = 44; obsY = groundY + 16; }
        else if (type === 'cat') { obsWidth = 45; obsHeight = 45; obsY = groundY + 15; }
        else if (type === 'puddle') { obsWidth = 75; obsHeight = 15; obsY = groundY + 45; }
        else if (type === 'pit') { obsWidth = 130; obsHeight = 150; obsY = groundY + 45; }
        else if (type === 'spring') { obsWidth = 45; obsHeight = 35; obsY = groundY + 25; }
        else if (type === 'bird') { obsWidth = 42; obsHeight = 32; obsY = groundY - 70 - Math.random() * 50; }

        obstacles.push({ x: ox, y: obsY, width: obsWidth, height: obsHeight, type: type, active: true, vx: 0, isRunning: false });
    }

    // ダッシュパネル
    dashPanels = [];
    for (let i = 1; i < 20; i++) {
        let px = i * 780 + Math.random() * 80;
        let nearObs = obstacles.find(obs => Math.abs(obs.x - px) < 120);
        if (!nearObs) {
            let gy = getGroundY(px);
            dashPanels.push({ x: px, y: gy + 45, width: 60, height: 15 });
        }
    }

    // アイテム（クッキー、ホネ、シールド）
    cookies = []; bones = []; shieldItems = [];
    let currentX = 400;
    while (currentX < goalX - 600) {
        currentX += 90 + Math.random() * 130;
        let nearObs = obstacles.find(obs => Math.abs(obs.x - currentX) < 160);
        let numGroup = Math.floor(Math.random() * 2) + 3;
        let groupHeightType = Math.random();
        let randItem = Math.random();
        
        if (isLifeMode && randItem < 0.06) {
            let bx = currentX;
            bones.push({ x: bx, y: getGroundY(bx) - 45, width: 35, height: 35, collected: false });
            currentX += 120;
            continue;
        }

        if (selectedCharKey === 'rocky' && randItem >= 0.06 && randItem < 0.12) {
            let sx = currentX;
            shieldItems.push({ x: sx, y: getGroundY(sx) - 45, width: 40, height: 40, collected: false });
            currentX += 120;
            continue;
        }

        for (let j = 0; j < numGroup; j++) {
            let cx = currentX + j * 40;
            let groundY = getGroundY(cx);
            let cy = groundY - 45;
            if (nearObs) {
                if (nearObs.type === 'puddle') cy = groundY - 90;
                else if (nearObs.type === 'pit') cy = groundY - 90;
                else if (nearObs.type === 'spring') cy = groundY - 120;
                else if (['car', 'moving_car', 'box', 'cone', 'bird'].includes(nearObs.type)) {
                    cy = groupHeightType < 0.5 ? groundY - 150 : groundY - 90;
                }
            } else if (groupHeightType < 0.35) {
                cy = groundY - 85;
            }
            if (cy < 360) cookies.push({ x: cx, y: cy, width: 30, height: 30, collected: false });
        }
        currentX += numGroup * 40;
    }
}

function triggerDamage() {
    if (player.invincibleTimer > 0) return;
    if (hasRockyShield) {
        hasRockyShield = false;
        player.invincibleTimer = 60;
        playSe(audioAssets.seHeal);
        addTextPopup(player.x + 30, player.y - 10, "バリアをうしなった！", "#EF4444");
        return;
    }

    playSe(audioAssets.seDamage);
    addTextPopup(player.x + 30, player.y - 10, "イタッ！", "#EF4444");
    
    if (isLifeMode) {
        lives--;
        if (lives <= 0) { lives = 0; triggerGameOver(); return; }
    }

    if (score > 0) {
        score--;
        droppedCookies.push({
            x: player.x + player.width / 2, y: player.y + player.height / 2,
            vx: -2 - Math.random() * 3, vy: -7 - Math.random() * 3, 
            gravity: 0.5, rotation: 0, rotSpeed: (Math.random() - 0.5) * 0.2
        });
    }
    player.invincibleTimer = 120; 
}

function triggerPitFall() {
    if (selectedCharKey === 'rubble' && rubbleRecoveryCount < 3) {
        rubbleRecoveryCount++;
        player.isFallingInPit = false;
        player.vy = -14; 
        player.isJumping = true;
        jumpCounter = 0;
        playSe(audioAssets.seJump);
        addTextPopup(player.x + 30, player.y - 10, "ド根性ふっかつ！", "#EAB308");
        return;
    }

    playSe(audioAssets.sePit);
    addTextPopup(player.x + 30, player.y - 10, "あなにおちた！", "#EF4444");

    if (isLifeMode) {
        lives--;
        if (lives <= 0) { lives = 0; triggerGameOver(); return; }
    }

    if (player.invincibleTimer === 0 && score > 0) {
        score--;
        droppedCookies.push({
            x: player.x + player.width / 2, y: player.y + player.height / 2,
            vx: -2 - Math.random() * 3, vy: -7 - Math.random() * 3, 
            gravity: 0.5, rotation: 0, rotSpeed: (Math.random() - 0.5) * 0.2
        });
    }
    player.invincibleTimer = 120;
}

function update() {
    if (currentState === STATES.PAUSE || currentState === STATES.GAMEOVER) return;
    gameFrame++;

    // 雲のゆったりアニメーション
    bgClouds.forEach(cloud => {
        cloud.x -= cloud.speed;
        if (cloud.x + cloud.size * 2 < 0) { cloud.x = 850; cloud.y = 30 + Math.random() * 80; }
    });

    if (currentState === STATES.RESULT) {
        confettiParticles.forEach(p => {
            p.x += p.vx; p.y += p.vy; p.rotation += p.rotSpeed;
            if (p.y > 400) { p.y = -20; p.x = Math.random() * 800; }
        });
        return;
    }

    if (currentState !== STATES.PLAY) return;

    const charConfig = CHARACTER_CONFIG[selectedCharKey];
    if (player.invincibleTimer > 0) player.invincibleTimer--;
    
    textPopups.forEach(p => { p.y -= 0.8; p.timer--; p.alpha = p.timer / 45; });
    textPopups = textPopups.filter(p => p.timer > 0);
    
    droppedCookies.forEach(dc => { dc.vy += dc.gravity; dc.x += dc.vx; dc.y += dc.vy; dc.rotation += dc.rotSpeed; });
    droppedCookies = droppedCookies.filter(dc => dc.y < 450);

    fallingObstacles.forEach(fo => { fo.vy += fo.gravity; fo.x += fo.vx; fo.y += fo.vy; fo.rotation += fo.rotSpeed; });
    fallingObstacles = fallingObstacles.filter(fo => fo.y < 450);

    if (player.isFallingInPit) {
        player.vy += 0.8;
        player.y += player.vy;
        if (player.y > 420) {
            player.isFallingInPit = false;
            player.x = player.pitResetX; 
            player.y = getGroundY(player.x);
            player.vy = 0; player.isJumping = false;
        }
        cameraX = player.x - 100;
        return;
    }

    player.speedModifier = 1.0; 
    if (dashPanelTimer > 0) {
        dashPanelTimer--;
        player.speedModifier = 1.8; 
    }

    // 障害物の動的ビヘイビア
    obstacles.forEach(obs => {
        if (obs.type === 'moving_car' && obs.active) {
            if (!obs.isRunning && obs.x - player.x < 600) { obs.isRunning = true; obs.vx = -3.8; }
            if (obs.isRunning) { obs.x += obs.vx; obs.y = getGroundY(obs.x) + 15; }
        }
        if (obs.type === 'bird' && obs.active) {
            if (!obs.isRunning && obs.x - player.x < 650) { obs.isRunning = true; obs.vx = -4.8; }
            if (obs.isRunning) { obs.x += obs.vx; obs.y += Math.sin(gameFrame * 0.15) * 1.2; }
        }
    });

    let onPuddle = false;
    obstacles.forEach(obs => {
        if (obs.type === 'puddle' && obs.active) {
            if (player.x + player.width > obs.x && player.x < obs.x + obs.width &&
                player.y + player.height >= obs.y - 5 && player.y + player.height <= obs.y + obs.height + 10) {
                onPuddle = true;
            }
        }
    });

    if (onPuddle) {
        if (selectedCharKey === 'zuma') isZumaDashing = true;
        else if (dashPanelTimer === 0) player.speedModifier = 0.5;
    }

    if (selectedCharKey === 'zuma' && isZumaDashing && dashPanelTimer === 0) {
        player.speedModifier = 1.5;
    }

    // スカイのホバー飛行スキル
    if (selectedCharKey === 'skye' && isHovering) {
        player.vy = 0;
        hoverTimer--;
        if (hoverTimer <= 0 || !isInputPressing) isHovering = false;
    } else {
        if (player.isJumping && isInputPressing && jumpCounter < charConfig.maxJumpFrames) {
            player.vy -= 0.65 * (1 - (jumpCounter / charConfig.maxJumpFrames));
            jumpCounter++;
        }
    }

    let nextX = player.x + charConfig.baseSpeed * player.speedModifier;
    let targetGroundY = getGroundY(nextX);
    let currentPit = null;

    obstacles.forEach(obs => {
        if (obs.type === 'pit' && obs.active) {
            let playerCenterX = nextX + player.width / 2;
            if (playerCenterX > obs.x + 10 && playerCenterX < obs.x + obs.width - 10) currentPit = obs;
        }
    });

    player.x = nextX;
    if (!(selectedCharKey === 'skye' && isHovering)) player.vy += player.gravity;
    player.y += player.vy;

    if (currentPit) {
        if (player.y + player.height >= targetGroundY + 25) {
            player.isFallingInPit = true;
            player.vy = 4;
            player.pitResetX = currentPit.x + currentPit.width + 30;
            triggerPitFall();
            if (currentState === STATES.GAMEOVER) return;
        }
    } else {
        let currentGroundY = getGroundY(player.x);
        if (player.y >= currentGroundY) {
            player.y = currentGroundY;
            player.vy = 0;
            if (player.isJumping) {
                player.isJumping = false;
                if (selectedCharKey === 'zuma') isZumaDashing = false;
            }
            isHovering = false;
        }
    }

    cameraX = player.x - 100;

    // --- 各種オブジェクトとの衝突判定 ---
    // ダッシュパネル
    dashPanels.forEach(panel => {
        if (player.x + player.width > panel.x && player.x < panel.x + panel.width &&
            player.y + player.height >= panel.y - 8 && player.y + player.height <= panel.y + panel.height + 8) {
            if (dashPanelTimer === 0) {
                dashPanelTimer = 65; playSe(audioAssets.seHeal);
                addTextPopup(player.x + 20, player.y - 10, "⚡超パウダッシュ！", "#3B82F6");
            }
        }
    });

    // クッキー
    cookies.forEach(cookie => {
        if (!cookie.collected && player.x < cookie.x + cookie.width && player.x + player.width > cookie.x &&
            player.y < cookie.y + cookie.height && player.y + player.height > cookie.y) {
            cookie.collected = true; score++; playSe(audioAssets.seCookie);
            addTextPopup(cookie.x, cookie.y, "+1", "#FEF08A");
        }
    });

    // ホネ (ライフ回復)
    bones.forEach(bone => {
        if (!bone.collected && player.x < bone.x + bone.width && player.x + player.width > bone.x &&
            player.y < bone.y + bone.height && player.y + player.height > bone.y) {
            bone.collected = true; playSe(audioAssets.seHeal);
            if (lives < 5) lives++;
            addTextPopup(bone.x, bone.y, "❤️ライフかいふく", "#EF4444");
        }
    });

    // バリアアイテム
    shieldItems.forEach(shield => {
        if (!shield.collected && player.x < shield.x + shield.width && player.x + player.width > shield.x &&
            player.y < shield.y + shield.height && player.y + player.height > shield.y) {
            shield.collected = true; playSe(audioAssets.seHeal);
            if (selectedCharKey === 'rocky') {
                hasRockyShield = true; addTextPopup(shield.x, shield.y, "🛡️バリアゲット", "#10B981");
            } else {
                score += 3; addTextPopup(shield.x, shield.y, "+3", "#10B981");
            }
        }
    });

    // 一般障害物との当たり判定
    obstacles.forEach(obs => {
        if (!obs.active || obs.type === 'pit' || obs.type === 'puddle' || currentState === STATES.GAMEOVER) return;
        
        let isColliding = player.x < obs.x + obs.width && player.x + player.width > obs.x &&
                          player.y < obs.y + obs.height && player.y + player.height > obs.y;
        if (!isColliding) return;

        if (obs.type === 'spring') {
            if (player.vy > 0 && player.y + player.height - player.vy <= obs.y + 18) {
                player.y = obs.y - player.height;
                if (selectedCharKey === 'marshall') {
                    player.vy = -16.5; addTextPopup(player.x + 20, player.y - 10, "🔥ウルトラジャンプ！", "#DC2626");
                } else {
                    player.vy = -13.0; addTextPopup(player.x + 20, player.y - 10, "大ジャンプ！", "#EF4444");
                }
                player.isJumping = true; jumpCounter = 0; playSe(audioAssets.seJump);
            }
        } else {
            // マーシャル専用スキル：障害物を踏みつけた場合大ジャンプ
            if (selectedCharKey === 'marshall' && player.vy > 0 && player.y + player.height - player.vy <= obs.y + 15) {
                obs.active = false; player.vy = -14.5; player.isJumping = true; jumpCounter = 0;
                playSe(audioAssets.seJump); addTextPopup(player.x + 20, player.y - 10, "🔥ふみつけジャンプ！", "#DC2626");
                fallingObstacles.push({
                    x: obs.x, y: obs.y, width: obs.width, height: obs.height, type: obs.type,
                    vx: 2 + Math.random() * 2, vy: -5 - Math.random() * 3, gravity: 0.5, rotation: 0, rotSpeed: 0.1
                });
            } else {
                triggerDamage();
            }
        }
    });

    // ゴール到達判定
    if (player.x >= goalX - 180) triggerClear();
}

function triggerClear() {
    currentState = STATES.RESULT;
    playBgm(audioAssets.bgmClear);
    playSe(audioAssets.seClear);
    createConfetti();

    ranking.push(score);
    ranking.sort((a, b) => b - a);
    ranking = ranking.slice(0, 5);
    localStorage.setItem("paw_game_ranking", JSON.stringify(ranking));
}

function triggerGameOver() {
    currentState = STATES.GAMEOVER;
    playBgm(audioAssets.bgmGameover);
}

// --- 各画面の描画処理 ---
function draw() {
    ctx.clearRect(0, 0, 800, 400);

    // 空のグラデーション
    let skyGrad = ctx.createLinearGradient(0, 0, 0, 400);
    skyGrad.addColorStop(0, "#68BBE3"); skyGrad.addColorStop(0.6, "#AEE2FF"); skyGrad.addColorStop(1, "#E7F6FF");
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, 800, 400);

    // 雲の描画
    ctx.fillStyle = "rgba(255, 255, 255, 0.75)";
    bgClouds.forEach(cloud => {
        ctx.beginPath();
        ctx.arc(cloud.x, cloud.y, cloud.size, 0, Math.PI * 2);
        ctx.arc(cloud.x + cloud.size * 0.7, cloud.y - cloud.size * 0.3, cloud.size * 0.8, 0, Math.PI * 2);
        ctx.arc(cloud.x + cloud.size * 1.4, cloud.y, cloud.size * 0.6, 0, Math.PI * 2);
        ctx.fill();
    });

    if (currentState === STATES.TITLE) {
        drawTitleScreen();
    } else if (currentState === STATES.CHAR_SELECT) {
        drawCharSelectScreen();
    } else if (currentState === STATES.MODE_SELECT) {
        drawModeSelectScreen();
    } else if (currentState === STATES.RANKING_VIEW) {
        drawRankingScreen();
    } else if (currentState === STATES.BADGE_VIEW) {
        drawBadgeScreen(); // ①バッジ図鑑画面
    } else {
        drawGamePlayPlayfields();
    }
}

function drawTitleScreen() {
    // 賑やかな背景建物の描画（デモスクロール風）

            } else if (b.roof === 'dome') {
                ctx.fillStyle = "#0284C7"; ctx.beginPath(); ctx.arc(bx + b.width / 2, 400 - b.height, b.width / 2, Math.PI, 0); ctx.fill();

function drawGamePlayPlayfields() {
    // 遠景建物
    bgBuildings.forEach(b => {
        let bx = b.x - cameraX * 0.2;
        if (bx < -b.width) return;
        if (bx < 800) {
            ctx.fillStyle = b.color;
            ctx.fillRect(bx, 400 - b.height, b.width, b.height);
            if (b.roof === 'triangle') {
                ctx.fillStyle = "#E11D48"; ctx.beginPath();
                ctx.moveTo(bx - 8, 400 - b.height); ctx.lineTo(bx + b.width / 2, 400 - b.height - 35); ctx.lineTo(bx + b.width + 8, 400 - b.height); ctx.fill();
            } else if (b.roof === 'dome') {
                ctx.fillStyle = "#0284C7"; ctx.beginPath(); ctx.arc(bx + b.width / 2, 400 - b.height, b.width / 2, Math.PI, 0); ctx.fill();
            }
        }
    });

    // 地形・地面ラインのレンダリング
    ctx.fillStyle = "#10B981";
    ctx.beginPath();
    let startVisibleIdx = Math.floor(cameraX / SLOPE_INTERVAL);
    let endVisibleIdx = Math.ceil((cameraX + 800) / SLOPE_INTERVAL);

    let firstGroundY = getGroundY(cameraX);
    ctx.moveTo(0, 400);
    ctx.lineTo(0, firstGroundY);

    for (let i = startVisibleIdx; i <= endVisibleIdx + 1; i++) {
        let px = i * SLOPE_INTERVAL;
        let py = slopePoints[i] !== undefined ? slopePoints[i] : BASE_GROUND_Y;
        if (px >= goalX - 400) py = BASE_GROUND_Y;
        ctx.lineTo(px - cameraX, py + 50);
    }
    ctx.lineTo(800, 400);
    ctx.fill();

    // 地面の表面の明るい草色
    ctx.strokeStyle = "#34D399"; ctx.lineWidth = 6;
    ctx.beginPath();
    ctx.moveTo(0, firstGroundY + 50);
    for (let i = startVisibleIdx; i <= endVisibleIdx + 1; i++) {
        let px = i * SLOPE_INTERVAL;
        let py = slopePoints[i] !== undefined ? slopePoints[i] : BASE_GROUND_Y;
        if (px >= goalX - 400) py = BASE_GROUND_Y;
        ctx.lineTo(px - cameraX, py + 50);
    }
    ctx.stroke();

    // 深い地面
    ctx.fillStyle = "#78350F";
    ctx.beginPath();
    ctx.moveTo(0, 400);
    ctx.lineTo(0, firstGroundY + 54);
    for (let i = startVisibleIdx; i <= endVisibleIdx + 1; i++) {
        let px = i * SLOPE_INTERVAL;
        let py = slopePoints[i] !== undefined ? slopePoints[i] : BASE_GROUND_Y;
        if (px >= goalX - 400) py = BASE_GROUND_Y;
        ctx.lineTo(px - cameraX, py + 54);
    }
    ctx.lineTo(800, 400);
    ctx.fill();

    // ダッシュパネル
    dashPanels.forEach(panel => {
        let px = panel.x - cameraX;
        if (px > -60 && px < 800) {
            ctx.drawImage(imgAssets.items.dashPanel, px, panel.y);
        }
    });

    // ③ クッキー画像の表示対応
    cookies.forEach(cookie => {
        if (!cookie.collected) {
            let cx = cookie.x - cameraX;
            if (cx > -30 && cx < 800) {
                let cImg = imgAssets.items.cookie;
                if (cImg && cImg.complete && cImg.naturalWidth !== 0) {
                    ctx.drawImage(cImg, cx, cookie.y, cookie.width, cookie.height);
                } else {
                    // フォールバック丸描画（画像未ロード時）
                    ctx.fillStyle = "#D97706"; ctx.beginPath(); ctx.arc(cx + 15, cookie.y + 15, 13, 0, Math.PI * 2); ctx.fill();
                    ctx.fillStyle = "#FEF08A"; ctx.beginPath(); ctx.arc(cx + 15, cookie.y + 15, 10, 0, Math.PI * 2); ctx.fill();
                    ctx.fillStyle = "#78350F"; ctx.fillRect(cx + 9, cookie.y + 10, 3, 3); ctx.fillRect(cx + 17, cookie.y + 14, 3, 3); ctx.fillRect(cx + 12, cookie.y + 20, 3, 3);
                }
            }
        }
    });

    // ③ ホネ画像の表示対応
    bones.forEach(bone => {
        if (!bone.collected) {
            let bx = bone.x - cameraX;
            if (bx > -40 && bx < 800) {
                let bImg = imgAssets.items.bone;
                if (bImg && bImg.complete && bImg.naturalWidth !== 0) {
                    ctx.drawImage(bImg, bx, bone.y, bone.width, bone.height);
                } else {
                    ctx.fillStyle = "#FFFFFF"; ctx.beginPath();
                    ctx.roundRect(bx + 6, bone.y + 12, 22, 10, 4); ctx.fill();
                    ctx.arc(bx + 7, bone.y + 11, 6, 0, Math.PI * 2); ctx.arc(bx + 7, bone.y + 23, 6, 0, Math.PI * 2);
                    ctx.arc(bx + 27, bone.y + 11, 6, 0, Math.PI * 2); ctx.arc(bx + 27, bone.y + 23, 6, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }
    });

    // ③ シールド画像の表示対応
    shieldItems.forEach(shield => {
        if (!shield.collected) {
            let sx = shield.x - cameraX;
            if (sx > -40 && sx < 800) {
                let sImg = imgAssets.items.rockyShield;
                if (sImg && sImg.complete && sImg.naturalWidth !== 0) {
                    ctx.drawImage(sImg, sx, shield.y, shield.width, shield.height);
                } else {
                    ctx.fillStyle = "#10B981"; ctx.beginPath();
                    ctx.moveTo(sx + 20, shield.y); ctx.lineTo(sx + 40, shield.y + 10); ctx.lineTo(sx + 32, shield.y + 32); ctx.lineTo(sx + 20, shield.y + 40); ctx.lineTo(sx + 8, shield.y + 32); ctx.lineTo(sx, shield.y + 10);
                    ctx.fill(); ctx.strokeStyle = "#FFF"; ctx.lineWidth = 2; ctx.stroke();
                }
            }
        }
    });

    // ③ 障害物群の画像表示対応（落とし穴含む）
    obstacles.forEach(obs => {
        if (!obs.active) return;
        let ox = obs.x - cameraX;
        if (ox < -150 || ox > 850) return;

        if (obs.type === 'pit') {
            let pitGrad = ctx.createLinearGradient(ox, obs.y + 5, ox, obs.y + obs.height);
            pitGrad.addColorStop(0, "#1E293B"); pitGrad.addColorStop(0.3, "#0F172A"); pitGrad.addColorStop(1, "#000000");
            ctx.fillStyle = pitGrad;
            ctx.beginPath();
            ctx.ellipse(ox + obs.width / 2, obs.y + 18, obs.width / 2, 14, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = "#000";
            ctx.fillRect(ox + 8, obs.y + 18, obs.width - 16, obs.height);
        } else if (obs.type === 'puddle') {
            let oImg = imgAssets.obstacles[obs.type];
            if (oImg && oImg.complete && oImg.naturalWidth !== 0) {
                ctx.drawImage(oImg, ox, obs.y, obs.width, obs.height);
            } else {
                let pudGrad = ctx.createLinearGradient(ox, obs.y, ox, obs.y + obs.height);
                pudGrad.addColorStop(0, "#3B82F6"); pudGrad.addColorStop(1, "#1D4ED8");
                ctx.fillStyle = pudGrad; ctx.beginPath(); ctx.roundRect(ox, obs.y, obs.width, obs.height, 6); ctx.fill();
            }
        } else if (obs.type === 'spring') {
            ctx.drawImage(imgAssets.items.spring, ox, obs.y, obs.width, obs.height);
        } else if (obs.type === 'bird') {
            ctx.drawImage(imgAssets.obstacles.bird, ox, obs.y, obs.width, obs.height);
        } else {
            // car, moving_car, box, cone, cat などのフォルダ画像読み込み
            let oImg = imgAssets.obstacles[obs.type];
            if (oImg && oImg.complete && oImg.naturalWidth !== 0) {
                ctx.drawImage(oImg, ox, obs.y, obs.width, obs.height);
            } else {
                // 代替図形表現
                if (obs.type === 'box') {
                    ctx.fillStyle = "#D97706"; ctx.fillRect(ox, obs.y, obs.width, obs.height);
                    ctx.strokeStyle = "#78350F"; ctx.lineWidth = 3; ctx.strokeRect(ox + 4, obs.y + 4, obs.width - 8, obs.height - 8);
                } else if (obs.type === 'cone') {
                    ctx.fillStyle = "#F97316"; ctx.beginPath(); ctx.moveTo(ox + obs.width / 2, obs.y); ctx.lineTo(ox + obs.width, obs.y + obs.height - 6); ctx.lineTo(ox, obs.y + obs.height - 6); ctx.fill();
                } else {
                    ctx.fillStyle = "#DC2626"; ctx.fillRect(ox, obs.y, obs.width, obs.height);
                }
            }
        }
    });

    // 弾き飛ばされた障害物
    fallingObstacles.forEach(fo => {
        ctx.save();
        ctx.translate(fo.x - cameraX + fo.width / 2, fo.y + fo.height / 2);
        ctx.rotate(fo.rotation);
        let oImg = imgAssets.obstacles[fo.type];
        if (oImg && oImg.complete && oImg.naturalWidth !== 0) {
            ctx.drawImage(oImg, -fo.width / 2, -fo.height / 2, fo.width, fo.height);
        } else {
            ctx.fillStyle = "rgba(220, 38, 38, 0.6)";
            ctx.fillRect(-fo.width / 2, -fo.height / 2, fo.width, fo.height);
        }
        ctx.restore();
    });

    // スコアドロップクッキー
    droppedCookies.forEach(dc => {
        ctx.save();
        ctx.translate(dc.x - cameraX, dc.y);
        ctx.rotate(dc.rotation);
        let cImg = imgAssets.items.cookie;
        if (cImg && cImg.complete && cImg.naturalWidth !== 0) {
            ctx.drawImage(cImg, -15, -15, 30, 30);
        } else {
            ctx.fillStyle = "#D97706"; ctx.beginPath(); ctx.arc(0, 0, 11, 0, Math.PI * 2); ctx.fill();
        }
        ctx.restore();
    });

    // ゴール：パウステーション
    let goalDrawX = goalX - cameraX;
    if (goalDrawX < 850) {
        ctx.drawImage(imgAssets.items.pawStation, goalDrawX, BASE_GROUND_Y - 160, 200, 260);
    }

    // ③ プレイヤーキャラクターの画像表示対応
    ctx.save();
    let pAnimY = player.y + 50; 
    if (player.invincibleTimer > 0 && Math.floor(gameFrame / 4) % 2 === 0) {
        ctx.globalAlpha = 0.3;
    }

    // 走るアニメーション画像キーの決定
    let pImgKey = "run1";
    if (player.isJumping) {
        pImgKey = "jump";
    } else {
        pImgKey = (Math.floor(gameFrame / 8) % 2 === 0) ? "run1" : "run2";
    }

    let pImg = imgAssets.chars[selectedCharKey][pImgKey];
    if (pImg && pImg.complete && pImg.naturalWidth !== 0) {
        ctx.drawImage(pImg, player.x - cameraX, pAnimY, player.width, player.height);
    } else {
        // 画像未ロード時のフォールバックポリゴン（カラー連動）
        ctx.fillStyle = CHARACTER_CONFIG[selectedCharKey].color;
        ctx.beginPath(); ctx.roundRect(player.x - cameraX, pAnimY, player.width, player.height, 14); ctx.fill();
        ctx.fillStyle = "#FFF"; ctx.fillRect(player.x - cameraX + player.width - 18, pAnimY + 12, 10, 12);
        ctx.fillStyle = "#000"; ctx.fillRect(player.x - cameraX + player.width - 12, pAnimY + 15, 5, 6);
    }

    // ロッキーのバリアエフェクト
    if (hasRockyShield) {
        ctx.strokeStyle = "rgba(16, 185, 129, 0.8)"; ctx.lineWidth = 4;
        ctx.shadowBlur = 10; ctx.shadowColor = "#10B981";
        ctx.beginPath(); ctx.arc(player.x - cameraX + player.width / 2, pAnimY + player.height / 2, player.width * 0.7, 0, Math.PI * 2); ctx.stroke();
        ctx.shadowBlur = 0; 
    }
    ctx.restore();

    // テキストポップアップ
    textPopups.forEach(p => {
        ctx.save(); ctx.globalAlpha = p.alpha;
        ctx.fillStyle = p.color; ctx.font = "bold 16px sans-serif"; ctx.textAlign = "center";
        ctx.fillText(p.text, p.x - cameraX, p.y + 50); ctx.restore();
    });

    // --- ゲームUI（スコア・ライフ・進捗・ポーズ） ---
    ctx.fillStyle = "rgba(255,255,255,0.85)"; ctx.beginPath(); ctx.roundRect(15, 15, 220, 50, 12); ctx.fill();
    ctx.fillStyle = "#1E293B"; ctx.font = "bold 18px sans-serif"; ctx.textAlign = "left";
    ctx.fillText(`🍪 コッシー: ${score}`, 30, 46);

    if (isLifeMode) {
        let heartStr = ""; for (let i = 0; i < 5; i++) heartStr += (i < lives) ? "❤️" : "🖤";
        ctx.font = "14px sans-serif"; ctx.fillText(heartStr, 125, 45);
    } else {
        ctx.font = "bold 14px sans-serif"; ctx.fillStyle = "#10B981"; ctx.fillText("💚 むげんライフ", 125, 45);
    }

    // 進捗ゲージ
    let progressWidth = 240;
    ctx.fillStyle = "rgba(255,255,255,0.6)"; ctx.beginPath(); ctx.roundRect(280, 20, progressWidth, 14, 7); ctx.fill();
    let currentProg = Math.min(player.x / goalX, 1.0);
    ctx.fillStyle = "#3B82F6"; ctx.beginPath(); ctx.roundRect(280, 20, progressWidth * currentProg, 14, 7); ctx.fill();
    ctx.fillStyle = "#1E293B"; ctx.font = "bold 11px sans-serif"; ctx.textAlign = "center";
    ctx.fillText(`ごーるまで ${Math.max(Math.floor((goalX - player.x) / 100), 0)}m`, 280 + progressWidth / 2, 32);

    // ポーズボタンのシンボル
    ctx.fillStyle = "rgba(255,255,255,0.8)"; ctx.beginPath(); ctx.roundRect(pauseButton.x, pauseButton.y, pauseButton.width, pauseButton.height, 10); ctx.fill();
    ctx.fillStyle = "#1E293B"; ctx.fillRect(pauseButton.x + 16, pauseButton.y + 14, 6, 22); ctx.fillRect(pauseButton.x + 28, pauseButton.y + 14, 6, 22);

    // オーバーレイ画面（ポーズ、ゲームオーバー、クリア）
    if (currentState === STATES.PAUSE) {
        ctx.fillStyle = "rgba(0,0,0,0.45)"; ctx.fillRect(0, 0, 800, 400);
        ctx.fillStyle = "#FFF"; ctx.font = "bold 36px sans-serif"; ctx.textAlign = "center"; ctx.fillText("ポーズちゅう", 400, 190);
        ctx.font = "18px sans-serif"; ctx.fillText("タッチすると 再開するよ！", 400, 230);
    } else if (currentState === STATES.GAMEOVER) {
        ctx.fillStyle = "rgba(0,0,0,0.65)"; ctx.fillRect(0, 0, 800, 400);
        ctx.fillStyle = "#EF4444"; ctx.font = "bold 46px sans-serif"; ctx.textAlign = "center"; ctx.fillText("ゲームオーバー", 400, 160);
        ctx.fillStyle = "#FFF"; ctx.font = "bold 20px sans-serif"; ctx.fillText(`あつめたコッシー: ${score}こ`, 400, 210);
        ctx.font = "16px sans-serif"; ctx.fillText("画面をタッチして タイトルへもどる", 400, 260);
    } else if (currentState === STATES.RESULT) {
        ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(0, 0, 800, 400);
        
        // 紙吹雪
        confettiParticles.forEach(p => {
            ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rotation); ctx.fillStyle = p.color;
            ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size); ctx.restore();
        });

        let clearGrad = ctx.createLinearGradient(0, 70, 0, 140);
        clearGrad.addColorStop(0, "#FDE047"); clearGrad.addColorStop(1, "#EAB308");
        ctx.fillStyle = clearGrad; ctx.font = "bold 50px sans-serif"; ctx.textAlign = "center";
        ctx.fillText("🎉 メガクリア！ 🎉", 400, 130);

        ctx.fillStyle = "#FFF"; ctx.font = "bold 24px sans-serif";
        ctx.fillText(`あつめた総数: ${score} コッシー！`, 400, 200);
        ctx.font = "16px sans-serif"; ctx.fillText("タッチして タイトル画面へいく", 400, 270);
    }
}

// --- 入力制御ロジック群 ---
function handleInputStart(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = 800 / rect.width;
    const scaleY = 400 / rect.height;
    const touchX = (clientX - rect.left) * scaleX;
    const touchY = (clientY - rect.top) * scaleY;

    if (!isAudioInitialized) {
        isAudioInitialized = true;
        playBgm(audioAssets.bgmTitle);
    }

    if (currentState === STATES.TITLE) {
        // ランキングボタンクリック判定
        if (touchX >= rankingButton.x && touchX <= rankingButton.x + rankingButton.width &&
            touchY >= rankingButton.y && touchY <= rankingButton.y + rankingButton.height) {
            currentState = STATES.RANKING_VIEW;
            return;
        }
        // ① バッジ図鑑ボタンクリック判定
        if (touchX >= badgeButton.x && touchX <= badgeButton.x + badgeButton.width &&
            touchY >= badgeButton.y && touchY <= badgeButton.y + badgeButton.height) {
            currentState = STATES.BADGE_VIEW;
            return;
        }
        currentState = STATES.CHAR_SELECT;
        showCharPopup = false;
    } 
    else if (currentState === STATES.RANKING_VIEW || currentState === STATES.BADGE_VIEW) {
        // 各種裏画面の「もどる」ボタン判定
        if (touchX >= rankingBackButton.x && touchX <= rankingBackButton.x + rankingBackButton.width &&
            touchY >= rankingBackButton.y && touchY <= rankingBackButton.y + rankingBackButton.height) {
            currentState = STATES.TITLE;
        }
    }
    else if (currentState === STATES.CHAR_SELECT) {
        if (showCharPopup) {
            if (touchX >= popupCloseBtn.x && touchX <= popupCloseBtn.x + popupCloseBtn.width &&
                touchY >= popupCloseBtn.y && touchY <= popupCloseBtn.y + popupCloseBtn.height) {
                showCharPopup = false;
                return;
            }
            if (touchX >= popupSelectBtn.x && touchX <= popupSelectBtn.x + popupSelectBtn.width &&
                touchY >= popupSelectBtn.y && touchY <= popupSelectBtn.y + popupSelectBtn.height) {
                selectedCharKey = popupCharKey;
                showCharPopup = false;
                currentState = STATES.MODE_SELECT;
                return;
            }
            return;
        }

        Object.keys(charButtons).forEach(key => {
            let btn = charButtons[key];
            if (touchX >= btn.x && touchX <= btn.x + btn.width && touchY >= btn.y && touchY <= btn.y + btn.height) {
                popupCharKey = key;
                showCharPopup = true;
            }
        });
    } 
    else if (currentState === STATES.MODE_SELECT) {
        if (touchX >= modeButtons.noLife.x && touchX <= modeButtons.noLife.x + modeButtons.noLife.width &&
            touchY >= modeButtons.noLife.y && touchY <= modeButtons.noLife.y + modeButtons.noLife.height) {
            isLifeMode = false; initGame(); currentState = STATES.PLAY; playBgm(audioAssets.bgmPlay);
        }
        else if (touchX >= modeButtons.withLife.x && touchX <= modeButtons.withLife.x + modeButtons.withLife.width &&
                 touchY >= modeButtons.withLife.y && touchY <= modeButtons.withLife.y + modeButtons.withLife.height) {
            isLifeMode = true; initGame(); currentState = STATES.PLAY; playBgm(audioAssets.bgmPlay);
        }
    } 
    else if (currentState === STATES.PLAY) {
        if (touchX >= pauseButton.x && touchX <= pauseButton.x + pauseButton.width &&
            touchY >= pauseButton.y && touchY <= pauseButton.y + pauseButton.height) {
            currentState = STATES.PAUSE;
            audioAssets.bgmPlay.pause();
            return;
        }
        triggerJumpStart();
    } 
    else if (currentState === STATES.PAUSE) {
        currentState = STATES.PLAY;
        if (isAudioInitialized) audioAssets.bgmPlay.play().catch(e => {});
    } 
    else if (currentState === STATES.RESULT || currentState === STATES.GAMEOVER) {
        currentState = STATES.TITLE; 
        playBgm(audioAssets.bgmTitle);
    }
}

function triggerJumpStart() {
    isInputPressing = true;
    if (!player.isJumping) {
        player.vy = -CHARACTER_CONFIG[selectedCharKey].jumpPower;
        player.isJumping = true;
        jumpCounter = 0;
        playSe(audioAssets.seJump);
    } else {
        if (selectedCharKey === 'skye' && !isHovering) {
            isHovering = true;
            hoverTimer = 75; 
            playSe(audioAssets.seJump);
            addTextPopup(player.x + 20, player.y - 10, "🚀フライングホバー！", "#EC4899");
        }
    }
}

function triggerJumpEnd() {
    isInputPressing = false;
    if (selectedCharKey === 'skye') isHovering = false;
}

window.addEventListener("mousedown", (e) => { handleInputStart(e.clientX, e.clientY); });
window.addEventListener("mouseup", () => { triggerJumpEnd(); });

window.addEventListener("touchstart", (e) => {
    if (currentState !== STATES.CHAR_SELECT && currentState !== STATES.MODE_SELECT) e.preventDefault(); 
    if (e.touches.length > 0) handleInputStart(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: false });
window.addEventListener("touchend", () => { triggerJumpEnd(); });

window.addEventListener("keydown", (e) => {
    if (!isAudioInitialized) isAudioInitialized = true;
    if (e.code === "Space" && currentState === STATES.PLAY) triggerJumpStart();
});
window.addEventListener("keyup", (e) => {
    if (e.code === "Space" && currentState === STATES.PLAY) triggerJumpEnd();
});

// --- 精確なゲームループ設計 ---
let lastTime = performance.now();
let accumulatedTime = 0;
const deltaTimeTarget = 1000 / 60; 

function gameLoop(timestamp) {
    let elapsed = timestamp - lastTime;
    lastTime = timestamp;
    if (elapsed > 100) elapsed = 100; 
    accumulatedTime += elapsed;
    
    while (accumulatedTime >= deltaTimeTarget) {
        update();
        accumulatedTime -= deltaTimeTarget;
    }
    draw();
    requestAnimationFrame(gameLoop);
}
requestAnimationFrame(gameLoop);
</script>
