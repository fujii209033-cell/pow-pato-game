<canvas id="gameCanvas" width="800" height="400"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// 高解像度ディスプレイでのボヤけ・文字ズレを完全に防ぐ特殊処理
function resizeCanvasForRetina() {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    
    canvas.width = 800 * dpr;
    canvas.height = 400 * dpr;
    
    ctx.scale(dpr, dpr);
    
    canvas.style.width = rect.width + "px";
    canvas.style.height = rect.height + "px";
}
window.addEventListener('load', resizeCanvasForRetina);
window.addEventListener('resize', resizeCanvasForRetina);
resizeCanvasForRetina();

// --- ゲームの状態 ---
const STATES = {
    TITLE: 'TITLE',
    CHAR_SELECT: 'CHAR_SELECT',
    MODE_SELECT: 'MODE_SELECT', 
    PLAY: 'PLAY',
    PAUSE: 'PAUSE',
    RESULT: 'RESULT',
    GAMEOVER: 'GAMEOVER',       
    RANKING_VIEW: 'RANKING_VIEW'
};
let currentState = STATES.TITLE;

// --- オーディオアセット ---
const audioAssets = {
    bgmTitle: new Audio("sounds/bgm_title.mp3"),
    bgmPlay: new Audio("sounds/bgm_play.mp3"),
    bgmClear: new Audio("sounds/bgm_clear.mp3"),
    bgmGameover: new Audio("sounds/bgm_gameover.mp3"), 
    seJump: new Audio("sounds/se_jump.mp3"),
    seCookie: new Audio("sounds/se_cookie.mp3"),
    seDamage: new Audio("sounds/se_damage.mp3"),
    sePit: new Audio("sounds/se_pit.mp3"),
    seClear: new Audio("sounds/se_clear.mp3"),
    seHeal: new Audio("sounds/se_heal.mp3")            
};

const UNIFORM_VOLUME = 0.5;
Object.keys(audioAssets).forEach(key => {
    audioAssets[key].volume = UNIFORM_VOLUME;
});

audioAssets.bgmTitle.loop = true;
audioAssets.bgmPlay.loop = true;
audioAssets.bgmClear.loop = true;
audioAssets.bgmGameover.loop = false; 

let currentActiveBgm = null; 
let isAudioInitialized = false; 

function playBgm(targetAudio) {
    audioAssets.bgmTitle.pause(); audioAssets.bgmTitle.currentTime = 0;
    audioAssets.bgmPlay.pause();  audioAssets.bgmPlay.currentTime = 0;
    audioAssets.bgmClear.pause(); audioAssets.bgmClear.currentTime = 0;
    audioAssets.bgmGameover.pause(); audioAssets.bgmGameover.currentTime = 0;
    
    currentActiveBgm = targetAudio;
    
    if (document.visibilityState === 'visible' && currentState !== STATES.PAUSE && isAudioInitialized) {
        targetAudio.play().catch(e => {});
    }
}

function playSe(targetSe) {
    if (!isAudioInitialized) return;
    targetSe.currentTime = 0;
    targetSe.play().catch(e => {});
}

function stopBgmOnHide() {
    if (currentActiveBgm) currentActiveBgm.pause();
}
function resumeBgmOnShow() {
    if (currentActiveBgm && document.visibilityState === 'visible' && currentState !== STATES.PAUSE && isAudioInitialized) {
        currentActiveBgm.play().catch(e => {});
    }
}
document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === 'hidden') stopBgmOnHide();
    else resumeBgmOnShow();
});
window.addEventListener("pagehide", stopBgmOnHide);
window.addEventListener("pageshow", resumeBgmOnShow);

// --- キャラクターの定数定義 ---

    }
};

let selectedCharKey = 'chase'; 
let isLifeMode = true; 

// --- ポップアップ管理変数 ---
let showCharPopup = false;
let popupCharKey = 'chase';
const popupRect = { x: 150, y: 50, width: 500, height: 300 };
const popupCloseBtn = { x: 610, y: 60, width: 30, height: 30 };

let isHovering = false;

// ロッキー用シールド変数
let hasRockyShield = false;

// ラブル用復活回数

// ズーマ用持続ダッシュフラグ

// --- ボタンの配置定義 ---
const pauseButton = { x: 730, y: 15, width: 50, height: 50 };

};

// モード選択ボタン
const modeButtons = {

};

// モード選択画面のSVGボタン

btnImgNoLife.src = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(`

const btnImgWithLife = new Image();
btnImgWithLife.src = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(`

    <text x="155" y="58" font-family="sans-serif" font-weight="bold" font-size="22" fill="#FFFFFF" text-anchor="middle">❤️ ライフあり (5つ)</text>
    <text x="155" y="98" font-family="sans-serif" font-weight="bold" font-size="15" fill="#FFFFFF" text-anchor="middle">(5回ぶつかると ゲームオーバー)</text>
</svg>
`);

// --- 画像アセット ---
const imgAssets = { chars: {}, items: {}, obstacles: {} };
Object.keys(CHARACTER_CONFIG).forEach(charKey => {
    imgAssets.chars[charKey] = {};
    Object.keys(CHARACTER_CONFIG[charKey].images).forEach(imgKey => {
        imgAssets.chars[charKey][imgKey] = new Image();

imgAssets.items.cookie = new Image();
imgAssets.items.cookie.src = "images/cookie.png";
imgAssets.items.bone = new Image();            
imgAssets.items.bone.src = "images/bone.png";
imgAssets.items.pawStation = new Image();
imgAssets.items.pawStation.src = "images/paw_station.png";

imgAssets.items.rockyShield.src = "images/rocky_shield.png";

// 【修正箇所】外部ファイルを読み込まず、安全な内蔵SVGデータに変更してエラーを回避
imgAssets.items.spring = new Image();
imgAssets.items.spring.src = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(`

    <rect x="0" y="0" width="50" height="8" rx="3" fill="#EF4444" />
    <line x1="10" y1="4" x2="20" y2="4" stroke="#FFFFFF" stroke-width="2"/>
    <line x1="30" y1="4" x2="40" y2="4" stroke="#FFFFFF" stroke-width="2"/>
</svg>
`);

const obstacleImages = { car: "images/car.png", moving_car: "images/car.png", box: "images/box.png", cone: "images/cone.png", cat: "images/cat.png", puddle: "images/puddle.png" };
Object.keys(obstacleImages).forEach(key => {
    imgAssets.obstacles[key] = new Image();
    imgAssets.obstacles[key].src = obstacleImages[key];
});

// --- ゲーム変数 ---
let gameFrame = 0; 
let score = 0;
let lives = 5; 

let ranking = [15, 10, 5];
if (localStorage.getItem("paw_game_ranking")) {
    try { ranking = JSON.parse(localStorage.getItem("paw_game_ranking")); } catch(e) { ranking = [15, 10, 5]; }
} else {
    localStorage.setItem("paw_game_ranking", JSON.stringify(ranking));
}

let player = {
    x: 100, y: 240, width: 60, height: 60, vy: 0, 
    gravity: 0.85, isJumping: false, invincibleTimer: 0, speedModifier: 1.0, isFallingInPit: false 
};

let slopePoints = [];
const SLOPE_INTERVAL = 200;
const BASE_GROUND_Y = 240; 

let droppedCookies = []; 
let fallingObstacles = []; 
let bgBuildings = [];
let cookies = [];
let obstacles = [];
let bones = []; 
let shieldItems = []; 
let goalX = 15000; 
let cameraX = 0;

function getGroundY(x) {
    if (x < 0 || x >= goalX - 400) return BASE_GROUND_Y;
    let index = Math.floor(x / SLOPE_INTERVAL);
    if (index >= slopePoints.length - 1) return BASE_GROUND_Y;
    let p1 = slopePoints[index];
    let p2 = slopePoints[index + 1];
    let ratio = (x % SLOPE_INTERVAL) / SLOPE_INTERVAL;
    return p1 + (p2 - p1) * ratio;
}

function initGame() {
    score = 0;
    lives = 5; 
    cameraX = 0;
    player.x = 100;
    player.vy = 0;
    player.isJumping = false;
    player.invincibleTimer = 0;
    player.speedModifier = 1.0;
    player.isFallingInPit = false;
    droppedCookies = [];
    fallingObstacles = [];
    jumpCounter = 0;

    isHovering = false;
    hoverTimer = 0;
    hasRockyShield = (selectedCharKey === 'rocky');
    rubbleRecoveryCount = 0;
    isZumaDashing = false;

    slopePoints = [];
    let numPoints = Math.ceil(goalX / SLOPE_INTERVAL) + 5;
    let lastY = BASE_GROUND_Y;
    for (let i = 0; i < numPoints; i++) {
        if (i < 3 || i > numPoints - 6) {
            slopePoints.push(BASE_GROUND_Y);
        } else {
            let change = (Math.random() - 0.5) * 50;
            let currentY = lastY + change;
            if (currentY < 180) currentY = 180;
            if (currentY > 270) currentY = 270;
            slopePoints.push(currentY);
            lastY = currentY;
        }
    }
    player.y = getGroundY(player.x);

    bgBuildings = [];
    const colors = ["#FCA5A5", "#FECABC", "#FEF08A", "#BBF7D0", "#BFDBFE", "#E9D5FF", "#FBCFE8", "#FDE047", "#A7F3D0", "#93C5FD"];
    const roofTypes = ['flat', 'triangle', 'dome'];
    for (let i = 0; i < 75; i++) {
        bgBuildings.push({
            x: i * 220 + Math.random() * 60,
            width: 100 + Math.random() * 90,
            height: 120 + Math.random() * 140,
            color: colors[Math.floor(Math.random() * colors.length)],
            roof: roofTypes[Math.floor(Math.random() * roofTypes.length)]
        });
    }

    obstacles = [];
    const types = ['car', 'moving_car', 'box', 'cone', 'cat', 'puddle', 'pit', 'spring'];
    for (let i = 0; i < 40; i++) {
        let type = types[Math.floor(Math.random() * types.length)];
        let obsWidth = 50; let obsHeight = 50;
        let ox = 600 + i * 360 + Math.random() * 60;
        let groundY = getGroundY(ox);
        let obsY = groundY;

        if (type === 'car' || type === 'moving_car') { obsWidth = 70; obsHeight = 45; obsY = groundY + 15; }
        else if (type === 'box') { obsWidth = 50; obsHeight = 50; obsY = groundY + 10; }
        else if (type === 'cone') { obsWidth = 40; obsHeight = 45; obsY = groundY + 15; }
        else if (type === 'cat') { obsWidth = 50; obsHeight = 50; obsY = groundY + 10; }
        else if (type === 'puddle') { obsWidth = 70; obsHeight = 15; obsY = groundY + 45; }
        else if (type === 'pit') { obsWidth = 140; obsHeight = 160; obsY = groundY + 60; }
        else if (type === 'spring') { obsWidth = 50; obsHeight = 40; obsY = groundY + 20; }

        obstacles.push({ 
            x: ox, y: obsY, width: obsWidth, height: obsHeight, 
            type: type, active: true, vx: 0, isRunning: false 
        });
    }

    cookies = [];
    bones = []; 
    shieldItems = []; 
    let currentX = 400;
    while (currentX < goalX - 500) {
        currentX += 80 + Math.random() * 140; 
        let nearObs = obstacles.find(obs => Math.abs(obs.x - currentX) < 180);
        let numGroup = Math.floor(Math.random() * 2) + 3; 
        let groupHeightType = Math.random();

        let randItem = Math.random();
        let spawnBone = isLifeMode && (randItem < 0.05);
        
        let spawnShield = false;
        if (!spawnBone && selectedCharKey === 'rocky') {
            if (randItem >= 0.05 && randItem < 0.08) {
                spawnShield = true;
            }
        }

        if (spawnBone) {
            let bx = currentX;
            let groundY = getGroundY(bx);
            let by = groundY - 50;
            bones.push({ x: bx, y: by, width: 35, height: 35, collected: false });
            currentX += 100;
            continue;
        }

        if (spawnShield) {
            let sx = currentX;
            let groundY = getGroundY(sx);
            let sy = groundY - 50;
            shieldItems.push({ x: sx, y: sy, width: 40, height: 40, collected: false });
            currentX += 100;
            continue;
        }

        for (let j = 0; j < numGroup; j++) {
            let cx = currentX + j * 42;
            let groundY = getGroundY(cx);
            let cy = groundY - 45; 

            if (nearObs) {
                if (nearObs.type === 'puddle') cy = groundY - 95;
                else if (nearObs.type === 'pit') cy = groundY - 90;
                else if (nearObs.type === 'spring') cy = groundY - 120; 
                else if (nearObs.type === 'car' || nearObs.type === 'moving_car' || nearObs.type === 'box' || nearObs.type === 'cone') {
                    if (groupHeightType < 0.5) cy = groundY - 155; else cy = groundY - 95;  
                }
            } else {
                if (groupHeightType < 0.4) cy = groundY - 85; 
            }

            if (cy < 350) cookies.push({ x: cx, y: cy, width: 30, height: 30, collected: false });
        }
        currentX += numGroup * 42;
    }
}

function triggerDamage() {
    if (player.invincibleTimer > 0) return; 

    if (hasRockyShield) {
        hasRockyShield = false;
        player.invincibleTimer = 60;
        playSe(audioAssets.seHeal);
        return;
    }

    playSe(audioAssets.seDamage);
    
    if (isLifeMode) {
        lives--;
        if (lives <= 0) { lives = 0; triggerGameOver(); return; }
    }

    if (score > 0) {
        score--; 
        droppedCookies.push({
            x: player.x + player.width / 2, y: player.y + player.height / 2,
            vx: -2 - Math.random() * 3, vy: -7 - Math.random() * 3, 
            gravity: 0.5, rotation: 0, rotSpeed: (Math.random() - 0.5) * 0.2
        });
    }
    player.invincibleTimer = 120; 
}

function triggerPitFall() {
    if (selectedCharKey === 'rubble' && rubbleRecoveryCount < 3) {
        rubbleRecoveryCount++;
        player.isFallingInPit = false;
        player.vy = -14; 
        player.isJumping = true;
        jumpCounter = 0;
        playSe(audioAssets.seJump);
        return;
    }

    playSe(audioAssets.sePit);

    if (isLifeMode) {
        lives--;
        if (lives <= 0) { lives = 0; triggerGameOver(); return; }
    }

    if (player.invincibleTimer === 0 && score > 0) {
        score--;
        droppedCookies.push({
            x: player.x + player.width / 2, y: player.y + player.height / 2,
            vx: -2 - Math.random() * 3, vy: -7 - Math.random() * 3, 
            gravity: 0.5, rotation: 0, rotSpeed: (Math.random() - 0.5) * 0.2
        });
    }
    player.invincibleTimer = 120;
}

function update() {
    if (currentState === STATES.PAUSE || currentState === STATES.GAMEOVER) return;

    gameFrame++;
    if (currentState !== STATES.PLAY) return;

    const charConfig = CHARACTER_CONFIG[selectedCharKey];
    if (player.invincibleTimer > 0) player.invincibleTimer--;

    droppedCookies.forEach(dc => { dc.vy += dc.gravity; dc.x += dc.vx; dc.y += dc.vy; dc.rotation += dc.rotSpeed; });
    droppedCookies = droppedCookies.filter(dc => dc.y < 450);

    fallingObstacles.forEach(fo => { fo.vy += fo.gravity; fo.x += fo.vx; fo.y += fo.vy; fo.rotation += fo.rotSpeed; });
    fallingObstacles = fallingObstacles.filter(fo => fo.y < 450);

    if (player.isFallingInPit) {
        player.vy += 0.8; player.y += player.vy;
        if (player.y > 420) {
            player.isFallingInPit = false;
            player.x = player.pitResetX; 
            player.y = getGroundY(player.x);
            player.vy = 0; player.isJumping = false;
        }
        cameraX = player.x - 100;
        return; 
    }

    player.speedModifier = 1.0; 

    obstacles.forEach(obs => {
        if (obs.type === 'moving_car' && obs.active) {
            if (!obs.isRunning && obs.x - player.x < 600) {
                obs.isRunning = true;
                obs.vx = -3.5; 
            }
            if (obs.isRunning) {
                obs.x += obs.vx;
                obs.y = getGroundY(obs.x) + 15;
            }
        }
    });

    let onPuddle = false;
    obstacles.forEach(obs => {
        if (obs.type === 'puddle' && obs.active) {
            if (player.x + player.width > obs.x && player.x < obs.x + obs.width &&
                player.y + player.height >= obs.y - 5 && player.y + player.height <= obs.y + obs.height + 10) {
                onPuddle = true;
            }
        }
    });

    if (onPuddle) {
        if (selectedCharKey === 'zuma') {
            isZumaDashing = true; 
        } else {
            player.speedModifier = 0.5; 
        }
    }

    if (selectedCharKey === 'zuma' && isZumaDashing) {
        player.speedModifier = 1.5;
    }

    if (selectedCharKey === 'skye' && isHovering) {
        player.vy = 0; 
        hoverTimer--;
        if (hoverTimer <= 0 || !isInputPressing) isHovering = false;
    } else {
        if (player.isJumping && isInputPressing && jumpCounter < charConfig.maxJumpFrames) {
            player.vy -= 0.65 * (1 - (jumpCounter / charConfig.maxJumpFrames));
            jumpCounter++;
        }
    }

    let nextX = player.x + charConfig.baseSpeed * player.speedModifier;
    let targetGroundY = getGroundY(nextX);

    let currentPit = null;
    obstacles.forEach(obs => {
        if (obs.type === 'pit' && obs.active) {
            let playerCenterX = nextX + player.width / 2;
            if (playerCenterX > obs.x + 15 && playerCenterX < obs.x + obs.width - 15) currentPit = obs;
        }
    });

    player.x = nextX;
    if (!(selectedCharKey === 'skye' && isHovering)) player.vy += player.gravity;
    player.y += player.vy;

    if (currentPit) {
        if (player.y >= targetGroundY) {
            player.isFallingInPit = true; player.vy = 4; 
            player.pitResetX = currentPit.x + currentPit.width + 20; 
            triggerPitFall();
            if (currentState === STATES.GAMEOVER) return; 
        }
    } else {
        let currentGroundY = getGroundY(player.x);
        if (player.y >= currentGroundY) {
            player.y = currentGroundY; player.vy = 0; 
            
            if (player.isJumping) {
                player.isJumping = false;
                if (selectedCharKey === 'zuma') isZumaDashing = false; 
            }
            isHovering = false;
        }
    }

    cameraX = player.x - 100;

    cookies.forEach(cookie => {
        if (!cookie.collected &&
            player.x < cookie.x + cookie.width && player.x + player.width > cookie.x &&
            player.y < cookie.y + cookie.height && player.y + player.height > cookie.y) {
            cookie.collected = true; score++; playSe(audioAssets.seCookie);
        }
    });

    bones.forEach(bone => {
        if (!bone.collected &&
            player.x < bone.x + bone.width && player.x + player.width > bone.x &&
            player.y < bone.y + bone.height && player.y + player.height > bone.y) {
            bone.collected = true; playSe(audioAssets.seHeal); if (lives < 5) lives++; 
        }
    });

    shieldItems.forEach(shield => {
        if (!shield.collected &&
            player.x < shield.x + shield.width && player.x + player.width > shield.x &&
            player.y < shield.y + shield.height && player.y + player.height > shield.y) {
            shield.collected = true; 
            playSe(audioAssets.seHeal);
            
            if (selectedCharKey === 'rocky') {
                hasRockyShield = true; 
            } else {
                score += 3; 
            }
        }
    });

    obstacles.forEach(obs => {
        if (!obs.active || obs.type === 'pit' || currentState === STATES.GAMEOVER) return;

        let isColliding = player.x < obs.x + obs.width && player.x + player.width > obs.x &&
                          player.y < obs.y + obs.height && player.y + player.height > obs.y;
        if (!isColliding) return;

        if (obs.type === 'spring') {
            if (player.vy > 0 && player.y + player.height - player.vy <= obs.y + 15) {
                player.y = obs.y - player.height;
                if (selectedCharKey === 'marshall') {
                    player.vy = -20.5;
                } else {
                    player.vy = -16.5;
                }
                player.isJumping = true;
                jumpCounter = charConfig.maxJumpFrames;
                playSe(audioAssets.seJump);
            }
            return;
        }

        if (obs.type === 'car' || obs.type === 'moving_car' || obs.type === 'box' || obs.type === 'cone') {
            if (player.vy > 0 && player.y + player.height - player.vy <= obs.y + 20) {
                player.y = obs.y - player.height;
                
                if (selectedCharKey === 'marshall') {
                    player.vy = -17.5; 
                } else {
                    player.vy = -14.5; 
                }
                
                player.isJumping = true;
                jumpCounter = charConfig.maxJumpFrames; 
                launchObstacleEffect(obs); 
                playSe(audioAssets.seJump); 
            } else {
                if (player.invincibleTimer === 0) { 
                    triggerDamage(); 
                    if (obs.active && !hasRockyShield) launchObstacleEffect(obs); 
                }
            }
        } else if (obs.type === 'cat') {
            if (player.invincibleTimer === 0) { 
                triggerDamage(); 
                if (obs.active && !hasRockyShield) launchObstacleEffect(obs); 
            }
        }
    });

    if (player.x >= goalX && currentState === STATES.PLAY) endGame();
}

function triggerJumpStart() {
    if (player.isFallingInPit) return;

    if (selectedCharKey === 'skye' && player.isJumping && !isHovering) {
        isHovering = true; hoverTimer = 55; isInputPressing = true; playSe(audioAssets.seJump); return;
    }

    if (!player.isJumping) {
        const charConfig = CHARACTER_CONFIG[selectedCharKey];
        player.vy = -charConfig.jumpPower; player.isJumping = true; jumpCounter = 0; isInputPressing = true; playSe(audioAssets.seJump);
    }
}

function triggerJumpEnd() {
    isInputPressing = false;
    if (selectedCharKey === 'skye') isHovering = false;
}

function triggerGameOver() {
    currentState = STATES.GAMEOVER; playBgm(audioAssets.bgmGameover);
}

function launchObstacleEffect(obs) {
    obs.active = false;
    fallingObstacles.push({
        type: obs.type, x: obs.x, y: obs.y, width: obs.width, height: obs.height,
        vx: 4 + Math.random() * 4, vy: -10 - Math.random() * 5, 
        gravity: 0.6, rotation: 0, rotSpeed: 0.25 + Math.random() * 0.25
    });
}

function endGame() {
    playSe(audioAssets.seClear);
    ranking.push(score); ranking.sort((a, b) => b - a); ranking = ranking.slice(0, 3);
    localStorage.setItem("paw_game_ranking", JSON.stringify(ranking));
    currentState = STATES.RESULT; playBgm(audioAssets.bgmClear);
}

// --- 描画処理 ---
function draw() {
    ctx.clearRect(0, 0, 800, 400); 
    if (currentState === STATES.TITLE) drawTitleScreen();
    else if (currentState === STATES.CHAR_SELECT) drawCharSelectScreen();
    else if (currentState === STATES.MODE_SELECT) drawModeSelectScreen(); 
    else if (currentState === STATES.PLAY || currentState === STATES.PAUSE) drawPlayScreen(); 
    else if (currentState === STATES.RESULT) drawResultScreen();
    else if (currentState === STATES.GAMEOVER) drawGameOverScreen();       
    else if (currentState === STATES.RANKING_VIEW) drawRankingViewScreen();
}

    drawCloud(80, 100, 1.0); drawCloud(620, 80, 1.2); drawCloud(340, 60, 0.7);

function drawPlayScreen() {
    ctx.fillStyle = "#87CEEB"; ctx.fillRect(0, 0, 800, 400);

    ctx.save(); ctx.translate(-cameraX * 0.3, 0);
    bgBuildings.forEach(b => {
        let baseFloorY = BASE_GROUND_Y + 60; ctx.fillStyle = b.color;
        ctx.fillRect(b.x, baseFloorY - b.height, b.width, b.height);
        
        ctx.fillStyle = "rgba(255, 255, 255, 0.75)";
        let winRows = Math.floor(b.height / 40) - 1; let winCols = Math.floor(b.width / 35);
        for (let r = 0; r < winRows; r++) {
            for (let c = 0; c < winCols; c++) {
                let wx = b.x + 12 + c * 32; let wy = (baseFloorY - b.height) + 15 + r * 35;
                if (wx + 16 < b.x + b.width) ctx.fillRect(wx, wy, 16, 18);
            }
        }
        if (b.roof === 'triangle') {
            ctx.fillStyle = "#E11D48"; ctx.beginPath(); ctx.moveTo(b.x - 8, baseFloorY - b.height); ctx.lineTo(b.x + b.width / 2, baseFloorY - b.height - 35); ctx.lineTo(b.x + b.width + 8, baseFloorY - b.height); ctx.closePath(); ctx.fill();
        } else if (b.roof === 'dome') {
            ctx.fillStyle = "#1D4ED8"; ctx.beginPath(); ctx.arc(b.x + b.width / 2, baseFloorY - b.height, b.width / 2.5, Math.PI, 0); ctx.fill();
        }
    });
    ctx.restore();
    
    ctx.save(); ctx.translate(-cameraX, 0);

    ctx.fillStyle = "#22C55E"; ctx.beginPath();
    let startCamX = Math.max(0, cameraX - 100); let endCamX = cameraX + 800 + 100;
    ctx.moveTo(startCamX, 400);
    for (let x = startCamX; x <= endCamX; x += 5) {
        let inPit = false;
        obstacles.forEach(obs => { if (obs.type === 'pit' && obs.active && x >= obs.x && x <= obs.x + obs.width) inPit = true; });
        if (inPit) ctx.lineTo(x, 400); else ctx.lineTo(x, getGroundY(x) + 60);
    }
    ctx.lineTo(endCamX, 400); ctx.closePath(); ctx.fill();

    obstacles.forEach(obs => { if (obs.type === 'pit' && obs.active) { ctx.fillStyle = "#78350F"; ctx.fillRect(obs.x - 3, getGroundY(obs.x) + 60, 4, 150); ctx.fillRect(obs.x + obs.width - 1, getGroundY(obs.x + obs.width) + 60, 4, 150); } });

    obstacles.forEach(obs => {
        if (!obs.active || obs.type === 'pit') return;
        
        if (obs.type === 'spring') {
            let springImg = imgAssets.items.spring;
            if (springImg && springImg.complete) {
                ctx.drawImage(springImg, obs.x, obs.y, obs.width, obs.height);
            } else {
                ctx.fillStyle = "#EF4444";
                ctx.fillRect(obs.x, obs.y + 15, obs.width, obs.height - 15);
                ctx.fillStyle = "#FFFFFF";
                ctx.fillRect(obs.x, obs.y + 10, obs.width, 5);
            }
        } else {
            let obsImg = imgAssets.obstacles[obs.type]; 
            if (obsImg && obsImg.complete) ctx.drawImage(obsImg, obs.x, obs.y, obs.width, obs.height);
        }
    });

    cookies.forEach(cookie => { if (!cookie.collected) { let cookieImg = imgAssets.items.cookie; if (cookieImg && cookieImg.complete) ctx.drawImage(cookieImg, cookie.x, cookie.y, cookie.width, cookie.height); } });
    bones.forEach(bone => { if (!bone.collected) { let boneImg = imgAssets.items.bone; if (boneImg && boneImg.complete) ctx.drawImage(boneImg, bone.x, bone.y, bone.width, bone.height); } });
    
    shieldItems.forEach(shield => { 
        if (!shield.collected) { 
            let sImg = imgAssets.items.rockyShield; 
            let animY = shield.y + Math.sin(gameFrame * 0.08) * 5;
            if (sImg && sImg.complete) ctx.drawImage(sImg, shield.x, animY, shield.width, shield.height); 
        } 
    });

    droppedCookies.forEach(dc => { ctx.save(); ctx.translate(dc.x, dc.y); ctx.rotate(dc.rotation); let cookieImg = imgAssets.items.cookie; if (cookieImg && cookieImg.complete) ctx.drawImage(cookieImg, -15, -15, 30, 30); ctx.restore(); });
    fallingObstacles.forEach(fo => { ctx.save(); ctx.translate(fo.x + fo.width / 2, fo.y + fo.height / 2); ctx.rotate(fo.rotation); let obsImg = imgAssets.obstacles[fo.type]; if (obsImg && obsImg.complete) ctx.drawImage(obsImg, -fo.width / 2, -fo.height / 2, fo.width, fo.height); ctx.restore(); });

    let stationImg = imgAssets.items.pawStation; if (stationImg && stationImg.complete) ctx.drawImage(stationImg, goalX, getGroundY(goalX) - 140, 150, 200);

    let shouldDrawPlayer = true; if (player.invincibleTimer > 0 && Math.floor(player.invincibleTimer / 4) % 2 === 0) shouldDrawPlayer = false;
    if (shouldDrawPlayer) {
        let activeImgKey = 'run1'; 
        if (player.isFallingInPit || player.isJumping || isHovering) activeImgKey = 'jump';
        else activeImgKey = (Math.floor(gameFrame / 10) % 2 === 0) ? 'run1' : 'run2';
        
        let pImg = imgAssets.chars[selectedCharKey][activeImgKey];
        if (pImg && pImg.complete) ctx.drawImage(pImg, player.x, player.y, player.width, player.height);

        if (hasRockyShield) {
            let sImg = imgAssets.items.rockyShield;
            if (sImg && sImg.complete) {
                ctx.drawImage(sImg, player.x - 10, player.y - 10, player.width + 20, player.height + 20);
            } else {
                ctx.strokeStyle = "rgba(16, 185, 129, 0.6)"; ctx.lineWidth = 4; ctx.beginPath();
                ctx.arc(player.x + player.width/2, player.y + player.height/2, player.width/1.3, 0, Math.PI*2); ctx.stroke();
            }
        }

        if (selectedCharKey === 'zuma' && isZumaDashing) {
            ctx.fillStyle = "rgba(30, 144, 255, 0.5)";
            for (let i = 0; i < 3; i++) {
                let px = player.x - 10 - (gameFrame % 20) + (i * 10);
                let py = player.y + player.height - 10 + (Math.sin(gameFrame + i) * 4);
                ctx.beginPath(); ctx.arc(px, py, 6, 0, Math.PI * 2); ctx.fill();
            }
        }
    }
    ctx.restore();

    let uiCookieImg = imgAssets.items.cookie; if (uiCookieImg && uiCookieImg.complete) { ctx.drawImage(uiCookieImg, 20, 15, 30, 30); ctx.fillStyle = "#FFFFFF"; ctx.font = "bold 26px sans-serif"; ctx.textAlign = "left"; ctx.textBaseline = "alphabetic"; ctx.fillText(`× ${score}`, 60, 40); }

    if (isLifeMode) {
        let heartX = 170;
        for (let i = 0; i < 5; i++) {
            ctx.font = "26px sans-serif"; if (i < lives) ctx.fillText("❤️", heartX + i * 32, 40); else ctx.fillText("🖤", heartX + i * 32, 40); 
        }
    } else {
        ctx.fillStyle = "rgba(255, 255, 255, 0.8)"; ctx.font = "bold 18px sans-serif"; ctx.textAlign = "left"; ctx.fillText("💚 あんしんモード", 170, 38);
    }

    ctx.fillStyle = "rgba(255, 255, 255, 0.6)"; ctx.beginPath(); ctx.roundRect(pauseButton.x, pauseButton.y, pauseButton.width, pauseButton.height, 12); ctx.fill();
    ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.fillStyle = "#1E293B"; ctx.font = "bold 20px sans-serif"; ctx.fillText("⏸️", pauseButton.x + (pauseButton.width / 2), pauseButton.y + (pauseButton.height / 2) + 2);
    ctx.textBaseline = "alphabetic";

    if (currentState === STATES.PAUSE) {
        ctx.fillStyle = "rgba(0, 0, 0, 0.4)"; ctx.fillRect(0, 0, 800, 400); ctx.fillStyle = "#FFFFFF"; ctx.font = "bold 36px sans-serif"; ctx.textAlign = "center"; ctx.fillText("いちじちゅうだん", 400, 200);
    }
}

// --- 入力イベント処理 ---
function handleInputStart(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    const clickX = (clientX - rect.left) * (800 / rect.width);
    const clickY = (clientY - rect.top) * (400 / rect.height);

    if (!isAudioInitialized) isAudioInitialized = true;

    if (currentState === STATES.TITLE) {
        if (clickX >= rankingButton.x && clickX <= rankingButton.x + rankingButton.width &&
            clickY >= rankingButton.y && clickY <= rankingButton.y + rankingButton.height) {
            currentState = STATES.RANKING_VIEW; playBgm(audioAssets.bgmTitle); return;
        }
        currentState = STATES.CHAR_SELECT; playBgm(audioAssets.bgmTitle);
    } else if (currentState === STATES.RANKING_VIEW) {
        if (clickX >= rankingBackButton.x && clickX <= rankingBackButton.x + rankingBackButton.width &&
            clickY >= rankingBackButton.y && clickY <= rankingBackButton.y + rankingBackButton.height) {
            currentState = STATES.TITLE;
        }
    } else if (currentState === STATES.CHAR_SELECT) {
        if (showCharPopup) {
            if (clickX >= popupCloseBtn.x && clickX <= popupCloseBtn.x + popupCloseBtn.width &&
                clickY >= popupCloseBtn.y && clickY <= popupCloseBtn.y + popupCloseBtn.height) {
                showCharPopup = false;
                playSe(audioAssets.seCookie);
                return;
            }
            if (clickX >= popupSelectBtn.x && clickX <= popupSelectBtn.x + popupSelectBtn.width &&
                clickY >= popupSelectBtn.y && clickY <= popupSelectBtn.y + popupSelectBtn.height) {
                selectedCharKey = popupCharKey;
                showCharPopup = false;
                currentState = STATES.MODE_SELECT;
                playSe(audioAssets.seJump);
                return;
            }
            if (clickX < popupRect.x || clickX > popupRect.x + popupRect.width ||
                clickY < popupRect.y || clickY > popupRect.y + popupRect.height) {
                showCharPopup = false;
                return;
            }
            return;
        }

        Object.keys(charButtons).forEach(key => {
            let btn = charButtons[key];
            if (clickX >= btn.x && clickX <= btn.x + btn.width &&
                clickY >= btn.y && clickY <= btn.y + btn.height) {
                popupCharKey = key;
                showCharPopup = true;
                playSe(audioAssets.seCookie);
            }
        });
    } else if (currentState === STATES.MODE_SELECT) {
        if (clickX >= modeButtons.noLife.x && clickX <= modeButtons.noLife.x + modeButtons.noLife.width &&
            clickY >= modeButtons.noLife.y && clickY <= modeButtons.noLife.y + modeButtons.noLife.height) {
            isLifeMode = false; initGame(); currentState = STATES.PLAY; playBgm(audioAssets.bgmPlay);
        } else if (clickX >= modeButtons.withLife.x && clickX <= modeButtons.withLife.x + modeButtons.withLife.width &&
                   clickY >= modeButtons.withLife.y && clickY <= modeButtons.withLife.y + modeButtons.withLife.height) {
            isLifeMode = true; initGame(); currentState = STATES.PLAY; playBgm(audioAssets.bgmPlay);
        }
    } else if (currentState === STATES.PLAY) {
        if (clickX >= pauseButton.x && clickX <= pauseButton.x + pauseButton.width &&
            clickY >= pauseButton.y && clickY <= pauseButton.y + pauseButton.height) {
            currentState = STATES.PAUSE; if (currentActiveBgm) currentActiveBgm.pause(); return;
        }
        triggerJumpStart(); 
    } else if (currentState === STATES.PAUSE) {
        currentState = STATES.PLAY; if (currentActiveBgm) currentActiveBgm.play().catch(e => {});
    } else if (currentState === STATES.RESULT || currentState === STATES.GAMEOVER) {
        currentState = STATES.TITLE; playBgm(audioAssets.bgmTitle);
    }
}

window.addEventListener("mousedown", (e) => { handleInputStart(e.clientX, e.clientY); });
window.addEventListener("mouseup", () => { triggerJumpEnd(); });

window.addEventListener("touchstart", (e) => {
    if (currentState !== STATES.CHAR_SELECT && currentState !== STATES.MODE_SELECT) e.preventDefault(); 
    if (e.touches.length > 0) handleInputStart(e.touches[0].clientX, e.touches[0].clientY);
}, { passive: false });
window.addEventListener("touchend", () => { triggerJumpEnd(); });

window.addEventListener("keydown", (e) => {
    if (!isAudioInitialized) isAudioInitialized = true;
    if (e.code === "Space" && currentState === STATES.PLAY) triggerJumpStart();
});
window.addEventListener("keyup", (e) => {
    if (e.code === "Space" && currentState === STATES.PLAY) triggerJumpEnd();
});

let lastTime = performance.now();
let accumulatedTime = 0;
const deltaTimeTarget = 1000 / 60; 

function gameLoop(timestamp) {
    let elapsed = timestamp - lastTime;
    lastTime = timestamp;
    if (elapsed > 100) elapsed = 100; 
    accumulatedTime += elapsed;
    while (accumulatedTime >= deltaTimeTarget) {
        update();
        accumulatedTime -= deltaTimeTarget;
    }
    draw();
    requestAnimationFrame(gameLoop);
}
requestAnimationFrame(gameLoop);
</script>
