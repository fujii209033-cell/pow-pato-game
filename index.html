<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>チェイスのパウパト・アクション（全機能統合完全版）</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        body { margin: 0; padding: 0; background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; width: 100vw; overflow: hidden; position: relative; touch-action: none; }
        canvas { background-color: #87CEEB; box-shadow: 0 4px 8px rgba(0,0,0,0.5); max-width: 100%; max-height: 100%; object-fit: contain; }
        .menu-container { position: absolute; display: flex; gap: 20px; top: 65%; left: 50%; transform: translateX(-50%); z-index: 10; }
        .mode-btn { padding: 12px 24px; font-size: 18px; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; box-shadow: 0 4px 0 #999; transition: 0.1s; white-space: nowrap; }
        .mode-btn:active { transform: translateY(4px); box-shadow: none; }
        #easyBtn { background-color: #4ADE80; color: white; box-shadow: 0 4px 0 #166534; }
        #hardBtn { background-color: #F87171; color: white; box-shadow: 0 4px 0 #991B1B; }
    </style>
</head>
<body>
    <div class="menu-container" id="menuContainer">
        <button class="mode-btn" id="easyBtn" onclick="startGame('easy')">かんたん</button>
        <button class="mode-btn" id="hardBtn" onclick="startGame('hard')">むずかしい</button>
    </div>
    <canvas id="gameCanvas" width="800" height="400"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// --- 画像・音声ロード ---
const chaseFrames = [new Image(), new Image(), new Image()];
chaseFrames[0].src = "images/chase_run1.png"; chaseFrames[1].src = "images/chase_run2.png"; chaseFrames[2].src = "images/chase_jump.png";
const bgImg = new Image(); bgImg.src = "images/background.png";

// --- ゲーム定数・変数 ---
const STAGE_WIDTH = 16000;
const GROUND_Y = 320;
let gameStarted = false, isCleared = false, isGameOver = false, scrollX = 0, score = 0;
let chase = { x: 100, y: 200, vy: 0, width: 50, height: 50, isGrounded: false };
let obstacles = [], chaseRotation = 0, isBackflipping = false;

function initGame() {
    scrollX = 0; score = 0; isCleared = false; isGameOver = false; chaseRotation = 0; isBackflipping = false;
    chase.y = 200; chase.vy = 0;
    obstacles = [];
    for (let i = 500; i < STAGE_WIDTH - 500; i += 300) {
        obstacles.push({ x: i, y: GROUND_Y - 40, width: 60, height: 40, isDefeated: false });
    }
}

function getGroundY(x) {
    // 地形生成ロジック：必要に応じてここを拡張
    return GROUND_Y;
}

function startGame(mode) {
    initGame(); gameStarted = true;
    document.getElementById("menuContainer").style.display = "none";
    gameLoop();
}

function gameLoop() {
    if (!gameStarted) return;
    
    // 物理演算と移動
    if (!isCleared) {
        scrollX += 5;
        chase.vy += 0.85; // 重力
        chase.y += chase.vy;
        
        // 接地判定（坂道・通常地面対応）
        let ground = getGroundY(chase.x + scrollX);
        if (chase.y + 50 >= ground - 5) { 
            chase.y = ground - 50; chase.vy = 0; chase.isGrounded = true; 
        } else {
            chase.isGrounded = false;
        }

        // 障害物・ゴール判定
        obstacles.forEach(o => {
            if (!o.isDefeated && chase.x < o.x - scrollX + 60 && chase.x + 50 > o.x - scrollX && chase.vy > 0) {
                o.isDefeated = true; chase.vy = -15; score++;
            }
        });
        if (scrollX > STAGE_WIDTH - 800) isCleared = true;
    } else {
        // クリア時のバク宙演出
        if (!isBackflipping) { isBackflipping = true; chase.vy = -12; }
        chase.vy += 0.85; chase.y += chase.vy;
        chaseRotation -= 0.15;
        if (chase.y + 50 >= GROUND_Y) { chase.y = GROUND_Y - 50; chase.vy = 0; chaseRotation = 0; }
    }

    // 描画処理
    ctx.clearRect(0, 0, 800, 400);
    ctx.fillStyle = "#87CEEB"; ctx.fillRect(0, 0, 800, 400); // 背景
    ctx.fillStyle = "#228B22"; ctx.fillRect(0, GROUND_Y, 800, 80); // 地面
    
    // 障害物描画
    obstacles.forEach(o => { if(!o.isDefeated) ctx.fillRect(o.x - scrollX, o.y, 60, 40); });

    // チェイス描画（バク宙対応）
    ctx.save();
    ctx.translate(chase.x + 25, chase.y + 25);
    ctx.rotate(chaseRotation);
    ctx.drawImage(chaseFrames[chase.isGrounded ? 0 : 2], -25, -25, 50, 50);
    ctx.restore();

    ctx.fillStyle = "black"; ctx.font = "20px Arial"; ctx.fillText("ほねクッキー: " + score, 50, 50);

    requestAnimationFrame(gameLoop);
}

window.addEventListener("mousedown", () => { if(chase.isGrounded) { chase.vy = -12; chase.isGrounded = false; }});
</script>
</body>
</html>
