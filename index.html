<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>チェイスのパウパト・アクション（フル機能統合版）</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        body { margin: 0; padding: 0; background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; width: 100vw; overflow: hidden; position: relative; touch-action: none; }
        canvas { background-color: #87CEEB; box-shadow: 0 4px 8px rgba(0,0,0,0.5); max-width: 100%; max-height: 100%; object-fit: contain; }
        .menu-container { position: absolute; display: flex; gap: 20px; top: 65%; left: 50%; transform: translateX(-50%); z-index: 10; }
        .mode-btn { padding: 12px 24px; font-size: 18px; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; box-shadow: 0 4px 0 #999; transition: 0.1s; white-space: nowrap; }
        .mode-btn:active { transform: translateY(4px); box-shadow: none; }
        #easyBtn { background-color: #4ADE80; color: white; box-shadow: 0 4px 0 #166534; }
        #hardBtn { background-color: #F87171; color: white; box-shadow: 0 4px 0 #991B1B; }
    </style>
</head>
<body>
    <div class="menu-container" id="menuContainer">
        <button class="mode-btn" id="easyBtn" onclick="startGame('easy')">かんたん</button>
        <button class="mode-btn" id="hardBtn" onclick="startGame('hard')">むずかしい</button>
    </div>
    <canvas id="gameCanvas" width="800" height="400"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// 音声・画像素材の初期化
const bgm = new Audio("audio/bgm.mp3"); bgm.loop = true;
const seJump = new Audio("audio/jump.mp3");
const seItem = new Audio("audio/item.mp3");
const seHit = new Audio("audio/hit.mp3");
const seClear = new Audio("audio/clear.mp3");
const seGameOver = new Audio("audio/gameover.mp3");

const chaseFrames = [new Image(), new Image(), new Image()];
chaseFrames[0].src = "images/chase_run1.png"; chaseFrames[1].src = "images/chase_run2.png"; chaseFrames[2].src = "images/chase_jump.png";

const STAGE_WIDTH = 16000;
const TILE_SIZE = 40;
const GROUND_Y_LINE = 320;

let score, gameStarted = false, scrollX = 0, obstacles = [], items = [], chaseRotation = 0, isBackflipping = false;
const chase = { x: 100, y: 200, width: 50, height: 50, vy: 0, gravity: 0.85, isGrounded: false };

function initGame() {
    score = 0; scrollX = 0; chaseRotation = 0; isBackflipping = false;
    obstacles = Array.from({length: 50}, (_, i) => ({
        x: 500 + i * 300, y: GROUND_Y_LINE - 40, width: 70, height: 40, stompatble: true, isDefeated: false
    }));
}

function getGroundYAt(x) { return GROUND_Y_LINE; }

function startGame(mode) {
    initGame(); gameStarted = true;
    document.getElementById("menuContainer").style.display = "none";
    bgm.play(); gameLoop();
}

function gameLoop() {
    if (!gameStarted) return;
    
    // 物理演算
    if (gameStarted && !isBackflipping) {
        scrollX += 5;
        chase.vy += chase.gravity;
        chase.y += chase.vy;
        if (chase.y + 50 >= GROUND_Y_LINE) { chase.y = GROUND_Y_LINE - 50; chase.vy = 0; chase.isGrounded = true; }
        
        // 車踏みつけ判定
        obstacles.forEach(obs => {
            if (!obs.isDefeated && chase.x < obs.x - scrollX + 70 && chase.x + 50 > obs.x - scrollX && chase.vy > 0) {
                obs.isDefeated = true; chase.vy = -15; seItem.play();
            }
        });
        if (scrollX > STAGE_WIDTH - 800) isBackflipping = true;
    } else if (isBackflipping) {
        chase.vy += chase.gravity; chase.y += chase.vy; chaseRotation -= 0.15;
        if (chase.y + 50 >= GROUND_Y_LINE) { chase.y = GROUND_Y_LINE - 50; chase.vy = 0; chaseRotation = 0; }
    }

    // 描画
    ctx.clearRect(0, 0, 800, 400);
    ctx.fillStyle = "#87CEEB"; ctx.fillRect(0,0,800,400); // 空
    ctx.fillStyle = "#228B22"; ctx.fillRect(0, GROUND_Y_LINE, 800, 80); // 地面
    
    // 車描画
    obstacles.forEach(o => { if(!o.isDefeated) ctx.fillRect(o.x - scrollX, o.y, 70, 40); });

    // チェイス描画
    ctx.save();
    ctx.translate(chase.x + 25, chase.y + 25);
    ctx.rotate(chaseRotation);
    ctx.drawImage(chaseFrames[chase.isGrounded ? 0 : 2], -25, -25, 50, 50);
    ctx.restore();

    requestAnimationFrame(gameLoop);
}

window.addEventListener("mousedown", () => { if(chase.isGrounded) { chase.vy = -12; seJump.play(); } });
</script>
</body>
</html>
