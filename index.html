<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>チェイスのパウパト・アクション（疑似3D版）</title>
    <style>
        body { margin: 0; background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; position: relative; }
        canvas { background-color: #87CEEB; box-shadow: 0 4px 8px rgba(0,0,0,0.5); max-width: 100%; max-height: 100%; object-fit: contain; }
        .menu-container { position: absolute; display: flex; gap: 20px; top: 60%; }
        .mode-btn { padding: 15px 30px; font-size: 20px; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; box-shadow: 0 4px 0 #999; transition: 0.1s; }
        .mode-btn:active { transform: translateY(4px); box-shadow: none; }
        #easyBtn { background-color: #4ADE80; color: white; box-shadow: 0 4px 0 #166534; }
        #hardBtn { background-color: #F87171; color: white; box-shadow: 0 4px 0 #991B1B; }
    </style>
</head>
<body>

    <div class="menu-container" id="menuContainer">
        <button class="mode-btn" id="easyBtn" onclick="startGame('easy')">かんたん（0さい〜）</button>
        <button class="mode-btn" id="hardBtn" onclick="startGame('hard')">むずかしい（ライフ3つ）</button>
    </div>

    <canvas id="gameCanvas" width="800" height="400"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// ==========================================
// 🎵 1. オーディオ設定（前回のまま）
// ==========================================
// const bgm = new Audio("audio/bgm.mp3"); ... (省略)

// ==========================================
// 🖼️ 2. グラフィック設定
// ==========================================
const bgImg = new Image(); bgImg.src = "images/background.png";
const goalImg = new Image(); goalImg.src = "images/paw_station.png";
const itemImg = new Image(); itemImg.src = "images/cookie.png";
const chaseFrames = [new Image(), new Image(), new Image()];
chaseFrames[0].src = "images/chase_run1.png";
chaseFrames[1].src = "images/chase_run2.png";
chaseFrames[2].src = "images/chase_jump.png";

const obstacleTypes = [
    { src: "images/cat.png", width: 45, height: 40 },
    { src: "images/puddle.png", width: 60, height: 15 },
    { src: "images/box.png", width: 40, height: 40 }
];
obstacleTypes.forEach(obs => { obs.img = new Image(); obs.img.src = obs.src; });

// ==========================================
// 🎮 3. ゲームデータと定数（3D改造）
// ==========================================
const STAGE_WIDTH = 4000; 
const TILE_SIZE = 40;
const BASE_GROUND_Y = 340; 
const HORIZON_Y = 220; // 🆕 消滅点（地平線）のY座標

let score, isCleared, isGameOver, gameStarted = false, animeFrame = 0, gameMode = 'easy', lives;
let scrollX = 0, map = [], obstacles = [], items = [], invincibleTimer = 0, cityBuildings = [];

const chase = { x: 100, y: 200, width: 50, height: 50, vy: 0, gravity: 0.6, jumpPower: -12, isGrounded: false };
const goal = { x: STAGE_WIDTH - 200, y: 140, width: 120, height: 200 }; 

function initGame() {
    score = 0; isCleared = false; isGameOver = false; lives = 3; scrollX = 0; animeFrame = 0; invincibleTimer = 0;
    chase.x = 100; chase.y = BASE_GROUND_Y - chase.height; chase.vy = 0; chase.isGrounded = true;
    map = Array(STAGE_WIDTH / TILE_SIZE).fill(0);
    for(let i = 0; i < map.length; i++) {
        if(i > 15 && i < map.length - 15) {
            if (i % 28 === 0) { map[i] = 2; map[i+1] = 2; map[i+2] = 2; map[i+3] = 4; map[i+4] = 4; map[i+5] = 4; map[i+6] = 3; map[i+7] = 3; map[i+8] = 3; i += 8; } 
            else if (i % 18 === 0) { map[i] = 1; map[i+1] = 1; i += 1; }
            else if (i % 13 === 0) { for (let r = 0; r < 5; r++) { map[i + r] = 5; } i += 4; }
        }
    }
    // (省略: 障害物・アイテム・街並みの配置ロジックは前のまま)
}

function getGroundYAt(absoluteX) {
    if (absoluteX < 0 || absoluteX >= STAGE_WIDTH) return BASE_GROUND_Y;
    let tileIdx = Math.floor(absoluteX / TILE_SIZE);
    let ratio = (absoluteX % TILE_SIZE) / TILE_SIZE; 
    let hL = getTileHeightForPosition(tileIdx, ratio);
    return BASE_GROUND_Y - hL;
}

function getTileHeightForPosition(idx, ratio) {
    let type = map[idx];
    if (type === 1) return -100; if (type === 4) return 60;   
    if (type === 0 || type === 5) return 0;
    if (type === 2) { let startIdx = idx; while(startIdx > 0 && map[startIdx-1] === 2) startIdx--; return ((idx - startIdx) + ratio) / 3 * 60; }
    if (type === 3) { let startIdx = idx; while(startIdx > 0 && map[startIdx-1] === 3) startIdx--; return 60 - (((idx - startIdx) + ratio) / 3 * 60); }
    return 0;
}

// 🆕 ゲームロジックは前回のまま ... (省略)
// ... update(), saveAndLoadRanking(), playSound() など ...

// ----- 描画処理 (Draw) -----
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 1. 背景・街並み（視差効果はそのまま、少し地平線を下げる） ... (省略)

    // ✨ 疑似3D地面描画エンジン
    for (let screenX = 0; screenX <= canvas.width; screenX += 2) { // 2px刻みで細かく描画
        let absX = screenX + scrollX;
        let tileIdx = Math.floor(absX / TILE_SIZE);
        
        if (tileIdx < map.length) {
            let groundY = getGroundYAt(absX);
            let isRoad = (map[tileIdx] === 5);
            let isPit = (map[tileIdx] === 1);

            if (!isPit) {
                // 3Dパースの計算
                // 画面下に行くほど手前、上（地平線）に行くほど奥
                let depth = (groundY - HORIZON_Y) / (BASE_GROUND_Y - HORIZON_Y);
                let perspectiveScale = 0.3 + depth * 0.7; // 奥は小さく、手前は大きく
                
                // 地面の中心線（チェイスが走るライン）からの左右の広がり
                let groundCenterX = canvas.width / 2;
                let screenXFromCenter = screenX - groundCenterX;
                let projectedX = groundCenterX + screenXFromCenter * perspectiveScale;

                // 地面の色設定（道路グレー、草原緑、道路白線）
                let color = isRoad ? "#555555" : "#228B22";
                
                // 側面（厚み）を描画して立体感を出す
                ctx.fillStyle = isRoad ? "#333333" : "#1e6b1e"; // 暗い色で側面
                ctx.fillRect(projectedX, groundY, 3, canvas.height - groundY);

                // 表面を描画
                ctx.fillStyle = color;
                ctx.fillRect(projectedX, groundY, 3, 4); // 表面の厚みはわずか

                // 道路の白線パース
                if (isRoad && Math.floor(absX / 30) % 2 === 0) {
                    ctx.fillStyle = "#FFFFFF";
                    ctx.fillRect(projectedX + 1, groundY + 2, 1, 2);
                }
            } else {
                // 穴の側面を描画して奥行きを表現
                ctx.fillStyle = "#1a1a1a"; // 穴の奥深い暗闇
                let depth = (BASE_GROUND_Y - HORIZON_Y) / (BASE_GROUND_Y - HORIZON_Y);
                let perspectiveScale = 0.3 + depth * 0.7;
                let groundCenterX = canvas.width / 2;
                let screenXFromCenter = screenX - groundCenterX;
                let projectedX = groundCenterX + screenXFromCenter * perspectiveScale;
                ctx.fillRect(projectedX, BASE_GROUND_Y, 3, canvas.height - BASE_GROUND_Y);
            }
        }
    }

    // アイテム・障害物・チェイスの描画（前回のまま、パース計算を少し入れると完璧ですが今回は簡易版） ... (省略)
    // items.draw(), obstacles.draw(), goal.draw(), chase.draw() ...
}

// 🆕 タイトル画面描画ロジック ... (省略)
</script>
</body>
</html>
